<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>پارس موزیک</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf9f7; --bg-elevated:#ffffff; --bg-sidebar:#f3f1ec; --bg-hover:#ece9e2; --bg-active:#e4e0d6; --bg-input:#ffffff;
  --text:#1a1916; --text-secondary:#6b665d; --text-tertiary:#9a9489;
  --bubble-out:#0a7cff; --bubble-out-text:#fff; --bubble-in:#e9e6df; --bubble-in-text:#1a1916;
  --accent:#0a7cff; --accent-soft:#e6f0ff; --danger:#d83b3b; --warning:#d68a2c; --success:#2fa14e; --dnd:#e07b4e;
  --border:#e4e0d6; --border-strong:#d6d1c4; --divider:#ece9e2;
  --shadow-sm:0 1px 2px rgba(40,30,15,.05);
  --shadow-md:0 4px 12px rgba(40,30,15,.09);
  --shadow-pop:0 10px 30px rgba(40,30,15,.2);
  --r-md:12px; --r-bubble:20px; --r-full:9999px;
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --ease:cubic-bezier(0.4,0,0.2,1);
  --sidebar-w:340px; --header-h:64px;
  --safe-top:env(safe-area-inset-top); --safe-bottom:env(safe-area-inset-bottom);
}
[data-theme="dark"]{
  --bg:#161412; --bg-elevated:#1f1d1a; --bg-sidebar:#1a1816; --bg-hover:#262320; --bg-active:#322e2a; --bg-input:#262320;
  --text:#f5f2eb; --text-secondary:#a59e92; --text-tertiary:#6e6760;
  --bubble-in:#2c2926; --bubble-in-text:#f5f2eb;
  --accent:#4d9eff; --accent-soft:#1c2a40; --danger:#ff6b6b; --warning:#f0a44d; --success:#4ac870; --dnd:#f0a070;
  --border:#2c2926; --border-strong:#3a3733; --divider:#242220;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow-md:0 4px 12px rgba(0,0,0,.4);
  --shadow-pop:0 10px 30px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Vazirmatn',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;transition:background-color .3s var(--ease),color .3s var(--ease)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:9999px}
::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary)}

.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;height:100dvh;padding-top:var(--safe-top)}
.sidebar{background:var(--bg-sidebar);border-inline-start:1px solid var(--border);display:flex;flex-direction:column;min-width:0;position:relative;z-index:10}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--divider);min-height:var(--header-h)}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#0a7cff,#4d9eff);display:grid;place-items:center;color:#fff;font-weight:800;font-size:17px;box-shadow:var(--shadow-sm)}
.brand-text{display:flex;flex-direction:column;line-height:1.15}
.brand-title{font-weight:700;font-size:15px}
.brand-sub{font-size:11px;color:var(--text-tertiary)}
.icon-btn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--text-secondary);transition:background-color .15s,color .15s,transform .15s}
.icon-btn:hover{background:var(--bg-hover);color:var(--text)}
.icon-btn:active{transform:scale(.92)}
.icon-btn svg{width:20px;height:20px}
.sidebar-search{padding:10px 14px;border-bottom:1px solid var(--divider)}
.search-wrap{position:relative}
.search-input{width:100%;height:38px;border:none;background:var(--bg-input);color:var(--text);border-radius:var(--r-md);padding:0 36px 0 14px;font-size:14px;outline:none;box-shadow:inset 0 0 0 1px var(--border);transition:box-shadow .15s}
.search-input:focus{box-shadow:inset 0 0 0 2px var(--accent)}
.search-icon{position:absolute;top:50%;right:12px;transform:translateY(-50%);color:var(--text-tertiary);width:18px;height:18px;pointer-events:none}
.sidebar-tabs{display:flex;gap:4px;padding:8px 10px;border-bottom:1px solid var(--divider)}
.tab-btn{flex:1;height:34px;border-radius:10px;font-size:12.5px;font-weight:600;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s}
.tab-btn:hover{background:var(--bg-hover);color:var(--text)}
.tab-btn.active{background:var(--bg-elevated);color:var(--text);box-shadow:var(--shadow-sm)}
.tab-btn .badge{font-size:10px;padding:1px 6px;background:var(--accent);color:#fff;border-radius:9999px;font-weight:700}
.conv-list{flex:1;overflow-y:auto;padding:6px 8px}
.conv-item{display:flex;align-items:center;gap:12px;padding:10px;border-radius:var(--r-md);cursor:pointer;transition:background-color .15s;position:relative}
.conv-item:hover{background:var(--bg-hover)}
.conv-item.active{background:var(--bg-active)}
.avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#c8b48a,#9a8460);display:grid;place-items:center;color:#fff;font-weight:600;font-size:15px;flex-shrink:0;position:relative;overflow:hidden}
.avatar.sm{width:32px;height:32px;font-size:12px}
.avatar.lg{width:72px;height:72px;font-size:24px}
.avatar.role-admin{background:linear-gradient(135deg,#d8504b,#a83a35)}
.avatar.role-staff{background:linear-gradient(135deg,#d68a2c,#a86820)}
.avatar.role-teacher{background:linear-gradient(135deg,#4a7c8c,#355d6b)}
.avatar.role-student{background:linear-gradient(135deg,#6b8e5a,#4f6c42)}
.avatar.role-channel{background:linear-gradient(135deg,#8a5cd4,#6740a8)}
.avatar.role-group{background:linear-gradient(135deg,#c08a5e,#94673f)}
.dnd-dot{position:absolute;bottom:-2px;inset-inline-end:-2px;width:14px;height:14px;border-radius:50%;background:var(--dnd);border:2px solid var(--bg-sidebar);display:grid;place-items:center}
.dnd-dot::after{content:'';width:6px;height:2px;background:#fff;border-radius:1px}
.conv-body{flex:1;min-width:0}
.conv-row1{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.conv-name{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
.conv-name .ch-ico{width:13px;height:13px;color:var(--text-tertiary);flex-shrink:0}
.conv-time{font-size:11px;color:var(--text-tertiary);flex-shrink:0}
.conv-row2{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:2px}
.conv-preview{font-size:13px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.unread-pill{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:1px 7px;border-radius:9999px;min-width:20px;text-align:center;flex-shrink:0}
.sidebar-profile{display:flex;align-items:center;gap:12px;padding:12px 14px;border-top:1px solid var(--divider);cursor:pointer;transition:background-color .15s}
.sidebar-profile:hover{background:var(--bg-hover)}
.profile-meta{flex:1;min-width:0}
.profile-name{font-weight:600;font-size:13.5px}
.profile-role{font-size:11.5px;color:var(--text-tertiary);display:flex;align-items:center;gap:6px;margin-top:2px}
.role-badge{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:9999px}
.role-badge.admin{background:rgba(216,80,75,.15);color:var(--danger)}
.role-badge.staff{background:rgba(214,138,44,.15);color:var(--warning)}
.role-badge.teacher{background:rgba(74,124,140,.18);color:#4a7c8c}
.role-badge.student{background:rgba(107,142,90,.18);color:var(--success)}
[data-theme="dark"] .role-badge.teacher{color:#7aaabb;background:rgba(122,170,187,.18)}

.chat{display:flex;flex-direction:column;min-width:0;position:relative;background:var(--bg)}
.chat-header{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--divider);background:color-mix(in srgb,var(--bg-elevated) 85%,transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);min-height:var(--header-h);z-index:5}
.back-btn{display:none}
.chat-title-block{flex:1;min-width:0;cursor:pointer}
.chat-title{font-weight:700;font-size:16px;display:flex;align-items:center;gap:8px}
.chat-subtitle{font-size:11.5px;color:var(--text-tertiary);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dnd-chip{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:9999px;background:rgba(224,123,78,.15);color:var(--dnd)}
.dnd-chip svg{width:11px;height:11px}
.chat-actions{display:flex;gap:4px}

.messages{flex:1;overflow-y:auto;padding:18px 24px 8px;display:flex;flex-direction:column;gap:1px}
.day-divider{display:flex;align-items:center;gap:12px;margin:18px 0 10px;color:var(--text-tertiary);font-size:11px;font-weight:500}
.day-divider::before,.day-divider::after{content:'';flex:1;height:1px;background:var(--divider)}

.msg-row{display:flex;gap:8px;align-items:flex-end;animation:msgIn .35s var(--spring)}
.msg-row.out{flex-direction:row-reverse}
.msg-row.first{margin-top:12px}
@keyframes msgIn{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
.msg-row.out{transform-origin:bottom left}
.msg-row.in{transform-origin:bottom right}
.msg-avatar-slot{width:32px;flex-shrink:0}
.msg-row.out .msg-avatar-slot{display:none}
.msg-avatar-slot .avatar{visibility:hidden}
.msg-row.last .msg-avatar-slot .avatar{visibility:visible}
.msg-cluster{display:flex;flex-direction:column;max-width:72%;gap:2px;min-width:0}
.msg-row.out .msg-cluster{align-items:flex-end}
.msg-row.in .msg-cluster{align-items:flex-start}
.sender-label{font-size:11.5px;color:var(--text-tertiary);margin:0 8px 2px;font-weight:500}
.bubble{background:var(--bubble-in);color:var(--bubble-in-text);padding:9px 14px;border-radius:var(--r-bubble);font-size:14.5px;line-height:1.5;word-wrap:break-word;position:relative;max-width:100%;box-shadow:var(--shadow-sm);cursor:pointer}
.msg-row.out .bubble{background:var(--bubble-out);color:var(--bubble-out-text)}
.msg-row.has-prev.in .bubble{border-start-start-radius:6px}
.msg-row.has-next.in .bubble{border-end-start-radius:6px}
.msg-row.has-prev.out .bubble{border-start-end-radius:6px}
.msg-row.has-next.out .bubble{border-end-end-radius:6px}
.msg-time{font-size:10.5px;color:var(--text-tertiary);padding:2px 10px 0;opacity:0;transition:opacity .2s}
.msg-row:hover .msg-time,.msg-row.last .msg-time{opacity:1}

.reply-preview{display:flex;flex-direction:column;gap:2px;padding:6px 10px;border-inline-start:3px solid;margin:-3px -6px 6px;border-radius:8px;font-size:12.5px;cursor:pointer}
.msg-row.out .reply-preview{border-color:rgba(255,255,255,.65);background:rgba(255,255,255,.15)}
.msg-row.in .reply-preview{border-color:var(--accent);background:rgba(10,124,255,.08)}
[data-theme="dark"] .msg-row.in .reply-preview{background:rgba(77,158,255,.15)}
.reply-author{font-weight:700;font-size:12px}
.reply-snippet{opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}

.bubble.has-attachment{padding:6px}
.bubble.has-attachment.has-caption{padding-bottom:9px}
.attachment-image img,.attachment-video video{display:block;width:100%;max-width:340px;height:auto;border-radius:14px}
.attachment-file{display:flex;align-items:center;gap:12px;padding:10px 12px;background:rgba(255,255,255,.18);border-radius:12px;min-width:240px}
.msg-row.in .attachment-file{background:rgba(0,0,0,.06)}
[data-theme="dark"] .msg-row.in .attachment-file{background:rgba(255,255,255,.07)}
.file-icon{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.25);display:grid;place-items:center;flex-shrink:0}
.msg-row.in .file-icon{background:rgba(0,0,0,.08)}
[data-theme="dark"] .msg-row.in .file-icon{background:rgba(255,255,255,.1)}
.file-icon svg{width:20px;height:20px}
.file-meta{display:flex;flex-direction:column;min-width:0}
.file-name{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.file-size{font-size:11.5px;opacity:.75;direction:ltr;text-align:end;unicode-bidi:isolate}
.caption-text{padding:6px 8px 0;font-size:14px;line-height:1.45}

.voice-bubble{display:flex;align-items:center;gap:12px;min-width:240px;padding:2px 0}
.voice-play{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.22);display:grid;place-items:center;flex-shrink:0;transition:transform .15s}
.voice-play:hover{transform:scale(1.06)}
.msg-row.in .voice-play{background:rgba(0,0,0,.08)}
[data-theme="dark"] .msg-row.in .voice-play{background:rgba(255,255,255,.1)}
.voice-play svg{width:18px;height:18px}
.voice-track{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}
.waveform{display:flex;align-items:center;gap:2px;height:28px;position:relative}
.wave-bar{width:2.5px;background:currentColor;opacity:.55;border-radius:2px;flex-shrink:0}
.msg-row.in .wave-bar{opacity:.7}
.voice-duration{font-size:11px;opacity:.8}
.bp-marker{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--warning);border-radius:1px;cursor:pointer;z-index:2}
.bp-marker::before{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:9px;height:9px;border-radius:50%;background:var(--warning);box-shadow:0 0 0 2px var(--bubble-in)}
.msg-row.out .bp-marker::before{box-shadow:0 0 0 2px var(--bubble-out)}

.contact-card{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:14px;background:rgba(255,255,255,.18);cursor:pointer;min-width:240px;transition:background-color .15s}
.contact-card:hover{background:rgba(255,255,255,.28)}
.msg-row.in .contact-card{background:rgba(0,0,0,.06)}
.msg-row.in .contact-card:hover{background:rgba(0,0,0,.1)}
[data-theme="dark"] .msg-row.in .contact-card{background:rgba(255,255,255,.07)}
[data-theme="dark"] .msg-row.in .contact-card:hover{background:rgba(255,255,255,.12)}
.cc-info{flex:1;min-width:0}
.cc-label{font-size:10.5px;opacity:.75;font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:4px}
.cc-label svg{width:11px;height:11px}
.cc-name{font-weight:600;font-size:14.5px;margin-top:1px}
.cc-role{font-size:11.5px;opacity:.7}

.reaction-strip{display:flex;gap:4px;margin:2px 4px 0;flex-wrap:wrap}
.msg-row.out .reaction-strip{justify-content:flex-end}
.reaction-chip{display:inline-flex;align-items:center;gap:3px;background:var(--bg-elevated);border:1px solid var(--border);padding:1px 8px 1px 6px;border-radius:9999px;font-size:12px;font-weight:600;color:var(--text);box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .15s var(--spring)}
.reaction-chip:hover{transform:scale(1.08)}
.reaction-chip.mine{border-color:var(--accent);background:var(--accent-soft)}
.reaction-chip .emoji{font-size:13px;line-height:1}
.reaction-chip .count{color:var(--text-secondary);font-size:11px}
.reaction-chip.mine .count{color:var(--accent)}

.composer-shell{border-top:1px solid var(--divider);background:var(--bg-elevated);padding:10px 14px max(10px,var(--safe-bottom))}
.reply-context{display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:8px;background:var(--accent-soft);border-inline-start:3px solid var(--accent);border-radius:8px}
.reply-context .rc-text{flex:1;min-width:0}
.rc-author{font-size:11.5px;font-weight:700;color:var(--accent)}
.rc-body{font-size:12.5px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.composer{display:flex;align-items:flex-end;gap:8px}
.composer-btn{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;color:var(--text-secondary);flex-shrink:0;transition:all .15s}
.composer-btn:hover{background:var(--bg-hover);color:var(--accent)}
.composer-btn:active{transform:scale(.9)}
.composer-btn svg{width:22px;height:22px}
.composer-input-wrap{flex:1;display:flex;align-items:flex-end;background:var(--bg-input);border:1px solid var(--border);border-radius:22px;padding:4px 14px 4px 6px;transition:border-color .15s;min-height:40px}
.composer-input-wrap:focus-within{border-color:var(--accent)}
.composer-input{flex:1;border:none;background:transparent;outline:none;color:var(--text);font-size:14.5px;line-height:1.4;padding:7px 4px;resize:none;max-height:120px;font-family:inherit}
.composer-input::placeholder{color:var(--text-tertiary)}
.send-btn{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;transition:transform .18s var(--spring),background-color .15s}
.send-btn:hover{transform:scale(1.06)}
.send-btn:active{transform:scale(.92)}
.send-btn:disabled{background:var(--border-strong);cursor:default}
.send-btn:disabled:hover{transform:none}
.send-btn svg{width:18px;height:18px}
.channel-readonly{text-align:center;font-size:13px;color:var(--text-tertiary);padding:18px;border-top:1px solid var(--divider);background:var(--bg-elevated)}

.scrim{position:fixed;inset:0;background:rgba(20,15,5,.42);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s;z-index:100}
.scrim.open{opacity:1;pointer-events:auto}

.reaction-picker{position:fixed;background:var(--bg-elevated);border-radius:9999px;box-shadow:var(--shadow-pop);padding:6px;display:flex;gap:2px;z-index:200;opacity:0;pointer-events:none;transform:scale(.82) translateY(8px);transform-origin:center bottom;transition:opacity .2s var(--spring),transform .2s var(--spring)}
.reaction-picker.open{opacity:1;pointer-events:auto;transform:scale(1) translateY(0)}
.reaction-picker button{width:38px;height:38px;border-radius:50%;font-size:22px;display:grid;place-items:center;transition:transform .15s var(--spring),background-color .15s}
.reaction-picker button:hover{transform:scale(1.25);background:var(--bg-hover)}
.reaction-picker button.active{background:var(--accent-soft)}

.msg-menu{position:fixed;background:var(--bg-elevated);border-radius:14px;box-shadow:var(--shadow-pop);padding:6px;min-width:210px;z-index:200;opacity:0;pointer-events:none;transform:scale(.92);transform-origin:top center;transition:opacity .18s,transform .18s var(--spring)}
.msg-menu.open{opacity:1;pointer-events:auto;transform:scale(1)}
.msg-menu button{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:9px;font-size:13.5px;color:var(--text);transition:background-color .12s}
.msg-menu button:hover{background:var(--bg-hover)}
.msg-menu button.danger{color:var(--danger)}
.msg-menu button svg{width:16px;height:16px}
.msg-menu hr{border:none;border-top:1px solid var(--divider);margin:4px 4px}

.modal{position:fixed;inset:0;display:grid;place-items:center;z-index:150;pointer-events:none;padding:20px}
.modal.open{pointer-events:auto}
.modal-card{background:var(--bg-elevated);border-radius:18px;box-shadow:var(--shadow-pop);width:100%;max-width:480px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;transform:scale(.82) translateY(20px);opacity:0;transition:transform .3s var(--spring),opacity .2s}
.modal.open .modal-card{transform:scale(1) translateY(0);opacity:1}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--divider)}
.modal-title{font-weight:700;font-size:16px}
.modal-body{padding:18px;overflow-y:auto;flex:1}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;padding:12px 18px;border-top:1px solid var(--divider)}
.btn{padding:9px 18px;border-radius:10px;font-size:13.5px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.08)}
.btn-primary:disabled{background:var(--border-strong);cursor:default;color:var(--text-tertiary)}
.btn-ghost{background:transparent;color:var(--text-secondary)}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}

.settings-section{margin-bottom:22px}
.settings-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-tertiary);margin-bottom:8px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg);border-radius:12px;margin-bottom:6px;gap:12px}
.settings-row .label{font-size:14px;font-weight:500}
.settings-row .desc{font-size:12px;color:var(--text-tertiary);margin-top:2px}

.theme-segmented{display:flex;background:var(--bg);border-radius:10px;padding:3px;gap:2px}
.theme-segmented button{flex:1;padding:9px 12px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s}
.theme-segmented button.active{background:var(--bg-elevated);color:var(--text);box-shadow:var(--shadow-sm)}
.theme-segmented svg{width:14px;height:14px}

.bg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.bg-tile{aspect-ratio:4/5;border-radius:12px;cursor:pointer;position:relative;overflow:hidden;border:2px solid transparent;transition:transform .15s var(--spring),border-color .15s}
.bg-tile:hover{transform:scale(1.04)}
.bg-tile.selected{border-color:var(--accent)}
.bg-tile.selected::after{content:'✓';position:absolute;top:6px;inset-inline-end:6px;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:13px;font-weight:700;display:grid;place-items:center}
.bg-tile .ti{width:100%;height:100%;display:grid;place-items:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.85);text-shadow:0 1px 3px rgba(0,0,0,.4)}

.switch{position:relative;width:44px;height:26px;background:var(--border-strong);border-radius:9999px;cursor:pointer;transition:background-color .2s;flex-shrink:0}
.switch::after{content:'';position:absolute;top:3px;inset-inline-start:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .25s var(--spring);box-shadow:0 1px 3px rgba(0,0,0,.25)}
.switch.on{background:var(--success)}
[dir="rtl"] .switch.on::after{transform:translateX(-18px)}
.switch.dnd-color.on{background:var(--dnd)}

.dnd-active-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(224,123,78,.12);border:1px solid rgba(224,123,78,.3);border-radius:10px;color:var(--dnd);font-size:12.5px;margin-bottom:12px;font-weight:500}
.dnd-active-banner svg{width:16px;height:16px;flex-shrink:0}

.user-pick-list{max-height:340px;overflow-y:auto;margin:-6px;padding:6px}
.user-pick-row{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:background-color .12s}
.user-pick-row:hover{background:var(--bg-hover)}
.user-pick-row.selected{background:var(--accent-soft)}
.pick-meta{flex:1;min-width:0}
.pick-name{font-weight:600;font-size:14px}
.pick-sub{font-size:11.5px;color:var(--text-tertiary);display:flex;align-items:center;gap:5px;margin-top:1px}
.pick-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-strong);display:grid;place-items:center;color:#fff;flex-shrink:0;transition:all .15s}
.user-pick-row.selected .pick-check{background:var(--accent);border-color:var(--accent)}
.user-pick-row.selected .pick-check::after{content:'✓';font-size:13px;font-weight:700}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:9999px;font-size:13px;font-weight:500;box-shadow:var(--shadow-pop);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s var(--spring)}
.toast.open{opacity:1;transform:translateX(-50%) translateY(0)}

.empty-state{flex:1;display:grid;place-items:center;padding:40px;text-align:center;color:var(--text-tertiary)}
.empty-state svg{width:64px;height:64px;margin-bottom:16px;opacity:.4}
.empty-state-title{font-size:16px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
.empty-state-sub{font-size:13px;max-width:300px;line-height:1.6}

@media (max-width:768px){
  :root{--sidebar-w:100%}
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;inset:0;z-index:20;transform:translateX(0);transition:transform .3s var(--ease)}
  .app.chat-open .sidebar{transform:translateX(-100%)}
  .chat{position:fixed;inset:0;z-index:10}
  .back-btn{display:grid}
  .messages{padding:14px 12px 8px}
  .msg-cluster{max-width:82%}
  .modal{padding:0;align-items:flex-end}
  .modal-card{max-width:none;border-radius:18px 18px 0 0;max-height:92vh}
}
.hidden{display:none!important}

function genWaveform(n){
  const arr=[];
  for(let i=0;i<n;i++){
    const v = Math.sin(i*.4)*0.5 + Math.sin(i*1.3)*0.3 + Math.random()*0.3;
    arr.push(Math.max(0.15, Math.min(1, Math.abs(v)+0.2)));
  }
  return arr;
}

let openMenu = null;
let pickerTarget = null;
let activeTab = 'all';

/* ============================================================================
   PERMISSIONS (mirrors server-side rules)
   ============================================================================ */
function canDM(senderId, recipientId){
  const sender = users[senderId], rec = users[recipientId];
  if(!sender || !rec) return false;
  if(sender.id === rec.id) return false;
  if(sender.role === 'admin' || sender.role === 'staff') return true;
  if(rec.role === 'admin' || rec.role === 'staff') return true;
  if(sender.role === 'teacher'){
    if(rec.role === 'teacher') return true;
    if(rec.role === 'student') return (teacherStudents[senderId]||[]).includes(recipientId);
  }
  if(sender.role === 'student'){
    if(rec.role === 'teacher') return (teacherStudents[recipientId]||[]).includes(senderId);
  }
  return false;
}
function canPostInChannel(userId){
  const u = users[userId];
  return u && (u.role === 'admin' || u.role === 'staff');
}
function canCreateGroup(userId){
  return users[userId]?.role !== 'student';
}
function canCreateChannel(userId){
  return users[userId]?.role === 'admin';
}
function canShareContact(sharerId){
  const r = users[sharerId]?.role;
  return r === 'staff' || r === 'teacher';
}
function canAssignTeacherStudent(userId){
  const r = users[userId]?.role;
  return r === 'admin' || r === 'staff';
}
function canSeeDND(viewerId, teacherId){
  // Only people who can DM the teacher see their DND state
  return canDM(viewerId, teacherId);
}

const $ = s => document.querySelector(s);
const fmtTime = iso => {
  const d = new Date(iso);
  return d.toLocaleTimeString('fa-IR', { hour:'2-digit', minute:'2-digit' });
};
const fmtDay = iso => {
  const d = new Date(iso), now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const yest = new Date(now); yest.setDate(now.getDate()-1);
  if(sameDay) return 'امروز';
  if(d.toDateString() === yest.toDateString()) return 'دیروز';
  return d.toLocaleDateString('fa-IR', { weekday:'long', day:'numeric', month:'long' });
};
const fmtBytes = b => {
  if(b<1024) return b+' B';
  if(b<1048576) return (b/1024).toFixed(1)+' KB';
  if(b<1073741824) return (b/1048576).toFixed(1)+' MB';
  return (b/1073741824).toFixed(2)+' GB';
};
const fmtMs = ms => {
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  return `${m}:${String(s%60).padStart(2,'0')}`;
};
function escapeHtml(str){
  if(str==null) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('open');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove('open'), 2200);
}

function avatarHTML(u, sizeClass=''){
  if(u.type === 'channel') return `<div class="avatar role-channel ${sizeClass}">📢</div>`;
  if(u.type === 'group')   return `<div class="avatar role-group ${sizeClass}">👥</div>`;
  const dnd = u.dnd ? '<span class="dnd-dot"></span>' : '';
  return `<div class="avatar role-${u.role} ${sizeClass}">${u.initials}${dnd}</div>`;
}

function getConvDisplay(conv){

      subtitle: ROLE_FA[other.role],

  return {
    title: conv.title,
    subtitle: conv.type === 'channel' ? `${conv.members.length} عضو · کانال` : `${conv.members.length} عضو`,
    avatarUser: { type: conv.type, role: conv.avatarRole || conv.type, initials:'', dnd:false },
    isDM:false
  };
}

function lastMessage(convId){
  const list = messages[convId] || [];
  return list[list.length-1];
}

function previewText(msg, conv){
  if(!msg) return '';
  let prefix = '';
  if(conv.type !== 'dm' && msg.sender !== currentUserId){
    prefix = (users[msg.sender]?.name?.split(' ')[0] || '') + ': ';
  }
  if(msg.sender === currentUserId) prefix = 'شما: ';
  if(msg.voice) return prefix + '🎤 پیام صوتی';
  if(msg.file){
    const ico = msg.file.type === 'image' ? '🖼️' : msg.file.type === 'video' ? '🎬' : '📎';
    return prefix + ico + ' ' + (msg.body || msg.file.name);
  }
  if(msg.contactCard) return prefix + '👤 اطلاعات تماس';
  return prefix + (msg.body || '');
}

/* ============================================================================
   RENDER — sidebar
   ============================================================================ */
function visibleConversations(){
  const all = Object.values(conversations).filter(c => c.members.includes(currentUserId));
  // Sort by most recent message
  all.sort((a,b) => {
    const la = lastMessage(a.id)?.t || '';
    const lb = lastMessage(b.id)?.t || '';
    return lb.localeCompare(la);
  });
  if(activeTab === 'dm')      return all.filter(c => c.type === 'dm');
  if(activeTab === 'group')   return all.filter(c => c.type === 'group');
  if(activeTab === 'channel') return all.filter(c => c.type === 'channel');
  return all;
}

function renderConvList(){
  const list = $('#convList');
  const items = visibleConversations();
  if(items.length === 0){
    list.innerHTML = `<div style="padding:32px 16px;text-align:center;color:var(--text-tertiary);font-size:13px;">گفتگویی برای نمایش نیست</div>`;
    return;
  }
  list.innerHTML = items.map(conv => {
    const disp = getConvDisplay(conv);
    const last = lastMessage(conv.id);
    const time = last ? fmtTime(last.t) : '';
    const isActive = conv.id === activeConvId;
    const channelIcon = conv.type === 'channel' ? `<svg class="ch-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>` : '';
    const groupIcon = conv.type === 'group' ? `<svg class="ch-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>` : '';
    // Hide DND dot if viewer can't see this user's DND
    let avatarUser = disp.avatarUser;
    if(disp.isDM && disp.otherUser.dnd && !canSeeDND(currentUserId, disp.otherUser.id)){
      avatarUser = {...disp.otherUser, dnd:false};
    }
    return `
      <div class="conv-item ${isActive?'active':''}" data-conv="${conv.id}">
        ${avatarHTML(avatarUser)}
        <div class="conv-body">
          <div class="conv-row1">
            <div class="conv-name">${channelIcon}${groupIcon}${escapeHtml(disp.title)}</div>
            <div class="conv-time">${time}</div>
          </div>
          <div class="conv-row2">
            <div class="conv-preview">${escapeHtml(previewText(last, conv))}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
  list.querySelectorAll('.conv-item').forEach(el => {
    el.onclick = () => openConv(parseInt(el.dataset.conv));
  });
}

/* ============================================================================
   RENDER — chat header + messages
   ============================================================================ */
function openConv(id){
  activeConvId = id;
  replyingTo = null;
  renderConvList();
  renderChatHeader();
  renderMessages();
  renderComposer();
  document.getElementById('app').classList.add('chat-open');
  // Scroll to bottom
  requestAnimationFrame(()=>{
    const m = $('#messages'); m.scrollTop = m.scrollHeight;
  });
}

function renderChatHeader(){
  const conv = conversations[activeConvId];
  if(!conv){
    $('#chatTitle').textContent = 'انتخاب گفتگو';
    $('#chatSubtitle').textContent = '';
    $('#headAvatar').className = 'avatar sm';
    $('#headAvatar').textContent = '';
    return;
  }
  const disp = getConvDisplay(conv);
  $('#chatTitle').textContent = disp.title;
  // Build subtitle (include DND chip if applicable)
  let subtitleHtml = escapeHtml(disp.subtitle);
  if(disp.isDM && disp.otherUser.dnd && canSeeDND(currentUserId, disp.otherUser.id)){
    subtitleHtml += ` <span class="dnd-chip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/></svg>
      ${escapeHtml(disp.otherUser.dndMsg || 'مزاحم نشوید')}
    </span>`;
  }
  $('#chatSubtitle').innerHTML = subtitleHtml;
  // Header avatar
  const head = $('#headAvatar');
  let av = disp.avatarUser;
  if(disp.isDM && av.dnd && !canSeeDND(currentUserId, av.id)){
    av = {...av, dnd:false};
  }
  head.outerHTML = avatarHTML(av, 'sm').replace('class="avatar', 'id="headAvatar" class="avatar');
}

function renderMessages(){
  const conv = conversations[activeConvId];
  const m = $('#messages');
  if(!conv){
    m.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <div class="empty-state-title">یک گفتگو انتخاب کنید</div>
      <div class="empty-state-sub">از لیست کناری گفتگویی را برای شروع چت انتخاب کنید</div>
    </div>`;
    return;
  }
  const list = messages[activeConvId] || [];
  if(list.length === 0){
    m.innerHTML = `<div class="empty-state"><div class="empty-state-title">شروع گفتگو</div></div>`;
    return;
  }
  let html = '';
  let lastDay = '';
  for(let i=0; i<list.length; i++){
    const msg = list[i];
    const dayKey = new Date(msg.t).toDateString();
    if(dayKey !== lastDay){
      html += `<div class="day-divider"><span>${fmtDay(msg.t)}</span></div>`;
      lastDay = dayKey;
    }
    const prev = list[i-1];
    const next = list[i+1];
    const isSameSenderAsPrev = prev && prev.sender === msg.sender && Math.abs(new Date(msg.t) - new Date(prev.t)) < 5*60*1000 && new Date(msg.t).toDateString() === new Date(prev.t).toDateString();
    const isSameSenderAsNext = next && next.sender === msg.sender && Math.abs(new Date(next.t) - new Date(msg.t)) < 5*60*1000 && new Date(msg.t).toDateString() === new Date(next.t).toDateString();
    html += renderMessage(msg, conv, isSameSenderAsPrev, isSameSenderAsNext);
  }
  m.innerHTML = html;
  attachMessageHandlers();
}

function renderMessage(msg, conv, hasPrev, hasNext){
  const isOut = msg.sender === currentUserId;
  const sender = users[msg.sender];
  const showSenderLabel = !isOut && conv.type !== 'dm' && !hasPrev;
  const classes = ['msg-row', isOut?'out':'in', hasPrev?'has-prev':'first', hasNext?'has-next':'last'].join(' ');

  // Reply preview
  let replyHtml = '';
  if(msg.replyTo){
    const target = (messages[conv.id]||[]).find(x => x.id === msg.replyTo);
    if(target){
      const tSender = users[target.sender];
      const snippet = target.body || (target.voice?'پیام صوتی':target.file?(target.body||target.file.name):target.contactCard?'اطلاعات تماس':'');
      replyHtml = `<div class="reply-preview" data-jump="${target.id}">
        <div class="reply-author">${escapeHtml(tSender.name)}</div>
        <div class="reply-snippet">${escapeHtml(snippet.slice(0,80))}</div>
      </div>`;
    }
  }

  // Body
  let bodyHtml = '';
  let bubbleClass = 'bubble';
  if(msg.voice){
    bodyHtml = renderVoice(msg, isOut);
  } else if(msg.file){
    bubbleClass += ' has-attachment';
    if(msg.body) bubbleClass += ' has-caption';
    bodyHtml = renderFile(msg, isOut);
    if(msg.body) bodyHtml += `<div class="caption-text">${escapeHtml(msg.body)}</div>`;
  } else if(msg.contactCard){
    bodyHtml = renderContactCard(msg);
    bubbleClass += ' has-attachment';
  } else {
    bodyHtml = escapeHtml(msg.body);
  }

  // Reactions
  let reactionsHtml = '';
  if(msg.reactions && msg.reactions.length){
    const grouped = {};
    msg.reactions.forEach(r => {
      grouped[r.r] = grouped[r.r] || { count:0, mine:false };
      grouped[r.r].count++;
      if(r.user === currentUserId) grouped[r.r].mine = true;
    });
    reactionsHtml = `<div class="reaction-strip">${
      Object.entries(grouped).map(([r,{count,mine}]) =>
        `<button class="reaction-chip ${mine?'mine':''}" data-react="${r}" data-msg="${msg.id}">
          <span class="emoji">${REACTIONS[r]}</span>
          <span class="count">${count}</span>
        </button>`
      ).join('')
    }</div>`;
  }

  return `
    <div class="${classes}" data-msg-id="${msg.id}">
      <div class="msg-avatar-slot">${!isOut ? avatarHTML(sender, 'sm') : ''}</div>
      <div class="msg-cluster">
        ${showSenderLabel ? `<div class="sender-label">${escapeHtml(sender.name)}</div>` : ''}
        <div class="${bubbleClass}" data-msg-bubble="${msg.id}">
          ${replyHtml}
          ${bodyHtml}
        </div>
        ${reactionsHtml}
        <div class="msg-time">${fmtTime(msg.t)}</div>
      </div>
    </div>
  `;
}

function renderVoice(msg, isOut){
  const v = msg.voice;
  const bars = v.waveform.map(h =>
    `<div class="wave-bar" style="height:${Math.round(h*22+4)}px"></div>`
  ).join('');
  const bps = (v.breakpoints||[]).map(bp =>
    `<div class="bp-marker" style="inset-inline-start:${(bp.ms/v.duration)*100}%" title="${escapeHtml(bp.note)}" data-bp="${bp.ms}"></div>`
  ).join('');
  return `<div class="voice-bubble">
    <button class="voice-play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
    <div class="voice-track">
      <div class="waveform">${bars}${bps}</div>
      <div class="voice-duration">${fmtMs(v.duration)}${v.breakpoints?.length?` · ${v.breakpoints.length} نشانه`:''}</div>
    </div>
  </div>`;
}

function renderFile(msg, isOut){
  const f = msg.file;
  if(f.type === 'image'){
    return `<div class="attachment-image">
      <div style="width:280px;height:200px;background:linear-gradient(135deg,#9bb5cc,#5d7d9c);display:grid;place-items:center;color:white;font-size:13px;border-radius:14px;">${escapeHtml(f.name)}</div>
    </div>`;
  }
  if(f.type === 'video'){
    return `<div class="attachment-image">
      <div style="width:280px;height:180px;background:linear-gradient(135deg,#3a3a3a,#1a1a1a);display:grid;place-items:center;color:white;border-radius:14px;position:relative;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </div>
    </div>`;
  }
  const ico = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>`;
  return `<div class="attachment-file">
    <div class="file-icon">${ico}</div>
    <div class="file-meta">
      <div class="file-name">${escapeHtml(f.name)}</div>
      <div class="file-size">${fmtBytes(f.size)}</div>
    </div>
  </div>`;
}

function renderContactCard(msg){
  const student = users[msg.contactCard.studentId];
  if(!student) return '<div class="contact-card"><div class="cc-info"><div class="cc-name">کاربر حذف شده</div></div></div>';
  return `<div class="contact-card" data-cc-student="${student.id}">
    ${avatarHTML(student, 'sm')}
    <div class="cc-info">
      <div class="cc-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        اطلاعات تماس
      </div>
      <div class="cc-name">${escapeHtml(student.name)}</div>
      <div class="cc-role">${ROLE_FA[student.role]}</div>
    </div>
  </div>`;
}

/* ============================================================================
   COMPOSER (role-aware)
   ============================================================================ */
function renderComposer(){
  const conv = conversations[activeConvId];
  const slot = $('#composerSlot');
  if(!conv){ slot.innerHTML = ''; return; }

  // Channel + can't post → read-only
  if(conv.type === 'channel' && !canPostInChannel(currentUserId)){
    slot.innerHTML = `<div class="channel-readonly">
      🔒 فقط مدیران و پرسنل می‌توانند در این کانال پیام ارسال کنند
    </div>`;
    return;
  }

  // DM + recipient unreachable (shouldn't happen for visible convs, but guard anyway)
  if(conv.type === 'dm'){
    const otherId = conv.members.find(id => id !== currentUserId);
    if(!canDM(currentUserId, otherId)){
      slot.innerHTML = `<div class="channel-readonly">⚠️ شما اجازه ارسال پیام به این کاربر را ندارید</div>`;
      return;
    }
  }

  const replyContextHtml = replyingTo ? (() => {
    const t = (messages[activeConvId]||[]).find(x => x.id === replyingTo);
    if(!t) return '';
    const ts = users[t.sender];
    const snippet = t.body || (t.voice?'پیام صوتی':t.file?(t.body||t.file.name):t.contactCard?'اطلاعات تماس':'');
    return `<div class="reply-context">
      <div class="rc-text">
        <div class="rc-author">پاسخ به ${escapeHtml(ts.name)}</div>
        <div class="rc-body">${escapeHtml(snippet.slice(0,90))}</div>
      </div>
      <button class="icon-btn" id="cancelReply">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>`;
  })() : '';

  slot.innerHTML = `<div class="composer-shell">
    ${replyContextHtml}
    <div class="composer">
      <button class="composer-btn" id="attachBtn" title="پیوست فایل">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 17.93 8.8L9.41 17.32a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <div class="composer-input-wrap">
        <textarea class="composer-input" id="composerInput" placeholder="پیام بنویسید..." rows="1"></textarea>
      </div>
      <button class="composer-btn" id="voiceBtn" title="پیام صوتی">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="6" height="12" x="9" y="2" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3"/></svg>
      </button>
      <button class="send-btn hidden" id="sendBtn" title="ارسال">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>`;

  attachComposerHandlers();
}

function attachComposerHandlers(){
  const input = $('#composerInput');
  const sendBtn = $('#sendBtn');
  const voiceBtn = $('#voiceBtn');
  if(!input) return;
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(120, input.scrollHeight) + 'px';
    const has = input.value.trim().length > 0;
    sendBtn.classList.toggle('hidden', !has);
    voiceBtn.classList.toggle('hidden', has);
  });
  input.addEventListener('keydown', e => {
    if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
  });
  sendBtn.onclick = sendMessage;
  $('#attachBtn').onclick = () => $('#fileInput').click();
  voiceBtn.onclick = () => toast('🎤 ضبط پیام صوتی (نسخه دمو)');
  const cr = $('#cancelReply');
  if(cr) cr.onclick = () => { replyingTo = null; renderComposer(); };
  input.focus();
}

function sendMessage(){
  const conv = conversations[activeConvId];
  const input = $('#composerInput');
  const body = input.value.trim();
  if(!body) return;
  const newMsg = {
    id: Date.now(),
    conv: activeConvId,
    sender: currentUserId,
    body,
    t: new Date().toISOString(),
    reactions: []
  };
  if(replyingTo) newMsg.replyTo = replyingTo;
  messages[activeConvId] = messages[activeConvId] || [];
  messages[activeConvId].push(newMsg);
  replyingTo = null;
  input.value = '';
  renderConvList();
  renderMessages();
  renderComposer();
  requestAnimationFrame(()=>{
    const m = $('#messages'); m.scrollTop = m.scrollHeight;
  });
}

/* ============================================================================
   MESSAGE INTERACTIONS — long-press, click reactions, etc.
   ============================================================================ */
function attachMessageHandlers(){
  document.querySelectorAll('[data-msg-bubble]').forEach(b => {
    let timer;
    let longPressed = false;
    const start = e => {
      longPressed = false;
      timer = setTimeout(() => {
        longPressed = true;
        showMessageMenu(e, parseInt(b.dataset.msgBubble));
      }, 500);
    };
    const cancel = () => clearTimeout(timer);
    b.addEventListener('mousedown', start);
    b.addEventListener('touchstart', start, {passive:true});
    b.addEventListener('mouseup', cancel);
    b.addEventListener('mouseleave', cancel);
    b.addEventListener('touchend', cancel);
    b.addEventListener('contextmenu', e => {
      e.preventDefault();
      showMessageMenu(e, parseInt(b.dataset.msgBubble));
    });
    b.addEventListener('click', e => {
      if(longPressed){ e.preventDefault(); e.stopPropagation(); return; }
    });
  });
  document.querySelectorAll('.reaction-chip').forEach(c => {
    c.onclick = e => {
      e.stopPropagation();
      toggleReaction(parseInt(c.dataset.msg), c.dataset.react);
    };
  });
  document.querySelectorAll('[data-cc-student]').forEach(c => {
    c.onclick = () => openContactCard(parseInt(c.dataset.ccStudent));
  });
  document.querySelectorAll('.reply-preview[data-jump]').forEach(p => {
    p.onclick = () => {
      const target = document.querySelector(`[data-msg-id="${p.dataset.jump}"]`);
      if(target){
        target.scrollIntoView({behavior:'smooth', block:'center'});
        target.style.transition = 'background-color .8s';
        target.style.backgroundColor = 'var(--accent-soft)';
        setTimeout(()=>{ target.style.backgroundColor=''; }, 1000);
      }
    };
  });
}

function showMessageMenu(evt, msgId){
  const conv = conversations[activeConvId];
  const msg = (messages[activeConvId]||[]).find(m => m.id === msgId);
  if(!msg) return;
  const isOut = msg.sender === currentUserId;
  const canReact = true; // all roles can react
  const canReply = conv.type !== 'channel' || canPostInChannel(currentUserId);
  const canDelete = isOut;

  // Position reaction picker above the bubble
  const bubble = document.querySelector(`[data-msg-bubble="${msgId}"]`);
  const rect = bubble.getBoundingClientRect();
  const picker = $('#reactionPicker');
  const menu = $('#msgMenu');

  // Build menu
  const items = [];
  if(canReply) items.push({ic:'reply', label:'پاسخ', action:()=>{ replyingTo = msgId; closeMenus(); renderComposer(); }});
  items.push({ic:'copy', label:'کپی', action:()=>{ navigator.clipboard?.writeText(msg.body||''); toast('کپی شد'); closeMenus(); }});
  if(canDelete) items.push({ic:'trash', danger:true, label:'حذف پیام', action:()=>{
    messages[activeConvId] = messages[activeConvId].filter(m => m.id !== msgId);
    closeMenus(); renderMessages(); renderConvList();
  }});
  const icons = {
    reply:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17 4 12l5-5"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>`,
    copy:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>`,
    trash:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
  };
  menu.innerHTML = items.map((it,i) => `
    ${it.danger && i>0 ? '<hr>' : ''}
    <button class="${it.danger?'danger':''}" data-act="${i}">${icons[it.ic]}<span>${it.label}</span></button>
  `).join('');

  // Show reaction picker + menu, scrim
  $('#scrim').classList.add('open');
  picker.classList.add('open');
  menu.classList.add('open');

  // Position
  const pickerRect = picker.getBoundingClientRect();
  let pickerTop = rect.top - pickerRect.height - 10;
  if(pickerTop < 10) pickerTop = rect.bottom + 10;
  let pickerLeft = rect.left + (rect.width - pickerRect.width)/2;
  pickerLeft = Math.max(10, Math.min(window.innerWidth - pickerRect.width - 10, pickerLeft));
  picker.style.top = pickerTop + 'px';
  picker.style.left = pickerLeft + 'px';

  const menuRect = menu.getBoundingClientRect();
  let menuTop = rect.bottom + 10;
  if(menuTop + menuRect.height > window.innerHeight - 10) menuTop = rect.top - menuRect.height - 10;
  let menuLeft = isOut ? (rect.right - menuRect.width) : rect.left;
  menuLeft = Math.max(10, Math.min(window.innerWidth - menuRect.width - 10, menuLeft));
  menu.style.top = menuTop + 'px';
  menu.style.left = menuLeft + 'px';

  // Wire reactions
  picker.querySelectorAll('button').forEach(btn => {
    const my = msg.reactions?.find(r => r.user === currentUserId && r.r === btn.dataset.r);
    btn.classList.toggle('active', !!my);
    btn.onclick = () => {
      toggleReaction(msgId, btn.dataset.r);
      closeMenus();
    };
  });
  menu.querySelectorAll('button[data-act]').forEach(b => {
    b.onclick = () => items[parseInt(b.dataset.act)].action();
  });
}

function toggleReaction(msgId, r){
  const list = messages[activeConvId] || [];
  const msg = list.find(m => m.id === msgId);
  if(!msg) return;
  msg.reactions = msg.reactions || [];
  const mine = msg.reactions.find(x => x.user === currentUserId);
  if(mine && mine.r === r){
    // Tap same → remove
    msg.reactions = msg.reactions.filter(x => x.user !== currentUserId);
  } else if(mine){
    // Tap different → switch
    mine.r = r;
  } else {
    msg.reactions.push({ user: currentUserId, r });
  }
  renderMessages();
  renderConvList();
}

function closeMenus(){
  $('#scrim').classList.remove('open');
  $('#reactionPicker').classList.remove('open');
  $('#msgMenu').classList.remove('open');
}

/* ============================================================================

   ============================================================================ */
function openContactCard(studentId){
  const student = users[studentId];
  if(!student) return;
  // If already linked, just open existing DM
  const linked = (teacherStudents[currentUserId]||[]).includes(studentId);
  let dmConv = Object.values(conversations).find(c =>
    c.type === 'dm' && c.members.includes(currentUserId) && c.members.includes(studentId)
  );
  showModal({
    title: 'پروفایل هنرجو',
    bodyHtml: `
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;">
        ${avatarHTML(student, 'lg')}
        <div>
          <div style="font-size:18px;font-weight:700;">${escapeHtml(student.name)}</div>
          <div style="font-size:13px;color:var(--text-tertiary);margin-top:2px;">${ROLE_FA[student.role]}</div>
        </div>
      </div>
      ${!linked && !dmConv ? `<div style="padding:10px 14px;background:var(--accent-soft);border-radius:10px;font-size:12.5px;color:var(--accent);margin-bottom:14px;">
        💡 با ارسال اولین پیام، این هنرجو به لیست شما اضافه می‌شود
      </div>` : ''}
    `,
    footer:[
      {label:'بستن', cls:'btn-ghost', action: closeModal},
      {label:'شروع گفتگو', cls:'btn-primary', action: () => {
        if(!dmConv){
          // Auto-create teacher-student link
          if(currentUser.role === 'teacher' && !linked){
            teacherStudents[currentUserId] = teacherStudents[currentUserId] || [];
            teacherStudents[currentUserId].push(studentId);
            toast(`${student.name} به لیست شما اضافه شد`);
          }
          const newId = Math.max(...Object.keys(conversations).map(Number)) + 1;
          conversations[newId] = { id:newId, type:'dm', members:[currentUserId, studentId], createdBy:currentUserId };
          messages[newId] = [];
          dmConv = conversations[newId];
        }
        closeModal();
        openConv(dmConv.id);
      }}
    ]
  });
}

/* ============================================================================

function showModal({title, bodyHtml, footer=[], onMount}){
  const m = $('#modal');
  const card = $('#modalCard');
  card.innerHTML = `
    <div class="modal-header">
      <div class="modal-title">${escapeHtml(title)}</div>
      <button class="icon-btn" id="modalClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">${bodyHtml}</div>
    ${footer.length ? `<div class="modal-footer">${footer.map((f,i)=>`<button class="btn ${f.cls||''}" data-fa="${i}"${f.disabled?' disabled':''}>${escapeHtml(f.label)}</button>`).join('')}</div>` : ''}
  `;
  m.classList.add('open');
  $('#scrim').classList.add('open');
  $('#modalClose').onclick = closeModal;
  card.querySelectorAll('[data-fa]').forEach(b => {
    b.onclick = () => footer[parseInt(b.dataset.fa)].action();
  });
  if(onMount) onMount(card);
}
function closeModal(){
  $('#modal').classList.remove('open');
  $('#scrim').classList.remove('open');
}

          const recId = parseInt(r.dataset.rid);
          sendContactCard(studentId, recId);
        };
      });

function sendContactCard(studentId, recipientId){
  // Find or create DM with the recipient
  let dm = Object.values(conversations).find(c =>
    c.type === 'dm' && c.members.includes(currentUserId) && c.members.includes(recipientId));
  if(!dm){
    const id = Math.max(...Object.keys(conversations).map(Number)) + 1;
    conversations[id] = { id, type:'dm', members:[currentUserId, recipientId], createdBy:currentUserId };
    messages[id] = [];
    dm = conversations[id];
  }
  messages[dm.id].push({
    id: Date.now(), conv: dm.id, sender: currentUserId,
    contactCard:{ studentId }, t: new Date().toISOString(), reactions:[]
  });
  closeModal();
  openConv(dm.id);
  toast(`اطلاعات ${users[studentId].name} ارسال شد`);
}

    item.style.display = !q || name.includes(q) ? '' : 'none';
  });
});

$('#newConvBtn').onclick = showNewConvMenu;
$('#profileStrip').onclick = showSettings;
$('#backBtn').onclick = () => document.getElementById('app').classList.remove('chat-open');

$('#chatMoreBtn').onclick = () => {
  const conv = conversations[activeConvId];
  if(!conv) return;
  const items = [];
  if(conv.type === 'dm'){
    const other = users[conv.members.find(id => id !== currentUserId)];
    if(canShareContact(currentUserId) && other.role === 'student'){
      items.push({label:'اشتراک اطلاعات این هنرجو', action: () => {
        closeModal();
        showPickRecipient(other.id);
      }});
    }
  }
  if(conv.type === 'group' && (conv.createdBy === currentUserId || currentUser.role === 'admin')){
    items.push({label:'حذف گروه', danger:true, action:() => {
      delete conversations[activeConvId];
      delete messages[activeConvId];
      activeConvId = visibleConversations()[0]?.id || null;
      closeModal();
      renderConvList();
      if(activeConvId){ renderChatHeader(); renderMessages(); renderComposer(); }
      toast('گروه حذف شد');
    }});
  }
  if(conv.type === 'channel' && currentUser.role === 'admin'){
    items.push({label:'حذف کانال', danger:true, action:() => {
      delete conversations[activeConvId];
      delete messages[activeConvId];
      activeConvId = visibleConversations()[0]?.id || null;
      closeModal();
      renderConvList();
      if(activeConvId){ renderChatHeader(); renderMessages(); renderComposer(); }
      toast('کانال حذف شد');
    }});
  }
  if(items.length === 0){
    toast('عملیات قابل انجامی موجود نیست');
    return;
  }
  showModal({
    title:'گزینه‌ها',
    bodyHtml: `<div class="user-pick-list">${items.map((it,i)=>`
      <div class="user-pick-row" data-i="${i}" style="${it.danger?'color:var(--danger);':''}">
        <div class="pick-meta"><div class="pick-name">${escapeHtml(it.label)}</div></div>
      </div>`).join('')}</div>`,
    footer:[{label:'بستن', cls:'btn-ghost', action:closeModal}],
    onMount: card => {
      card.querySelectorAll('[data-i]').forEach(r => {
        r.onclick = () => items[parseInt(r.dataset.i)].action();
      });
    }
  });
};

// File input → simulated file message
$('#fileInput').onchange = e => {
  const f = e.target.files[0];
  if(!f) return;
  e.target.value = '';
  // Prompt for caption
  let captionInput = '';
  showModal({
    title:'ارسال فایل',
    bodyHtml: `
      <div style="margin-bottom:12px;padding:14px;background:var(--bg);border-radius:12px;display:flex;align-items:center;gap:12px;">
        <div style="width:46px;height:46px;border-radius:10px;background:var(--accent-soft);display:grid;place-items:center;color:var(--accent);">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(f.name)}</div>
          <div style="font-size:12px;color:var(--text-tertiary);margin-top:2px;">${fmtBytes(f.size)}</div>
        </div>
      </div>
      <textarea id="capInput" placeholder="افزودن توضیح (اختیاری)..." rows="2"
        style="width:100%;padding:11px 14px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);border-radius:10px;font-size:14px;outline:none;resize:none;font-family:inherit;"></textarea>
      ${f.size > 32*1024*1024 ? '<div style="margin-top:10px;color:var(--danger);font-size:12.5px;">⚠ فایل بزرگ‌تر از ۳۲ مگابایت است</div>' : ''}
    `,
    footer:[
      {label:'انصراف', cls:'btn-ghost', action: closeModal},
      {label:'ارسال', cls:'btn-primary', action: () => {
        if(f.size > 32*1024*1024){ toast('فایل بزرگ‌تر از ۳۲ مگابایت'); return; }
        const cap = $('#capInput').value.trim();
        const type = f.type.startsWith('image/') ? 'image'
                   : f.type.startsWith('video/') ? 'video'
                   : f.type.startsWith('audio/') ? 'audio' : 'document';
        messages[activeConvId].push({
          id: Date.now(), conv: activeConvId, sender: currentUserId,
          file:{ name:f.name, size:f.size, type, mime:f.type }, body: cap || null,
          t: new Date().toISOString(), reactions:[]
        });
        closeModal();
        renderMessages();
        renderConvList();
        requestAnimationFrame(()=>{ const m=$('#messages'); m.scrollTop = m.scrollHeight; });
      }}
    ]
  });
};

/* ============================================================================
   BOOT
   ============================================================================ */
(function init(){
  const savedTheme = localStorage.getItem('parsTheme');
  if(savedTheme) document.documentElement.dataset.theme = savedTheme;
  const savedBg = parseInt(localStorage.getItem('parsBg') || '1');
  activeBackground = savedBg;
  const bg = BACKGROUNDS.find(b => b.id === savedBg);
  if(bg) document.querySelector('.messages').style.background = bg.grad;

  applyProfileStrip();
  renderConvList();
  openConv(activeConvId);

  // Expose API for testing / debugging
  window.parsApp = {
    users, conversations, messages, teacherStudents,
    get currentUserId(){ return currentUserId; },
    setCurrentUser(id){ currentUserId = id; currentUser = users[id]; applyProfileStrip(); },
    visibleConversations, openConv, renderConvList,
    renderChatHeader, renderMessages, renderComposer,
    showSettings, showNewConvMenu
  };
})();
</script>
