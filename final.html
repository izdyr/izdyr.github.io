<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>پارس موزیک</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PARS MUSIC — quiet
   White, blue, grey. The bubbles do the talking. Nothing else.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

:root{
  --bg:        #ffffff;
  --bg-2:      #f7f7f7;

  --ink:       #000000;
  --ink-2:     #6a6a6e;
  --ink-3:     #8e8e93;
  --ink-4:     #c7c7cc;

  --hair:      #e5e5ea;

  --blue:      #007AFF;
  --blue-2:    #0A84FF;
  --grey:      #E9E9EB;

  --tap:       rgba(0,0,0,0.04);
  --tap-2:     rgba(0,0,0,0.08);

  --fa:        'Vazirmatn', -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  --ease:      cubic-bezier(0.32, 0.72, 0, 1);
  --quick:     140ms;
}

[data-dark]{
  --bg:        #000000;
  --bg-2:      #1c1c1e;
  --ink:       #ffffff;
  --ink-2:     #98989f;
  --ink-3:     #8e8e93;
  --ink-4:     #48484a;
  --hair:      #38383a;
  --blue:      #0A84FF;
  --blue-2:    #409CFF;
  --grey:      #26262a;
  --tap:       rgba(255,255,255,0.06);
  --tap-2:     rgba(255,255,255,0.10);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:var(--fa);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
button,textarea,input{font-family:inherit;background:none;border:none;cursor:pointer;color:inherit;}

.app{display:flex;height:100vh;height:100dvh;overflow:hidden;direction:ltr;}

/* ━━━ SIDEBAR ━━━ */
.sidebar{
  width:340px;flex-shrink:0;
  background:var(--bg-2);
  border-right:1px solid var(--hair);
  display:flex;flex-direction:column;
  direction:rtl;
}
@media(max-width:760px){
  .sidebar{
    width:100%;
    border-right:none;
    background:var(--bg);
  }
  .sidebar.off{display:none;}
  .chat{display:none;}
  .sidebar.off ~ .chat{display:flex;}
}

.sb-top{
  padding:48px 20px 12px;
  display:flex;flex-direction:column;gap:14px;
}
@supports(padding-top:env(safe-area-inset-top)){
  .sb-top{padding-top:calc(40px + env(safe-area-inset-top));}
}

.sb-row{display:flex;align-items:center;justify-content:space-between;}
.sb-title{font-size:28px;font-weight:700;letter-spacing:-0.6px;color:var(--ink);}

.ib{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--blue);
  transition:background var(--quick) var(--ease);
}
.ib:hover{background:var(--tap);}
.ib:active{background:var(--tap-2);}

.search{
  display:flex;align-items:center;gap:8px;
  background:var(--grey);
  border-radius:10px;
  padding:8px 12px;
}
.search svg{color:var(--ink-3);flex-shrink:0;}
.search input{
  background:none;border:none;outline:none;
  font-size:15px;color:var(--ink);width:100%;direction:rtl;
}
.search input::placeholder{color:var(--ink-3);}

.clist{flex:1;overflow-y:auto;padding-bottom:16px;}
.clist::-webkit-scrollbar{width:0;}

.crow{
  display:flex;align-items:center;gap:12px;
  padding:10px 20px;
  cursor:pointer;
  transition:background var(--quick) var(--ease);
  -webkit-user-select:none;user-select:none;
}
.crow:hover{background:var(--tap);}
.crow:active{background:var(--tap-2);}
.crow.active{background:var(--tap);}

.av{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:500;
  flex-shrink:0;position:relative;
  background:var(--grey);
  color:var(--ink-2);
}
.av.on::after{
  content:'';position:absolute;bottom:1px;right:1px;
  width:11px;height:11px;border-radius:50%;
  background:#34C759;
  border:2px solid var(--bg-2);
}
@media(max-width:760px){.av.on::after{border-color:var(--bg);}}

.cmeta{flex:1;min-width:0;}
.cr1{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;}
.cn{
  font-size:15.5px;font-weight:500;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:-0.1px;
}
.crow.unread .cn{font-weight:600;}
.ct{font-size:13px;color:var(--ink-3);flex-shrink:0;margin-right:8px;}
.cp{
  font-size:14px;color:var(--ink-3);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.35;
}
.crow.unread .cp{color:var(--ink-2);}

.badge{
  min-width:20px;height:20px;border-radius:99px;
  background:var(--blue);color:#fff;
  font-size:12px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  padding:0 6px;flex-shrink:0;
}

/* ━━━ CHAT PANEL ━━━ */
.chat{
  flex:1;display:flex;flex-direction:column;
  background:var(--bg);overflow:hidden;min-width:0;
  direction:ltr;
  position:relative;
  transition:opacity var(--quick) var(--ease);
}
.chat.switching{opacity:0;}

/* chat header — NO border. Pure float. */
/* chat header — frosted glass, FLOATING above the chat. Chat scrolls behind it. */
.ch{
  display:flex;align-items:center;
  padding:8px 16px;
  flex-shrink:0;min-height:56px;
  direction:rtl;
  position:absolute;top:0;left:0;right:0;
  z-index:5;
  /* frosted glass — light tint of bg color so the white chrome is just felt, not hard */
  background:color-mix(in srgb, var(--bg) 70%, transparent);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
}
/* soft fade below the header so the bubbles ghost into it, not slam into a hard edge */
.ch::after{
  content:'';
  position:absolute;left:0;right:0;top:100%;
  height:14px;
  background:linear-gradient(180deg,
    color-mix(in srgb, var(--bg) 60%, transparent) 0%,
    transparent 100%);
  pointer-events:none;
}
@supports(padding-top:env(safe-area-inset-top)){
  .ch{padding-top:calc(8px + env(safe-area-inset-top));min-height:calc(56px + env(safe-area-inset-top));}
}

.back-btn{
  display:none;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:50%;
  color:var(--blue);padding:0;
  margin-left:4px;
  transition:background var(--quick) var(--ease);
}
.back-btn:hover{background:var(--tap);}
.back-btn:active{background:var(--tap-2);}
@media(max-width:760px){.back-btn{display:flex;}}

.ch > .av{
  width:38px;height:38px;font-size:14px;
  margin-left:12px;
}

.ch-info{flex:1;min-width:0;}
.ch-name{font-size:16px;font-weight:600;letter-spacing:-0.2px;color:var(--ink);}
.ch-sub{font-size:13px;color:var(--ink-2);margin-top:1px;}

/* mobile: stacked centered title with avatar above, like the iMessage reference */
@media(max-width:760px){
  .ch{padding:8px 12px 12px;min-height:64px;}
  .ch > .av{display:none;}
  .ch-info{
    position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%);
    text-align:center;flex:0;
    display:flex;flex-direction:column;align-items:center;gap:2px;
    pointer-events:none;
  }
  .ch-mob-av{
    display:flex!important;
    width:32px;height:32px;border-radius:50%;
    align-items:center;justify-content:center;
    font-size:13px;font-weight:500;
    background:var(--grey);color:var(--ink-2);
    margin-bottom:2px;
  }
  .ch-name{font-size:11px;font-weight:500;color:var(--ink-2);letter-spacing:0;}
  .ch-sub{display:none;}
}
.ch-mob-av{display:none;}

/* ━━━ MESSAGES ━━━ */
.msgs{
  flex:1;overflow-y:auto;
  padding:72px 14px 84px;     /* top: header (56) + breathing room. bottom: input area + breath */
  display:flex;flex-direction:column;
  direction:ltr;
  overscroll-behavior:contain;
}
@supports(padding-top:env(safe-area-inset-top)){
  .msgs{padding-top:calc(64px + env(safe-area-inset-top));}
}
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .msgs{padding-bottom:calc(80px + env(safe-area-inset-bottom));}
}
.msgs::-webkit-scrollbar{width:0;}

/* day stamp — "Today 2:51 PM" */
.day-sep{
  display:flex;align-items:center;justify-content:center;
  margin:14px 0 12px;gap:6px;
}
.day-sep .when{font-size:12px;font-weight:600;color:var(--ink-2);}
.day-sep .at{font-size:12px;font-weight:400;color:var(--ink-3);}

/* ━━━ CLUSTERS ━━━ */
.cluster{
  display:flex;flex-direction:column;
  margin-bottom:8px;
  gap:2px;
}
.cluster.out{align-items:flex-end;padding-left:48px;}
.cluster.in {align-items:flex-start;padding-right:48px;padding-left:38px;position:relative;}

.sender-lbl{
  font-size:11px;color:var(--ink-2);
  margin-right:4px;margin-bottom:2px;
  direction:rtl;
}

.cl-av{
  position:absolute;left:0;bottom:0;
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:500;
  background:var(--grey);color:var(--ink-2);
}

/* ━━━ BUBBLES ━━━ */
.bubble{
  display:inline-block;
  padding:8px 14px;
  font-size:16px;line-height:1.35;
  max-width:min(74vw,560px);
  word-break:break-word;
  direction:rtl;
  cursor:default;
  position:relative;
  letter-spacing:-0.1px;
  animation:bub 160ms var(--ease) both;
}
@keyframes bub{
  from{opacity:0;transform:translateY(3px);}
  to  {opacity:1;transform:translateY(0);}
}
.bubble:active{opacity:.78;transition:opacity 80ms;}

.cluster.out .bubble{
  background:linear-gradient(180deg,var(--blue-2) 0%, var(--blue) 100%);
  color:#fff;
  border-radius:18px;
}
.cluster.out > div:last-child .bubble:not(.pill){
  border-radius:18px 18px 4px 18px;
}

.cluster.in .bubble{
  background:var(--grey);color:var(--ink);
  border-radius:18px;
}
.cluster.in > div:last-child .bubble:not(.pill){
  border-radius:18px 18px 18px 4px;
}

.bubble.pill{border-radius:999px!important;padding:9px 18px;}

/* meta — basically invisible, ticks only on the very last out bubble */
.bmeta{
  font-size:11px;color:var(--ink-3);
  margin-top:3px;padding:0 4px;
  display:flex;align-items:center;gap:5px;
  direction:ltr;
}
.cluster.out .bmeta{justify-content:flex-end;}
.cluster.in  .bmeta{display:none;}
.btime{display:none;}    /* no per-bubble timestamps. ever. */

/* ━━━ TICKS ━━━ */
.tick-wrap{
  display:inline-flex;align-items:center;
  width:14px;height:9px;
  position:relative;flex-shrink:0;
}
.tick-wrap svg{position:absolute;overflow:visible;}
.tick1{left:0;transition:left var(--quick) var(--ease);}
.tick-wrap.delivered .tick1,.tick-wrap.seen .tick1{left:-3px;}
.tick2{
  left:5px;opacity:0;transform:scale(.5);
  transition:opacity 160ms var(--ease) 30ms,transform 200ms var(--ease) 30ms;
}
.tick-wrap.delivered .tick2,.tick-wrap.seen .tick2{opacity:1;transform:scale(1);}
.tick-path{
  stroke:var(--ink-4);stroke-width:1.4;fill:none;
  stroke-linecap:round;stroke-linejoin:round;
}
.tick-wrap.seen .tick-path{stroke:var(--blue);}

/* ━━━ VOICE BUBBLE ━━━ */
.vbub{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  direction:ltr;
  max-width:min(74vw,300px);
  cursor:pointer;
  animation:bub 160ms var(--ease) both;
}
.cluster.out .vbub{
  background:linear-gradient(180deg,var(--blue-2) 0%, var(--blue) 100%);
  border-radius:18px 18px 4px 18px;
}
.cluster.in .vbub{
  background:var(--grey);
  border-radius:18px 18px 18px 4px;
}

.vplay{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity var(--quick) var(--ease);
}
.vplay:active{opacity:.7;}
.cluster.out .vplay{background:rgba(255,255,255,.22);}
.cluster.in  .vplay{background:rgba(0,0,0,.08);}
[data-dark] .cluster.in .vplay{background:rgba(255,255,255,.10);}

.ptri{width:0;height:0;border-style:solid;border-width:5px 0 5px 8px;margin-left:2px;}
.cluster.out .ptri{border-color:transparent transparent transparent #fff;}
.cluster.in  .ptri{border-color:transparent transparent transparent var(--ink);}

.wv{
  display:flex;align-items:center;gap:2.5px;
  height:28px;flex:1;position:relative;cursor:pointer;
}
.wbar{width:2.5px;border-radius:99px;flex-shrink:0;transition:background var(--quick);}
.cluster.out .wbar  {background:rgba(255,255,255,.32);}
.cluster.out .wbar.p{background:rgba(255,255,255,.95);}
.cluster.in  .wbar  {background:var(--ink-4);}
.cluster.in  .wbar.p{background:var(--ink-2);}

.vdur{font-size:12px;white-space:nowrap;flex-shrink:0;}
.cluster.out .vdur{color:rgba(255,255,255,.75);}
.cluster.in  .vdur{color:var(--ink-2);}

/* ━━━ BREAKPOINT — quiet ━━━ */
.bpin{
  position:absolute;top:-3px;bottom:-3px;width:1.5px;
  background:rgba(255,255,255,0.85);
  cursor:pointer;z-index:4;
  transition:transform var(--quick) var(--ease);
}
.cluster.in .bpin{background:var(--ink);}
.bpin::before{
  content:'';position:absolute;top:-4px;left:-3px;
  width:7px;height:7px;border-radius:50%;
  background:inherit;
}
.bpin:hover{transform:scaleX(2);}

/* Long-press ghost — appears on touch, grows over 500ms.
   While growing it shows the user "you're placing a marker here". */
.bpin.lp-ghost{
  pointer-events:none;
  z-index:5;
  animation:lp-grow 500ms var(--ease) forwards;
}
.bpin.lp-ghost::before{
  animation:lp-grow-dot 500ms var(--ease) forwards;
}
@keyframes lp-grow{
  from{opacity:0;transform:scaleX(0.5);}
  to  {opacity:1;transform:scaleX(2);}
}
@keyframes lp-grow-dot{
  from{transform:scale(0.3);}
  to  {transform:scale(1.4);}
}
/* Once the sheet opens, the ghost stays planted at full size */
.bpin.lp-ghost.lp-committed{
  animation:none;
  opacity:1;
  transform:scaleX(2);
}
.bpin.lp-ghost.lp-committed::before{
  transform:scale(1.4);
}

.btip{
  position:absolute;bottom:calc(100% + 8px);
  left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--bg);
  border-radius:10px;padding:8px 12px;
  width:200px;font-size:12px;line-height:1.5;
  display:none;z-index:20;
  white-space:normal;direction:rtl;pointer-events:none;
  animation:bub 160ms var(--ease) both;
  box-shadow:0 8px 24px rgba(0,0,0,0.18);
}
[data-dark] .btip{background:var(--grey);color:var(--ink);}
.btip.on{display:block;}
.btip-lbl{font-size:10px;font-weight:500;opacity:.6;margin-bottom:3px;}

.bpc{
  max-width:min(74vw,300px);
  padding:10px 14px;direction:rtl;
  border-radius:14px;
  position:relative;
  background:var(--grey);
  color:var(--ink);
  animation:bub 160ms var(--ease) both;
  transition:transform var(--quick) var(--ease),background var(--quick) var(--ease);
}
.bpc-clickable{cursor:pointer;}
.bpc-clickable:hover{
  background:color-mix(in srgb, var(--grey) 88%, var(--ink) 12%);
}
.bpc-clickable:active{transform:scale(0.98);}

/* When a jump-to lands, the source voice bubble flashes briefly so the user
   sees which voice the breakpoint belongs to. */
.vbub-flash{
  animation:vbub-flash 1200ms var(--ease);
}
@keyframes vbub-flash{
  0%   {box-shadow:0 0 0 0 rgba(0,122,255,0);}
  20%  {box-shadow:0 0 0 6px rgba(0,122,255,0.18);}
  100% {box-shadow:0 0 0 0 rgba(0,122,255,0);}
}
.cluster.out .bpc{
  border-radius:14px 14px 4px 14px;
}
.cluster.in .bpc{
  border-radius:14px 14px 14px 4px;
}
.bpc-lbl{
  font-size:11px;font-weight:500;
  margin-bottom:4px;
  display:flex;align-items:center;gap:5px;
  color:var(--ink-2);
}
.bpc-txt{font-size:15px;line-height:1.45;letter-spacing:-0.1px;color:var(--ink);}

.bpc-ref{
  display:flex;align-items:center;gap:8px;
  margin-top:8px;padding-top:8px;
  border-top:1px solid rgba(0,0,0,0.10);
  direction:ltr;
}
[data-dark] .bpc-ref{border-top-color:rgba(255,255,255,0.10);}

.bpc-ref-bars{display:flex;align-items:center;gap:1.5px;height:14px;flex:1;}
.bpc-ref-bar{width:2px;border-radius:99px;background:var(--ink-4);}
.bpc-ref-bar.hi{background:var(--ink-2);}
.bpc-ref-ts{font-size:11px;font-weight:500;white-space:nowrap;color:var(--ink-2);}

/* ━━━ TYPING ━━━ */
.typing-row{
  display:flex;align-items:flex-end;gap:0;
  padding-right:48px;padding-left:38px;
  margin-bottom:8px;position:relative;
}
.t-av{
  position:absolute;left:0;bottom:0;
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:500;
  background:var(--grey);color:var(--ink-2);
}
.tbub{
  background:var(--grey);
  border-radius:18px 18px 18px 4px;
  padding:14px 18px;
  display:flex;gap:5px;align-items:center;
  animation:bub 160ms var(--ease) both;
}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--ink-3);
  animation:dotup 1.4s ease-in-out infinite;
}
.dot:nth-child(2){animation-delay:.18s;}
.dot:nth-child(3){animation-delay:.36s;}
@keyframes dotup{
  0%,55%,100%{transform:translateY(0);opacity:.4;}
  27%{transform:translateY(-4px);opacity:1;}
}

/* ━━━ EMPTY STATES ━━━ */
.conv-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;
  direction:rtl;padding:80px 2rem 90px;
}
.conv-empty-av{
  width:80px;height:80px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:500;margin-bottom:14px;
  background:var(--grey);color:var(--ink-2);
}
.conv-empty-name{font-size:18px;font-weight:600;color:var(--ink);}
.conv-empty-hint{font-size:14px;color:var(--ink-3);margin-top:4px;}

.empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  color:var(--ink-3);text-align:center;padding:80px 2rem 90px;direction:rtl;
}
.e-ico{
  width:60px;height:60px;border-radius:50%;
  background:var(--grey);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:6px;
  color:var(--ink-3);
}
.e-ttl{font-size:17px;font-weight:600;color:var(--ink-2);}
.e-sub{font-size:14px;max-width:240px;line-height:1.5;color:var(--ink-3);}

/* ━━━ INPUT BAR ━━━ */
/* ━━━ INPUT BAR — floating, no background ━━━ */
.ibar{
  display:flex;align-items:center;
  gap:8px;
  padding:8px 12px;
  padding-bottom:calc(8px + env(safe-area-inset-bottom));
  flex-shrink:0;direction:rtl;
  /* float at the bottom of the chat panel */
  position:absolute;left:0;right:0;bottom:0;
  z-index:6;
  background:transparent;
}

/* progressive blur backdrop — stack of 4 layers, each with stronger blur,
   each masked to fade in from top. Result: sharp at top edge, heavy frost at bottom.
   This sits BEHIND the input, capturing the chat that scrolls under it. */
.ibar-bg{
  position:absolute;left:0;right:0;bottom:0;
  height:calc(86px + env(safe-area-inset-bottom));
  z-index:5;
  pointer-events:none;
}
.ibar-bg > div{
  position:absolute;inset:0;
}
/* Layer 1: lightest blur, full coverage, just a hint */
.ibar-bg .l1{
  backdrop-filter:blur(2px);
  -webkit-backdrop-filter:blur(2px);
  mask-image:linear-gradient(180deg, transparent 0%, #000 35%);
  -webkit-mask-image:linear-gradient(180deg, transparent 0%, #000 35%);
}
/* Layer 2: medium */
.ibar-bg .l2{
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  mask-image:linear-gradient(180deg, transparent 25%, #000 60%);
  -webkit-mask-image:linear-gradient(180deg, transparent 25%, #000 60%);
}
/* Layer 3: stronger */
.ibar-bg .l3{
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  mask-image:linear-gradient(180deg, transparent 50%, #000 80%);
  -webkit-mask-image:linear-gradient(180deg, transparent 50%, #000 80%);
}
/* Layer 4: heaviest, only at the very bottom — combined with a soft tint of bg */
.ibar-bg .l4{
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  background:color-mix(in srgb, var(--bg) 35%, transparent);
  mask-image:linear-gradient(180deg, transparent 70%, #000 100%);
  -webkit-mask-image:linear-gradient(180deg, transparent 70%, #000 100%);
}

.plus-btn{
  width:36px;height:36px;border-radius:50%;
  background:color-mix(in srgb, var(--grey) 90%, transparent);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  color:var(--ink-2);
  transition:background var(--quick) var(--ease);
}
.plus-btn:hover{background:var(--grey);}

.ishell{
  flex:1;display:flex;align-items:center;
  background:color-mix(in srgb, var(--bg) 75%, transparent);
  border:1px solid var(--hair);
  border-radius:22px;
  padding:6px 14px 6px 6px;
  gap:6px;
  direction:rtl;
  min-height:38px;
  position:relative;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  transition:border-color var(--quick) var(--ease),background var(--quick) var(--ease);
}
.ishell:focus-within{
  background:var(--bg);
  border-color:var(--ink-4);
}
.ibox{
  flex:1;background:none;border:none;outline:none;
  font-size:16px;color:var(--ink);resize:none;
  max-height:120px;line-height:1.4;direction:rtl;padding:3px 0;
}
.ibox::placeholder{color:var(--ink-3);}

.mic-inline{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-3);flex-shrink:0;
  transition:opacity var(--quick) var(--ease);
}

/* send button — only when text. blue circle. */
.send-btn{
  width:30px;height:30px;border-radius:50%;
  background:var(--blue);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:#fff;
  transition:transform var(--quick) var(--ease),opacity var(--quick) var(--ease);
  opacity:0;transform:scale(.6);pointer-events:none;
  position:absolute;
  left:6px;
}
.ishell.has-text .send-btn{
  opacity:1;transform:scale(1);pointer-events:auto;
}
.ishell.has-text .mic-inline{opacity:0;}
.send-btn:active{transform:scale(.88);}

/* ━━━ BOTTOM SHEET ━━━ */
.scrim{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.4);
  z-index:200;
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;
  transition:opacity 280ms var(--ease);
}
.scrim.on{opacity:1;pointer-events:all;}

.sheet{
  width:100%;max-width:540px;margin:0 auto;
  background:var(--bg);
  border-radius:18px 18px 0 0;
  padding:0 16px calc(16px + env(safe-area-inset-bottom));
  transform:translateY(110%);
  transition:transform 360ms var(--ease);
  direction:rtl;
}
.scrim.on .sheet{transform:translateY(0);}

.sh-handle{
  width:36px;height:5px;border-radius:99px;background:var(--ink-4);
  margin:8px auto 16px;
}
.sh-ttl{
  font-size:17px;font-weight:600;text-align:center;
  margin-bottom:3px;letter-spacing:-0.2px;
}
.sh-sub{
  font-size:13px;color:var(--ink-2);text-align:center;
  margin-bottom:16px;
}
.sh-prev{
  display:flex;align-items:center;gap:10px;direction:ltr;
  background:var(--grey);
  border-radius:12px;padding:10px 14px;margin-bottom:12px;
}
.sh-wv{display:flex;align-items:center;gap:2.5px;height:22px;flex:1;}
.sbar{width:2px;border-radius:99px;background:var(--ink-4);}
.sbar.hi{background:var(--ink);}

.sh-ta{
  width:100%;
  background:var(--grey);
  border:none;
  border-radius:12px;padding:12px 14px;
  font-size:15px;color:var(--ink);resize:none;outline:none;
  direction:rtl;line-height:1.55;min-height:90px;
  font-family:var(--fa);
}
.sh-ta::placeholder{color:var(--ink-3);}

.sh-acts{display:flex;gap:8px;margin-top:14px;direction:rtl;}
.sact{
  flex:1;padding:13px;border-radius:12px;
  font-size:16px;font-weight:600;
  transition:opacity var(--quick),background var(--quick);
}
.sact:active{opacity:.7;}
.sact.cancel{background:var(--grey);color:var(--ink);}
.sact.confirm{background:var(--blue);color:#fff;}

.sh-play{
  width:34px;height:34px;border-radius:50%;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;
}
.sh-play .ptri{
  border-color:transparent transparent transparent var(--ink);
  margin-left:1px;
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:0.01ms!important;
    transition-duration:0.01ms!important;
  }
}
</style>
</head>
<body>
<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sb">
    <div class="sb-top">

        <button class="ib" onclick="toggleTheme()">
          <svg id="theme-ico" width="16" height="16" viewBox="0 0 16 16" fill="none">

</div>

<!-- ══ BREAKPOINT SHEET ══ -->
<div class="scrim" id="scrim" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-ttl">نقطه توقف</div>
    <div class="sh-sub" id="sh-sub">در لحظه ۰:۰۰</div>
    <div class="sh-prev">

    <div class="sh-acts">
      <!-- FIX #14: confirm first in DOM = right side in RTL -->
      <button class="sact confirm" onclick="saveBp()">ثبت نقطه توقف</button>

<script>
/* ════════════════ HELPERS ════════════════ */
/* FIX #1: two-char initials from Persian name */
function initials(name){
  return name.trim()[0];
}

/* ════════════════ DATA ════════════════ */
const CONVS=[
  {id:1,name:'آراز نظری',    sub:'فلوت · سال دوم',     av:'ab',online:true, unread:0,time:'الان', prev:'پاسخ دادم'},
  {id:2,name:'نیلوفر رضایی', sub:'پیانو · سال سوم',    av:'at',online:false,unread:3,time:'۱۴:۳۲',prev:'ممنون استاد'},
  {id:3,name:'سینا محمدی',   sub:'تار · سال اول',      av:'aa',online:true, unread:0,time:'دیروز', prev:'فایل رو دیدم'},
  {id:4,name:'پریسا کریمی',  sub:'سه‌تار · سال چهارم', av:'ar',online:false,unread:1,time:'شنبه',  prev:'سؤال داشتم…'},
  {id:5,name:'کامیار هاشمی', sub:'ویولن · سال دوم',    av:'ap',online:false,unread:0,time:'جمعه',  prev:'نُت رو فرستادم'},
];
const MSGS={
  1:[
    {id:1,s:'in', type:'text', body:'سلام استاد',t:'۳:۵۰'},
    {id:2,s:'in', type:'text', body:'تمرین کردم امروز',t:'۳:۵۰'},
    {id:3,s:'in', type:'text', body:'یه ضبط فرستادم، نظر بدید',t:'۳:۵۱'},
    {id:4,s:'in', type:'voice',dur:24,t:'۳:۵۲',bps:[
      {pct:.33,ts:'۰:۰۸',note:'اینجا نفس‌گیری کوتاه بزن — قبل از اون فراز طولانی ریه رو پر کن'},
      {pct:.70,ts:'۰:۱۷',note:'آرنج دست چپ بالاتر — صدا داره خفه میشه'},
    ]},
    {id:5,s:'out',type:'text', body:'شنیدم آراز جان',t:'۴:۰۱',tickState:'seen'},
    {id:6,s:'out',type:'text', body:'خوب بود، دو جا نیاز به اصلاح داره',t:'۴:۰۱',tickState:'seen'},
    {id:7,s:'out',type:'bpc', bpTs:'۰:۰۸',note:'اینجا نفس‌گیری کوتاه بزن — قبل از اون فراز طولانی ریه رو پر کن',t:'۴:۰۲',tickState:'seen'},
    {id:8,s:'out',type:'bpc', bpTs:'۰:۱۷',note:'آرنج دست چپ بالاتر — صدا داره خفه میشه',t:'۴:۰۲',tickState:'seen'},
    {id:9,s:'in', type:'text', body:'ممنون استاد ❤️',t:'۴:۰۵'},
    {id:10,s:'in',type:'text', body:'الان دوباره تمرین می‌کنم',t:'۴:۰۵'},
  ],
  2:[
    {id:1,s:'in',type:'text',body:'استاد سلام',t:'۱۴:۳۰'},
    {id:2,s:'in',type:'text',body:'سؤال داشتم در مورد تمپوی قطعه',t:'۱۴:۳۱'},
    {id:3,s:'in',type:'text',body:'ممنون استاد',t:'۱۴:۳۲'},
  ],
  /* conversations 3,4,5 intentionally empty to show FIX #11 */
};

/* ════════════════ THEME ════════════════ */
let dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
function applyTheme(){
  document.documentElement.toggleAttribute('data-dark',dark);
  document.getElementById('theme-ico').innerHTML=dark
    ?'<path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>'
    :'<path d="M8 1v1M8 14v1M1 8h1M14 8h1M3.05 3.05l.7.7M12.25 12.25l.7.7M3.05 12.95l.7-.7M12.25 3.75l.7-.7M11 8a3 3 0 11-6 0 3 3 0 016 0z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>';
}
function toggleTheme(){dark=!dark;applyTheme();}
applyTheme();

/* ════════════════ SIDEBAR ════════════════ */
let activeId=null;
function renderSidebar(filter){
  const items=filter?CONVS.filter(c=>c.name.includes(filter)||c.sub.includes(filter)):CONVS;
  document.getElementById('clist').innerHTML=items.map(c=>`
    <div class="crow${activeId===c.id?' active':''}${c.unread?' unread':''}" onclick="openConv(${c.id})">
      <div class="av${c.online?' on':''}">${initials(c.name)}</div>
      <div class="cmeta">
        <div class="cr1">
          <span class="cn">${c.name}</span>
          <span class="ct">${c.time}</span>
        </div>
        <div class="cp">${c.prev}</div>
      </div>
      ${c.unread?`<div class="badge">${c.unread}</div>`:''}
    </div>`).join('');
}
function filterConvs(v){renderSidebar(v);}

/* ════════════════ OPEN CONV ════════════ */
function openConv(id){
  const chat=document.getElementById('chat');

  /* FIX: smooth conversation switch fade */
  if(activeId!==id){
    chat.classList.add('switching');
  }

  activeId=id;
  const conv=CONVS.find(c=>c.id===id);
  conv.unread=0;renderSidebar();
  if(window.innerWidth<=760) document.getElementById('sb').classList.add('off');

  const msgs=MSGS[id]||[];
  const isEmpty=msgs.length===0;

  /* FIX #11: empty conversation state uses conv avatar+name */
  const chatBody=isEmpty
    ?`<div class="conv-empty">
        <div class="conv-empty-av">${initials(conv.name)}</div>
        <div class="conv-empty-name">${conv.name}</div>
        <div class="conv-empty-hint">شروع مکالمه</div>
      </div>`
    :`<div class="msgs" id="msgs">
        <div class="day-sep"><span class="when">امروز</span><span class="at">۱۴:۳۲</span></div>
        <div id="clusters"></div>
        <div id="tr" class="typing-row" style="display:none">
          <div class="t-av">${initials(conv.name)}</div>
          <div class="tbub"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
        <div style="height:6px"></div>
      </div>`;

  setTimeout(()=>{
    chat.innerHTML=`
      <div class="ch">
        <button class="back-btn" onclick="goBack()" aria-label="back">
          <svg width="11" height="18" viewBox="0 0 11 18" fill="none">
            <path d="M9 1.5L1.5 9l7.5 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="av" style="flex-shrink:0">${initials(conv.name)}</div>
        <div class="ch-info">
          <div class="ch-mob-av">${initials(conv.name)}</div>
          <div class="ch-name">${conv.name}</div>
          <div class="ch-sub">${conv.sub}</div>
        </div>
        <button class="ib" style="flex-shrink:0;margin-right:auto" aria-label="info">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="10" cy="6.5" r="0.8" fill="currentColor"/>
            <path d="M10 9v6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      ${chatBody}
      <div class="ibar-bg" aria-hidden="true">
        <div class="l1"></div>
        <div class="l2"></div>
        <div class="l3"></div>
        <div class="l4"></div>
      </div>
      <div class="ibar">
        <button class="plus-btn" aria-label="more">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="ishell" id="ishell">
          <textarea class="ibox" id="ibox" rows="1"
            placeholder="iMessage"
            onkeydown="handleKey(event)"
            oninput="autoResize(this);updateSendBtn()"></textarea>
          <button class="mic-inline" id="mic-btn" onclick="sendVoice()" aria-label="record voice">
            <svg width="14" height="17" viewBox="0 0 14 17" fill="none">
              <rect x="4" y="1" width="6" height="9" rx="3" stroke="currentColor" stroke-width="1.5"/>
              <path d="M1 9a6 6 0 0012 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M7 15v1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="send-btn" id="send-btn" onclick="sendText()" aria-label="send">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M6.5 11V2M6.5 2L2.5 6M6.5 2l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>`;
    chat.classList.remove('switching');
    if(!isEmpty){renderClusters();scrollBot();}

    if(id===1){
      setTimeout(()=>{
        const tr=document.getElementById('tr');
        if(tr){tr.style.display='flex';scrollBot();}
        setTimeout(()=>{if(tr)tr.style.display='none';},3000);
      },2200);
    }
  },120); /* wait for fade-out */
}
function goBack(){document.getElementById('sb').classList.remove('off');}

/* ════════════════ CLUSTERS ════════════ */
function renderClusters(){
  const msgs=MSGS[activeId]||[];
  const container=document.getElementById('clusters');
  if(!container)return;

  const groups=[];let cur=null;
  msgs.forEach(m=>{
    if(!cur||cur.s!==m.s){cur={s:m.s,items:[]};groups.push(cur);}
    cur.items.push(m);
  });

  const conv=CONVS.find(c=>c.id===activeId);

  container.innerHTML=groups.map(g=>{
    const rows=g.items.map((m,mi)=>{
      const isLast=mi===g.items.length-1;
      return buildRow(m,isLast,g.s);
    }).join('');
    /* FIX #1: use initials() for cl-av */
    const av=g.s==='in'
      ?`<div class="cl-av">${initials(conv.name)}</div>`:'';
    return `<div class="cluster ${g.s}">${av}${rows}</div>`;
  }).join('');

  msgs.forEach(m=>{
    if(m.type==='voice'){
      const wvel=document.getElementById('wv-'+m.id);
      if(wvel){buildWave(wvel,40,m.id);if(m.bps?.length)addPins(wvel,m.bps);}
    }
  });
}

function buildRow(m,isLast,side){
  let inner='';
  if(m.type==='text'){
    const pill=m.body.replace(/\s/g,'').length<=8;
    inner=`<div class="bubble${pill?' pill':''}">${m.body}</div>`;

  }else if(m.type==='voice'){
    inner=`<div class="vbub" id="vb-${m.id}"
      onmousedown="lpStart(event,'vb-${m.id}',${m.dur})"
      onmouseup="lpEnd()" onmouseleave="lpEnd()"
      ontouchstart="lpStart(event,'vb-${m.id}',${m.dur})"
      ontouchmove="lpMove(event)"
      ontouchend="lpEnd()"
      ontouchcancel="lpEnd()">
      <button class="vplay" onclick="event.stopPropagation();togglePlay('vb-${m.id}',${m.dur})">
        <div class="ptri"></div>
      </button>
      <div class="wv" id="wv-${m.id}" onclick="scrub(event,'vb-${m.id}',${m.dur})"></div>
      <span class="vdur" id="vd-${m.id}">${fmt(m.dur)}</span>
    </div>`;

  }else if(m.type==='bpc'){
    /* mini waveform reference bars inside card */
    const refBars=Array.from({length:20},(_,i)=>{
      const h=4+Math.abs(Math.sin(i*.47+2)*10);
      const isHi=i>=6&&i<=9;
      return `<div class="bpc-ref-bar${isHi?' hi':''}" style="height:${Math.round(h)}px"></div>`;
    }).join('');
    const jumpAttr=m.srcId?`onclick="jumpToBp(${m.srcId},${m.srcPct||0})"`:'';
    inner=`<div class="bpc${m.srcId?' bpc-clickable':''}" ${jumpAttr}>
      <div class="bpc-lbl">
        <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
          <circle cx="4.5" cy="4.5" r="3.5" stroke="currentColor" stroke-width="1"/>
          <path d="M4.5 2.5v2l1 1" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
        </svg>
        نقطه توقف · ${m.bpTs}
      </div>
      <div class="bpc-txt">${m.note}</div>
      <div class="bpc-ref">
        <span class="bpc-ref-ts">${m.bpTs}</span>
        <div class="bpc-ref-bars">${refBars}</div>
      </div>
    </div>`;
  }

  const tickHtml=side==='out'?tickSVG(m.tickState||'seen'):'';
  const meta=isLast
    ?`<div class="bmeta"><span class="btime">${m.t}</span>${tickHtml}</div>`:'';
  return `<div data-msgid="${m.id}">${inner}${meta}</div>`;
}

/* ════════════════ WAVEFORM ════════════ */
function buildWave(el,n,seed){
  el.innerHTML='';
  for(let i=0;i<n;i++){
    const h=4+Math.abs(Math.sin(i*.47+seed)*20)+Math.abs(Math.sin(i*.13+seed*2)*7);
    const b=document.createElement('div');
    b.className='wbar';b.style.height=Math.round(h)+'px';el.appendChild(b);
  }
}
function buildSheetWave(pct){
  const el=document.getElementById('sh-wv');el.innerHTML='';
  for(let i=0;i<30;i++){
    const h=4+Math.abs(Math.sin(i*.47+1.2)*14);
    const b=document.createElement('div');
    b.className='sbar'+(i/30<pct?' hi':'');b.style.height=Math.round(h)+'px';
    el.appendChild(b);
  }
}

/* ════════════════ PINS ════════════════ */
function addPins(wvel,bps){
  bps.forEach(bp=>{
    const pin=document.createElement('div');
    pin.className='bpin';pin.style.left=(bp.pct*100)+'%';
    const tip=document.createElement('div');
    tip.className='btip';
    tip.innerHTML=`<div class="btip-lbl">
      <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><circle cx="4.5" cy="4.5" r="3.5" stroke="currentColor" stroke-width="1"/><path d="M4.5 2.5v2l1 1" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
      نقطه توقف · ${bp.ts}
    </div>${bp.note}`;
    pin.appendChild(tip);
    pin.addEventListener('click',e=>{
      e.stopPropagation();
      document.querySelectorAll('.btip').forEach(t=>t!==tip&&t.classList.remove('on'));
      tip.classList.toggle('on');
    });
    wvel.appendChild(pin);
  });
}

/* ════════════════ PLAY ════════════════ */
let playId=null,playIv=null,playPos={};
function togglePlay(vbId,dur){
  if(playId===vbId){stopPlay();return;}
  stopPlay();playId=vbId;
  const bars=document.querySelectorAll(`#${vbId} .wbar`);
  const durEl=document.getElementById(vbId.replace('vb-','vd-'));
  let i=playPos[vbId]||0;
  bars.forEach((b,bi)=>bi<i?b.classList.add('p'):b.classList.remove('p'));
  playIv=setInterval(()=>{
    if(i>=bars.length){stopPlay();playPos[vbId]=0;if(durEl)durEl.textContent=fmt(dur);return;}
    bars[i].classList.add('p');
    if(durEl)durEl.textContent=fmt(Math.round((i/bars.length)*dur));
    i++;playPos[vbId]=i;
  },58);
}
function stopPlay(){clearInterval(playIv);playId=null;}
function scrub(e,vbId,dur){
  e.stopPropagation();
  const wv=document.querySelector(`#${vbId} .wv`);
  const r=wv.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  const bars=wv.querySelectorAll('.wbar');
  const tgt=Math.round(pct*bars.length);
  bars.forEach((b,i)=>i<tgt?b.classList.add('p'):b.classList.remove('p'));
  playPos[vbId]=tgt;
}

/* ════════════════ JUMP TO BREAKPOINT ═
   Tap a bpc card → scrolls to the source voice message, highlights briefly,
   plays from the breakpoint moment. */
function jumpToBp(srcId,pct){
  const vbEl=document.getElementById('vb-'+srcId);
  if(!vbEl)return;

  vbEl.scrollIntoView({behavior:'smooth',block:'center'});

  vbEl.classList.add('vbub-flash');
  setTimeout(()=>vbEl.classList.remove('vbub-flash'),1200);

  const vbId='vb-'+srcId;
  stopPlay();
  const bars=document.querySelectorAll(`#${vbId} .wbar`);
  const startIndex=Math.floor(pct*bars.length);
  playPos[vbId]=startIndex;
  bars.forEach((b,bi)=>bi<startIndex?b.classList.add('p'):b.classList.remove('p'));

  setTimeout(()=>{
    const m=(MSGS[activeId]||[]).find(x=>x.id===srcId);
    const dur=m?m.dur:24;
    togglePlay(vbId,dur);
  },420);
}

/* ════════════════ LONG PRESS → SHEET ═ */
let lpTimer=null,pendingBp=null,lpMarkerEl=null,lpStartXY=null;

function lpStart(e,vbId,dur){
  // create a ghost marker at the press location IMMEDIATELY for tactile feedback
  const wv=document.querySelector(`#${vbId} .wv`);
  if(!wv)return;
  const r=wv.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  const pct=Math.max(0,Math.min(1,(cx-r.left)/r.width));
  const ts=fmt(Math.round(pct*dur));

  lpStartXY={x:cx,y:cy};

  // ghost marker — pulses up to full size over 500ms
  cancelLpMarker();
  const ghost=document.createElement('div');
  ghost.className='bpin lp-ghost';
  ghost.style.left=(pct*100)+'%';
  wv.appendChild(ghost);
  lpMarkerEl=ghost;

  lpTimer=setTimeout(()=>{
    // commit — open the sheet
    pendingBp={vbId,pct,ts};
    document.getElementById('sh-sub').textContent='در لحظه '+ts;
    buildSheetWave(pct);
    document.getElementById('sh-note').value='';
    document.getElementById('scrim').classList.add('on');
    setTimeout(()=>document.getElementById('sh-note').focus(),350);
    if(lpMarkerEl)lpMarkerEl.classList.add('lp-committed');
  },500);
}

function lpMove(e){
  // cancel long-press if finger moves enough to look like a scroll/swipe
  if(!lpStartXY||!lpTimer)return;
  const t=e.touches&&e.touches[0];
  if(!t)return;
  const dx=t.clientX-lpStartXY.x;
  const dy=t.clientY-lpStartXY.y;
  if(dx*dx+dy*dy>100){    // 10px radius
    lpEnd();
  }
}

function lpEnd(){
  if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}
  lpStartXY=null;
  if(!document.getElementById('scrim').classList.contains('on')){
    cancelLpMarker();
  }
}

function cancelLpMarker(){
  if(lpMarkerEl&&lpMarkerEl.parentNode){
    lpMarkerEl.parentNode.removeChild(lpMarkerEl);
  }
  lpMarkerEl=null;
}

function closeSheet(e){
  if(e&&e.target!==document.getElementById('scrim'))return;
  document.getElementById('scrim').classList.remove('on');
  cancelLpMarker();
  pendingBp=null;
}
function saveBp(){
  const note=document.getElementById('sh-note').value.trim();
  if(!note||!pendingBp){document.getElementById('sh-note').focus();return;}
  const{vbId,pct,ts}=pendingBp;

  // find the source voice message and persist the breakpoint into its bps array
  const srcId=Number(vbId.replace(/^vb-/,''));
  const msgs=MSGS[activeId]=MSGS[activeId]||[];
  const srcMsg=msgs.find(m=>m.id===srcId);
  if(srcMsg){
    srcMsg.bps=srcMsg.bps||[];
    srcMsg.bps.push({pct,ts,note});
  }

  // emit a breakpoint card message that references the source voice
  msgs.push({
    id:Date.now(),
    s:'out',type:'bpc',
    bpTs:ts,note,
    srcId,                  // ← new: reference to source voice message
    srcPct:pct,             // ← new: position within source
    t:'الان',tickState:'seen'
  });

  // close the sheet, clear pending state, re-render
  document.getElementById('scrim').classList.remove('on');
  cancelLpMarker();
  pendingBp=null;
  renderClusters();scrollBot();
}

/* ════════════════ TICK SVG ════════════ */
function tickSVG(state){
  const cls=state==='delivered'?' delivered':state==='seen'?' seen':'';
  return `<span class="tick-wrap${cls}">
    <svg class="tick1" width="11" height="11" viewBox="0 0 11 11" fill="none">
      <path class="tick-path" d="M1.5 5.5L4 8.5L9.5 2.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg class="tick2" width="11" height="11" viewBox="0 0 11 11" fill="none">
      <path class="tick-path" d="M1.5 5.5L4 8.5L9.5 2.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>`;
}

/* ════════════════ SEND ════════════════ */
function sendText(){
  const box=document.getElementById('ibox');
  if(!box||!activeId)return;
  const txt=box.value.trim();if(!txt)return;

  /* if conversation was empty, rebuild with messages area */
  const msgs=MSGS[activeId]=MSGS[activeId]||[];
  const wasEmpty=msgs.length===0;

  const id=Date.now();
  msgs.push({id,s:'out',type:'text',body:txt,t:'الان',tickState:'sending'});
  const conv=CONVS.find(c=>c.id===activeId);
  if(conv){conv.prev=txt;conv.time='الان';}
  box.value='';box.style.height='';updateSendBtn();

  if(wasEmpty){
    /* re-open conversation to build the messages area */
    openConv(activeId);
  }else{
    renderClusters();renderSidebar();scrollBot();
  }

  setTimeout(()=>advanceTick(id,'delivered'),900);
  setTimeout(()=>advanceTick(id,'seen'),2200);
}

function advanceTick(msgId,newState){
  const msgs=MSGS[activeId]||[];
  const m=msgs.find(x=>x.id===msgId);
  if(m) m.tickState=newState;
  const row=document.querySelector(`[data-msgid="${msgId}"]`);
  if(!row)return;
  const tw=row.querySelector('.tick-wrap');
  if(!tw)return;
  tw.classList.remove('delivered','seen');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    if(newState==='delivered'||newState==='seen') tw.classList.add('delivered');
    if(newState==='seen') tw.classList.add('seen');
  }));
}

function sendVoice(){
  if(!activeId)return;
  const msgs=MSGS[activeId]=MSGS[activeId]||[];
  msgs.push({id:Date.now(),s:'out',type:'voice',dur:9,t:'الان',bps:[],tickState:'seen'});
  renderClusters();scrollBot();
}

function updateSendBtn(){
  const box=document.getElementById('ibox');
  const shell=document.getElementById('ishell');
  if(!box||!shell)return;
  shell.classList.toggle('has-text',box.value.trim().length>0);
}
function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    const box=document.getElementById('ibox');
    if(box&&box.value.trim()) sendText();
  }
}
function autoResize(el){el.style.height='';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function scrollBot(){const m=document.getElementById('msgs');if(m)m.scrollTop=m.scrollHeight;}
function fmt(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}

document.addEventListener('click',e=>{
  if(!e.target.closest('.bpin'))
    document.querySelectorAll('.btip').forEach(t=>t.classList.remove('on'));
});

renderSidebar();
openConv(1);
</script>
