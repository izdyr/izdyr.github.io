<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>آموزشگاه موسیقی پارس</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="assests/F43E8EA3-3B0B-422F-89DC-A4E72E51E18E.ico" src="pars.png" >
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOKENS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  --acc:     #1a8cf0;
  --acc-dim: rgba(26,140,240,0.13);
  --green:   #28c76f;
  --amber:   #f59e0b;

  --bg:      #faf9f7;
  --surface: #ffffff;
  --s2:      #f2f0ec;
  --s3:      #e5e2db;
  --div:     rgba(0,0,0,0.07);
  --div2:    rgba(0,0,0,0.12);
  --t1:      #1c1917;
  --t2:      #78716c;
  --t3:      #a8a29e;

  /* MY bubbles = BLUE = RIGHT */
  --out-bg:  #1a8cf0;
  --out-t:   #ffffff;
  /* THEIR bubbles = GREY = LEFT */
  --in-bg:   #e8e5df;
  --in-t:    #1c1917;

  --glass:   rgba(250,249,247,0.86);
  --inp:     #f2f0ec;
}
[data-dark] {
  --bg:      #161412;
  --surface: #1e1b18;
  --s2:      #262320;
  --s3:      #302c28;
  --div:     rgba(255,255,255,0.07);
  --div2:    rgba(255,255,255,0.12);
  --t1:      #f0ebe5;
  --t2:      #9e9890;
  --t3:      #5e5a55;
  --in-bg:   #2a2622;
  --in-t:    #f0ebe5;
  --glass:   rgba(22,20,18,0.86);
  --inp:     #262320;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESET
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Vazirmatn',-apple-system,sans-serif;
  background:var(--bg);color:var(--t1);
  -webkit-font-smoothing:antialiased;
  transition:background .25s,color .25s;
}
button,textarea{font-family:inherit;background:none;border:none;cursor:pointer;}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   APP — direction:ltr so
   flex-end  = physical RIGHT
   flex-start= physical LEFT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.app{
  display:flex;height:100dvh;overflow:hidden;
  direction:ltr; /* override html rtl for layout only */
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SIDEBAR
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sidebar{
  width:300px;flex-shrink:0;
  background:var(--surface);
  border-right:.5px solid var(--div);
  display:flex;flex-direction:column;
  direction:rtl; /* RTL text inside */
  transition:background .25s;
}
@media(max-width:700px){
  .sidebar{
    position:absolute;inset:0;width:100%;z-index:30;
    transition:transform .3s cubic-bezier(.32,.72,0,1),background .25s;
  }
  .sidebar.off{transform:translateX(100%);}
}

.sb-top{
  padding:52px 16px 12px;
  border-bottom:.5px solid var(--div);
  display:flex;flex-direction:column;gap:10px;
}
@supports(padding-top:env(safe-area-inset-top)){
  .sb-top{padding-top:calc(44px + env(safe-area-inset-top));}
}
.sb-row{display:flex;align-items:center;justify-content:space-between;}
.sb-title{font-size:22px;font-weight:600;letter-spacing:-.5px;}

.ib{
  width:32px;height:32px;border-radius:50%;
  background:var(--s2);
  display:flex;align-items:center;justify-content:center;
  color:var(--t2);transition:background .12s,color .12s,transform .1s;
}
.ib:hover{background:var(--s3);color:var(--t1);}
.ib:active{transform:scale(.9);}

.search{
  display:flex;align-items:center;gap:8px;
  background:var(--s2);border-radius:12px;
  padding:8px 12px;border:.5px solid var(--div);
  transition:border-color .15s,background .25s;
}
.search:focus-within{border-color:var(--acc);}
.search svg{color:var(--t3);flex-shrink:0;}
.search input{
  background:none;border:none;outline:none;
  font-size:14px;color:var(--t1);width:100%;direction:rtl;
}
.search input::placeholder{color:var(--t3);}

.clist{flex:1;overflow-y:auto;}
.clist::-webkit-scrollbar{width:3px;}
.clist::-webkit-scrollbar-thumb{background:var(--div2);border-radius:99px;}

.crow{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;border-bottom:.5px solid var(--div);
  cursor:pointer;transition:background .1s;
}
.crow:hover{background:var(--s2);}
.crow.active{background:var(--acc-dim);}
.crow.active .cn{color:var(--acc);}

.av{
  width:46px;height:46px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:600;flex-shrink:0;position:relative;
}
.av.on::after{
  content:'';position:absolute;bottom:1px;right:1px;
  width:11px;height:11px;border-radius:50%;
  background:var(--green);border:2px solid var(--surface);
}
.cmeta{flex:1;min-width:0;}
.cr1{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;}
.cn{font-size:14px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ct{font-size:11px;color:var(--t3);flex-shrink:0;margin-right:6px;}
.cp{font-size:13px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{
  min-width:18px;height:18px;border-radius:99px;
  background:var(--acc);color:#fff;
  font-size:11px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  padding:0 5px;flex-shrink:0;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CHAT PANEL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.chat{
  flex:1;display:flex;flex-direction:column;
  background:var(--bg);overflow:hidden;min-width:0;
  direction:ltr; /* CRITICAL — physical left/right */
  transition:background .25s;
}

/* header — RTL inside for Persian text */
.ch{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;
  background:var(--glass);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:.5px solid var(--div);
  flex-shrink:0;min-height:60px;
  direction:rtl;
  transition:background .25s;
}
@supports(padding-top:env(safe-area-inset-top)){
  .ch{padding-top:calc(10px + env(safe-area-inset-top));}
}
.back-btn{
  display:none;align-items:center;gap:3px;
  color:var(--acc);font-size:16px;padding:4px;
  order:-1;
}
@media(max-width:700px){.back-btn{display:flex;}}
.ch-info{flex:1;min-width:0;}
.ch-name{font-size:15px;font-weight:600;letter-spacing:-.2px;}
.ch-sub{font-size:12px;color:var(--t2);margin-top:1px;}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MESSAGES LIST
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.msgs{
  flex:1;overflow-y:auto;
  padding:12px 10px 4px;
  display:flex;flex-direction:column;
  direction:ltr; /* bubbles: flex-end=RIGHT, flex-start=LEFT */
  overscroll-behavior:contain;
}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:var(--div2);border-radius:99px;}

.day-sep{
  text-align:center;font-size:11px;color:var(--t3);
  margin:6px 0 10px;
  display:flex;align-items:center;gap:8px;
}
.day-sep::before,.day-sep::after{content:'';flex:1;height:.5px;background:var(--div2);}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CLUSTERS  —  THE FIX

   direction:ltr is set on .msgs
   .cluster.out → align-items:flex-end  = RIGHT ✓
   .cluster.in  → align-items:flex-start = LEFT  ✓
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.cluster{
  display:flex;flex-direction:column;
  margin-bottom:12px;gap:2px;
}
/* OUT = me = RIGHT */
.cluster.out{
  align-items:flex-end;
  padding-left:52px;
}
/* IN = them = LEFT */
.cluster.in{
  align-items:flex-start;
  padding-right:52px;
  padding-left:36px;
  position:relative;
}
/* avatar anchored physically bottom-left */
.cl-av{
  position:absolute;left:4px;bottom:22px;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BUBBLE GEOMETRY
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.bubble{
  display:inline-block;
  padding:9px 14px;
  font-size:15px;line-height:1.4;
  max-width:min(72vw,300px);
  word-break:break-word;
  direction:rtl; /* text is always RTL */
  cursor:default;
  animation:bpop .26s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes bpop{
  from{opacity:0;transform:scale(.82) translateY(6px);}
  to  {opacity:1;transform:scale(1)   translateY(0);}
}
.bubble:active{opacity:.75;transition:opacity .08s;}

/* ── OUT: BLUE, RIGHT, tail bottom-right corner ── */
.cluster.out .bubble{
  background:var(--out-bg);
  color:var(--out-t);
  transform-origin:bottom right;
}
.cluster.out .bubble:not(.pill){border-radius:18px 18px 4px 18px;}
.cluster.out .bubble.mid:not(.pill){border-radius:18px 18px 6px 18px;}

/* ── IN: GREY, LEFT, tail bottom-left corner ── */
.cluster.in .bubble{
  background:var(--in-bg);
  color:var(--in-t);
  transform-origin:bottom left;
}
.cluster.in .bubble:not(.pill){border-radius:18px 18px 18px 4px;}
.cluster.in .bubble.mid:not(.pill){border-radius:18px 18px 18px 6px;}

/* pill = very short message */
.bubble.pill{border-radius:999px!important;padding:8px 16px;}

/* time + ticks */
.bmeta{
  font-size:10px;color:var(--t3);
  margin-top:3px;padding:0 3px;
  display:flex;align-items:center;gap:3px;
  direction:ltr;
}
.cluster.out .bmeta{justify-content:flex-end;}
.cluster.in  .bmeta{justify-content:flex-start;}
.tick{font-size:11px;}
.tick.seen{color:var(--acc);}
.tick.sent{color:var(--t3);}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   VOICE BUBBLE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.vbub{
  display:flex;align-items:center;gap:9px;
  padding:10px 12px;
  direction:ltr;
  max-width:min(72vw,280px);
  cursor:pointer;
  animation:bpop .26s cubic-bezier(0.34,1.56,0.64,1) both;
}
.cluster.out .vbub{
  background:var(--out-bg);
  border-radius:18px 18px 4px 18px;
  transform-origin:bottom right;
}
.cluster.in .vbub{
  background:var(--in-bg);
  border-radius:18px 18px 18px 4px;
  transform-origin:bottom left;
}
.vplay{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform .1s;
}
.vplay:active{transform:scale(.88);}
.cluster.out .vplay{background:rgba(255,255,255,.22);}
.cluster.in  .vplay{background:rgba(0,0,0,.1);}
[data-dark] .cluster.in .vplay{background:rgba(255,255,255,.1);}

.ptri{width:0;height:0;border-style:solid;border-width:5px 0 5px 9px;margin-left:2px;}
.cluster.out .ptri{border-color:transparent transparent transparent rgba(255,255,255,.9);}
.cluster.in  .ptri{border-color:transparent transparent transparent var(--t2);}

.wv{
  display:flex;align-items:center;gap:2px;
  height:28px;flex:1;position:relative;cursor:pointer;
}
.wbar{width:2.5px;border-radius:99px;flex-shrink:0;transition:background .1s;}
.cluster.out .wbar  {background:rgba(255,255,255,.28);}
.cluster.out .wbar.p{background:rgba(255,255,255,.9);}
.cluster.in  .wbar  {background:rgba(0,0,0,.14);}
.cluster.in  .wbar.p{background:var(--acc);}
[data-dark] .cluster.in .wbar  {background:rgba(255,255,255,.18);}
[data-dark] .cluster.in .wbar.p{background:var(--acc);}

.vdur{font-size:11px;white-space:nowrap;flex-shrink:0;}
.cluster.out .vdur{color:rgba(255,255,255,.6);}
.cluster.in  .vdur{color:var(--t3);}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BREAKPOINT PINS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.bpin{
  position:absolute;top:0;bottom:0;width:2px;
  background:var(--amber);border-radius:99px;
  cursor:pointer;z-index:4;transition:transform .12s;
}
.bpin::before{
  content:'';position:absolute;top:-4px;left:-3px;
  width:8px;height:8px;border-radius:50%;background:var(--amber);
}
.bpin:hover{transform:scaleX(2.5);}
.btip{
  position:absolute;bottom:calc(100% + 8px);
  left:50%;transform:translateX(-50%);
  background:var(--surface);border:.5px solid var(--div2);
  border-radius:12px;padding:8px 11px;
  width:190px;font-size:12px;line-height:1.5;color:var(--t1);
  display:none;z-index:20;
  box-shadow:0 6px 24px rgba(0,0,0,.14);
  white-space:normal;direction:rtl;pointer-events:none;
  animation:bpop .2s cubic-bezier(0.34,1.56,0.64,1) both;
}
.btip.on{display:block;}
.btip-lbl{font-size:10px;font-weight:600;color:var(--amber);margin-bottom:3px;}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BREAKPOINT CARD
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.bpc{
  max-width:min(72vw,280px);
  background:var(--surface);border:.5px solid var(--div2);
  padding:9px 12px;direction:rtl;
  animation:bpop .26s cubic-bezier(0.34,1.56,0.64,1) both;
}
.cluster.out .bpc{
  border-left:3px solid var(--amber);
  border-radius:0 12px 12px 0;
  transform-origin:bottom right;
}
.cluster.in .bpc{
  border-right:3px solid var(--amber);
  border-radius:12px 0 0 12px;
  transform-origin:bottom left;
}
.bpc-lbl{font-size:10px;font-weight:600;color:var(--amber);margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.bpc-txt{font-size:13px;color:var(--t1);line-height:1.5;}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TYPING
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.typing-row{
  display:flex;align-items:flex-end;gap:8px;
  padding-left:36px;margin-bottom:12px;position:relative;
}
.t-av{
  position:absolute;left:4px;bottom:0;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;
}
.tbub{
  background:var(--in-bg);
  border-radius:18px 18px 18px 4px;
  padding:12px 16px;
  display:flex;gap:4px;align-items:center;
  animation:bpop .26s cubic-bezier(0.34,1.56,0.64,1) both;
  transform-origin:bottom left;
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:dotup 1.3s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.18s;}
.dot:nth-child(3){animation-delay:.36s;}
@keyframes dotup{0%,55%,100%{transform:translateY(0);opacity:.4;}27%{transform:translateY(-5px);opacity:1;}}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   INPUT BAR
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.ibar{
  display:flex;align-items:flex-end;gap:8px;
  padding:8px 12px;
  padding-bottom:calc(8px + env(safe-area-inset-bottom));
  background:var(--glass);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:.5px solid var(--div);
  flex-shrink:0;direction:rtl;
  transition:background .25s;
}
.ishell{
  flex:1;display:flex;align-items:flex-end;
  background:var(--inp);border:.5px solid var(--div2);
  border-radius:22px;padding:7px 8px 7px 12px;gap:6px;
  transition:border-color .15s,background .25s;
  direction:rtl;
}
.ishell:focus-within{border-color:var(--acc);}
.ibox{
  flex:1;background:none;border:none;outline:none;
  font-size:15px;color:var(--t1);resize:none;
  max-height:120px;line-height:1.4;direction:rtl;padding:2px 0;
}
.ibox::placeholder{color:var(--t3);}
.mic-btn{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--t3);flex-shrink:0;transition:color .12s,transform .1s;
}
.mic-btn:hover{color:var(--t1);}
.mic-btn:active{transform:scale(.88);}
.send-btn{
  width:34px;height:34px;border-radius:50%;
  background:var(--acc);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s,opacity .12s;
}
.send-btn:active{transform:scale(.88);}
.send-btn:hover{opacity:.88;}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BOTTOM SHEET
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.scrim{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.scrim.on{opacity:1;pointer-events:all;}
.sheet{
  width:100%;max-width:560px;margin:0 auto;
  background:var(--surface);border-radius:22px 22px 0 0;
  padding:0 16px calc(16px + env(safe-area-inset-bottom));
  transform:translateY(110%);
  transition:transform .32s cubic-bezier(.32,.72,0,1),background .25s;
  direction:rtl;
}
.scrim.on .sheet{transform:translateY(0);}
.sh-handle{width:36px;height:4px;border-radius:99px;background:var(--div2);margin:12px auto 18px;}
.sh-ttl{font-size:17px;font-weight:600;text-align:center;margin-bottom:3px;}
.sh-sub{font-size:13px;color:var(--t2);text-align:center;margin-bottom:14px;}
.sh-prev{
  display:flex;align-items:center;gap:10px;direction:ltr;
  background:var(--s2);border-radius:12px;padding:10px 14px;margin-bottom:12px;
}
.sh-wv{display:flex;align-items:center;gap:2px;height:22px;flex:1;}
.sbar{width:2px;border-radius:99px;background:var(--div2);}
.sbar.hi{background:var(--amber);}
.sh-ta{
  width:100%;background:var(--s2);border:.5px solid var(--div2);
  border-radius:14px;padding:12px 14px;
  font-size:14px;color:var(--t1);resize:none;outline:none;
  direction:rtl;line-height:1.55;min-height:88px;
  transition:border-color .15s,background .25s;
}
.sh-ta:focus{border-color:var(--acc);}
.sh-ta::placeholder{color:var(--t3);}
.sh-acts{display:flex;gap:8px;margin-top:12px;direction:ltr;}
.sact{flex:1;padding:13px;border-radius:14px;font-size:15px;font-weight:600;transition:opacity .12s,transform .1s;}
.sact:active{transform:scale(.97);}
.sact.cancel{background:var(--s2);color:var(--t1);}
.sact.confirm{background:var(--acc);color:#fff;}

/* avatars */
.ab{background:#dbeafe;color:#1d4ed8;}
.at{background:#d1fae5;color:#065f46;}
.aa{background:#fef3c7;color:#92400e;}
.ar{background:#ffe4e6;color:#9f1239;}
.ap{background:#ede9fe;color:#5b21b6;}
[data-dark] .ab{background:#1e3a5f;color:#93c5fd;}
[data-dark] .at{background:#064e3b;color:#6ee7b7;}
[data-dark] .aa{background:#451a03;color:#fcd34d;}
[data-dark] .ar{background:#4c0519;color:#fda4af;}
[data-dark] .ap{background:#2e1065;color:#c4b5fd;}

.empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  color:var(--t3);text-align:center;padding:2rem;direction:rtl;
}
.e-ico{width:54px;height:54px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;margin-bottom:4px;}
.e-ttl{font-size:16px;font-weight:600;color:var(--t2);}
.e-sub{font-size:13px;max-width:210px;line-height:1.5;}
</style>
</head>
<body>

<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sb">
    <div class="sb-top">
      <div class="sb-row">
        <span class="sb-title">پیام‌ها</span>
        <button class="ib" onclick="toggleTheme()">
          <svg id="theme-ico" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 1v1M8 14v1M1 8h1M14 8h1M3.05 3.05l.7.7M12.25 12.25l.7.7M3.05 12.95l.7-.7M12.25 3.75l.7-.7M11 8a3 3 0 11-6 0 3 3 0 016 0z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="search">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <input type="text" placeholder="جستجو…" oninput="filterConvs(this.value)">
      </div>
    </div>
    <div class="clist" id="clist"></div>
  </aside>

  <!-- ══ CHAT ══ -->
  <div class="chat" id="chat">
    <div class="empty">
      <div class="e-ico">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M20 14a2 2 0 01-2 2H6l-4 4V4a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="e-ttl">یک مکالمه انتخاب کنید</div>
      <div class="e-sub">از لیست سمت راست شروع کنید</div>
    </div>
  </div>
</div>

<!-- ══ BREAKPOINT SHEET ══ -->
<div class="scrim" id="scrim" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-ttl">نقطه توقف</div>
    <div class="sh-sub" id="sh-sub">در لحظه ۰:۰۰</div>
    <div class="sh-prev">
      <button style="width:30px;height:30px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;cursor:pointer;">
        <div style="width:0;height:0;border-style:solid;border-width:5px 0 5px 9px;margin-left:2px;border-color:transparent transparent transparent var(--t2)"></div>
      </button>
      <div class="sh-wv" id="sh-wv"></div>
    </div>
    <textarea class="sh-ta" id="sh-note" rows="3" placeholder="دستورالعمل…&#10;مثلاً: اینجا نفس بگیر · آرنج بالاتر · ریتم کندتر"></textarea>
    <div class="sh-acts">
      <button class="sact cancel" onclick="closeSheet()">لغو</button>
      <button class="sact confirm" onclick="saveBp()">ثبت نقطه توقف</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════ DATA ══════════════ */
const CONVS=[
  {id:1,name:'ایلیا شهرابی',    sub:'فلوت · سال دوم',     av:'ab',online:true, unread:0,time:'الان', prev:'پاسخ دادم ✓✓'},
  {id:2,name:'رها اردشیری', sub:'پیانو · سال سوم',    av:'at',online:false,unread:3,time:'۱۴:۳۲',prev:'ممنون استاد'},
  {id:3,name:'پریا درخشانی',   sub:'تار · سال اول',      av:'aa',online:true, unread:0,time:'دیروز', prev:'فایل رو دیدم'},
  {id:4,name:'دانیال مهربانی',  sub:'سه‌تار · سال چهارم', av:'ar',online:false,unread:1,time:'شنبه',  prev:'سؤال داشتم…'},
  {id:5,name:'سامیار رجایی', sub:'ویولن · سال دوم',    av:'ap',online:false,unread:0,time:'جمعه',  prev:'نُت رو فرستادم'},
];
const MSGS={
  1:[
    {id:1,s:'in', type:'text', body:'سلام استاد',t:'۳:۵۰'},
    {id:2,s:'in', type:'text', body:'تمرین کردم امروز',t:'۳:۵۰'},
    {id:3,s:'in', type:'text', body:'یه ضبط فرستادم، شهرابی بدید',t:'۳:۵۱'},
    {id:4,s:'in', type:'voice',dur:24,t:'۳:۵۲',bps:[
      {pct:.33,ts:'۰:۰۸',note:'اینجا نفس‌گیری کوتاه بزن — قبل از اون فراز طولانی ریه رو پر کن'},
      {pct:.70,ts:'۰:۱۷',note:'آرنج دست چپ بالاتر — صدا داره خفه میشه'},
    ]},
    {id:5,s:'out',type:'text', body:'شنیدم ایلیاجان',t:'۴:۰۱'},
    {id:6,s:'out',type:'text', body:'خوب بود، دو جا نیاز به اصلاح داره',t:'۴:۰۱'},
    {id:7,s:'out',type:'bpc', bpTs:'۰:۰۸',note:'اینجا نفس‌گیری کوتاه بزن — قبل از اون فراز طولانی ریه رو پر کن',t:'۴:۰۲'},
    {id:8,s:'out',type:'bpc', bpTs:'۰:۱۷',note:'آرنج دست چپ بالاتر — صدا داره خفه میشه',t:'۴:۰۲'},
    {id:9,s:'in', type:'text', body:'ممنون استاد ❤️',t:'۴:۰۵'},
    {id:10,s:'in',type:'text', body:'الان دوباره تمرین می‌کنم',t:'۴:۰۵'},
  ],
  2:[
    {id:1,s:'in',type:'text',body:'استاد سلام',t:'۱۴:۳۰'},
    {id:2,s:'in',type:'text',body:'سؤال داشتم در مورد تمپوی قطعه',t:'۱۴:۳۱'},
    {id:3,s:'in',type:'text',body:'ممنون استاد',t:'۱۴:۳۲'},
  ],
};

/* ═══════════════ THEME ═════════════ */
let dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
function applyTheme(){
  document.documentElement.toggleAttribute('data-dark',dark);
  document.getElementById('theme-ico').innerHTML=dark
    ?'<path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>'
    :'<path d="M8 1v1M8 14v1M1 8h1M14 8h1M3.05 3.05l.7.7M12.25 12.25l.7.7M3.05 12.95l.7-.7M12.25 3.75l.7-.7M11 8a3 3 0 11-6 0 3 3 0 016 0z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>';
}
function toggleTheme(){dark=!dark;applyTheme();}
applyTheme();

/* ═══════════════ SIDEBAR ═══════════ */
let activeId=null;
function renderSidebar(filter){
  const items=filter?CONVS.filter(c=>c.name.includes(filter)||c.sub.includes(filter)):CONVS;
  document.getElementById('clist').innerHTML=items.map(c=>`
    <div class="crow${activeId===c.id?' active':''}" onclick="openConv(${c.id})">
      <div class="av ${c.av}${c.online?' on':''}">${c.name[0]}</div>
      <div class="cmeta">
        <div class="cr1">
          <span class="cn">${c.name}</span>
          <span class="ct">${c.time}</span>
        </div>
        <div class="cp">${c.prev}</div>
      </div>
      ${c.unread?`<div class="badge">${c.unread}</div>`:''}
    </div>`).join('');
}
function filterConvs(v){renderSidebar(v);}

/* ═══════════════ OPEN CONV ═════════ */
function openConv(id){
  activeId=id;
  const conv=CONVS.find(c=>c.id===id);
  conv.unread=0;renderSidebar();
  if(window.innerWidth<=700) document.getElementById('sb').classList.add('off');

  document.getElementById('chat').innerHTML=`
    <div class="ch">
      <button class="back-btn" onclick="goBack()">
        <svg width="9" height="15" viewBox="0 0 9 15" fill="none">
          <path d="M7.5 1.5L1.5 7.5l6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span style="font-size:16px;margin-right:2px">164</span>
      </button>
      <div class="av ${conv.av}" style="width:38px;height:38px;font-size:13px;flex-shrink:0">${conv.name[0]}</div>
      <div class="ch-info">
        <div class="ch-name">${conv.name}</div>
        <div class="ch-sub">${conv.sub}${conv.online?' · <span style="color:var(--green)">آنلاین</span>':''}</div>
      </div>
      <button class="ib" style="flex-shrink:0">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M10 10L13 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="msgs" id="msgs">
      <div class="day-sep">امروز</div>
      <div id="clusters"></div>
      <div id="tr" class="typing-row" style="display:none">
        <div class="t-av ${conv.av}">${conv.name[0]}</div>
        <div class="tbub"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
      <div style="height:6px"></div>
    </div>
    <div class="ibar">
      <div class="ishell">
        <textarea class="ibox" id="ibox" rows="1"
          placeholder="پیام…"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"></textarea>
        <button class="mic-btn" onclick="sendVoice()">
          <svg width="14" height="17" viewBox="0 0 14 17" fill="none">
            <rect x="4" y="1" width="6" height="9" rx="3" stroke="currentColor" stroke-width="1.3"/>
            <path d="M1 9a6 6 0 0012 0" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M7 15v1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <button class="send-btn" onclick="sendText()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M6.5 11V2M6.5 2L2.5 6M6.5 2l4 4" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>`;

  renderClusters();scrollBot();

  if(id===1){
    setTimeout(()=>{
      const tr=document.getElementById('tr');
      if(tr){tr.style.display='flex';scrollBot();}
      setTimeout(()=>{if(tr)tr.style.display='none';},3000);
    },2200);
  }
}
function goBack(){document.getElementById('sb').classList.remove('off');}

/* ═══════════════ CLUSTERS ══════════ */
function renderClusters(){
  const msgs=MSGS[activeId]||[];
  const container=document.getElementById('clusters');
  if(!container)return;

  const groups=[];let cur=null;
  msgs.forEach(m=>{
    if(!cur||cur.s!==m.s){cur={s:m.s,items:[]};groups.push(cur);}
    cur.items.push(m);
  });

  const conv=CONVS.find(c=>c.id===activeId);

  container.innerHTML=groups.map(g=>{
    const rows=g.items.map((m,mi)=>{
      const isLast=mi===g.items.length-1;
      const isMid=!isLast&&mi>0;
      return buildRow(m,isLast,isMid,g.s);
    }).join('');
    const av=g.s==='in'?`<div class="cl-av ${conv.av}">${conv.name[0]}</div>`:'';
    return `<div class="cluster ${g.s}">${av}${rows}</div>`;
  }).join('');

  msgs.forEach(m=>{
    if(m.type==='voice'){
      const wvel=document.getElementById('wv-'+m.id);
      if(wvel){buildWave(wvel,40,m.id);if(m.bps?.length)addPins(wvel,m.bps);}
    }
  });
}

function buildRow(m,isLast,isMid,side){
  let inner='';
  if(m.type==='text'){
    const pill=m.body.replace(/\s/g,'').length<=8;
    const cls=pill?'pill':isMid?'mid':'';
    inner=`<div class="bubble${cls?' '+cls:''}">${m.body}</div>`;
  } else if(m.type==='voice'){
    inner=`<div class="vbub" id="vb-${m.id}"
      onmousedown="lpStart(event,'vb-${m.id}',${m.dur})"
      onmouseup="lpEnd()" onmouseleave="lpEnd()"
      ontouchstart="lpStart(event,'vb-${m.id}',${m.dur})" ontouchend="lpEnd()">
      <button class="vplay" onclick="event.stopPropagation();togglePlay('vb-${m.id}',${m.dur})">
        <div class="ptri"></div>
      </button>
      <div class="wv" id="wv-${m.id}" onclick="scrub(event,'vb-${m.id}',${m.dur})"></div>
      <span class="vdur" id="vd-${m.id}">${fmt(m.dur)}</span>
    </div>`;
  } else if(m.type==='bpc'){
    inner=`<div class="bpc">
      <div class="bpc-lbl">
        <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><circle cx="4.5" cy="4.5" r="3.5" stroke="currentColor" stroke-width="1"/><path d="M4.5 2.5v2l1 1" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
        نقطه توقف · ${m.bpTs}
      </div>
      <div class="bpc-txt">${m.note}</div>
    </div>`;
  }
  const meta=isLast?`<div class="bmeta">${m.t}${side==='out'?'<span class="tick seen">✓✓</span>':''}</div>`:'';
  return `<div>${inner}${meta}</div>`;
}

/* ═══════════════ WAVEFORM ══════════ */
function buildWave(el,n,seed){
  el.innerHTML='';
  for(let i=0;i<n;i++){
    const h=4+Math.abs(Math.sin(i*.47+seed)*20)+Math.abs(Math.sin(i*.13+seed*2)*7);
    const b=document.createElement('div');
    b.className='wbar';b.style.height=Math.round(h)+'px';el.appendChild(b);
  }
}
function buildSheetWave(pct){
  const el=document.getElementById('sh-wv');el.innerHTML='';
  for(let i=0;i<30;i++){
    const h=4+Math.abs(Math.sin(i*.47+1.2)*14);
    const b=document.createElement('div');
    b.className='sbar'+(i/30<pct?' hi':'');b.style.height=Math.round(h)+'px';
    el.appendChild(b);
  }
}

/* ═══════════════ PINS ═══════════════ */
function addPins(wvel,bps){
  bps.forEach(bp=>{
    const pin=document.createElement('div');
    pin.className='bpin';pin.style.left=(bp.pct*100)+'%';
    const tip=document.createElement('div');
    tip.className='btip';
    tip.innerHTML=`<div class="btip-lbl">نقطه توقف · ${bp.ts}</div>${bp.note}`;
    pin.appendChild(tip);
    pin.addEventListener('click',e=>{
      e.stopPropagation();
      document.querySelectorAll('.btip').forEach(t=>t!==tip&&t.classList.remove('on'));
      tip.classList.toggle('on');
    });
    wvel.appendChild(pin);
  });
}

/* ═══════════════ PLAY ═══════════════ */
let playId=null,playIv=null,playPos={};
function togglePlay(vbId,dur){
  if(playId===vbId){stopPlay();return;}
  stopPlay();playId=vbId;
  const bars=document.querySelectorAll(`#${vbId} .wbar`);
  const durEl=document.getElementById(vbId.replace('vb-','vd-'));
  let i=playPos[vbId]||0;
  bars.forEach((b,bi)=>bi<i?b.classList.add('p'):b.classList.remove('p'));
  playIv=setInterval(()=>{
    if(i>=bars.length){stopPlay();playPos[vbId]=0;if(durEl)durEl.textContent=fmt(dur);return;}
    bars[i].classList.add('p');
    if(durEl)durEl.textContent=fmt(Math.round((i/bars.length)*dur));
    i++;playPos[vbId]=i;
  },58);
}
function stopPlay(){clearInterval(playIv);playId=null;}
function scrub(e,vbId,dur){
  e.stopPropagation();
  const wv=document.querySelector(`#${vbId} .wv`);
  const r=wv.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  const bars=wv.querySelectorAll('.wbar');
  const tgt=Math.round(pct*bars.length);
  bars.forEach((b,i)=>i<tgt?b.classList.add('p'):b.classList.remove('p'));
  playPos[vbId]=tgt;
}

/* ═══════════════ LONG PRESS ════════ */
let lpTimer=null,pendingBp=null;
function lpStart(e,vbId,dur){
  lpTimer=setTimeout(()=>{
    const wv=document.querySelector(`#${vbId} .wv`);
    const r=wv.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const pct=Math.max(0,Math.min(1,(cx-r.left)/r.width));
    const ts=fmt(Math.round(pct*dur));
    pendingBp={vbId,pct,ts};
    document.getElementById('sh-sub').textContent='در لحظه '+ts;
    buildSheetWave(pct);
    document.getElementById('sh-note').value='';
    document.getElementById('scrim').classList.add('on');
    setTimeout(()=>document.getElementById('sh-note').focus(),350);
  },500);
}
function lpEnd(){clearTimeout(lpTimer);}
function closeSheet(e){
  if(e&&e.target!==document.getElementById('scrim'))return;
  document.getElementById('scrim').classList.remove('on');
}
function saveBp(){
  const note=document.getElementById('sh-note').value.trim();
  if(!note||!pendingBp){document.getElementById('sh-note').focus();return;}
  const{vbId,pct,ts}=pendingBp;
  const wv=document.querySelector(`#${vbId} .wv`);
  if(wv){
    const pin=document.createElement('div');
    pin.className='bpin';pin.style.left=(pct*100)+'%';
    const tip=document.createElement('div');
    tip.className='btip';
    tip.innerHTML=`<div class="btip-lbl">نقطه توقف · ${ts}</div>${note}`;
    pin.appendChild(tip);
    pin.addEventListener('click',e=>{
      e.stopPropagation();
      document.querySelectorAll('.btip').forEach(t=>t!==tip&&t.classList.remove('on'));
      tip.classList.toggle('on');
    });
    wv.appendChild(pin);
  }
  const msgs=MSGS[activeId]=MSGS[activeId]||[];
  msgs.push({id:Date.now(),s:'out',type:'bpc',bpTs:ts,note,t:'الان'});
  document.getElementById('scrim').classList.remove('on');
  renderClusters();scrollBot();
}

/* ═══════════════ SEND ═══════════════ */
function sendText(){
  const box=document.getElementById('ibox');
  if(!box||!activeId)return;
  const txt=box.value.trim();if(!txt)return;
  const msgs=MSGS[activeId]=MSGS[activeId]||[];
  msgs.push({id:Date.now(),s:'out',type:'text',body:txt,t:'الان'});
  const conv=CONVS.find(c=>c.id===activeId);
  if(conv){conv.prev=txt;conv.time='الان';}
  box.value='';box.style.height='';
  renderClusters();renderSidebar();scrollBot();
}
function sendVoice(){
  if(!activeId)return;
  const msgs=MSGS[activeId]=MSGS[activeId]||[];
  msgs.push({id:Date.now(),s:'out',type:'voice',dur:9,t:'الان',bps:[]});
  renderClusters();scrollBot();
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText();}}
function autoResize(el){el.style.height='';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function scrollBot(){const m=document.getElementById('msgs');if(m)m.scrollTop=m.scrollHeight;}
function fmt(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}

document.addEventListener('click',e=>{
  if(!e.target.closest('.bpin'))
    document.querySelectorAll('.btip').forEach(t=>t.classList.remove('on'));
});

renderSidebar();
openConv(1);
