              <path d="M2 4h12M5 4V2h6v2M3 4l1 12h8l1-12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="rec-stop" onclick="recPauseToggle()" aria-label="pause">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <rect x="3" y="3" width="8" height="8" rx="1" fill="currentColor"/>
            </svg>
          </button>
          <button class="rec-send" onclick="recFinish()" aria-label="send">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M7 11V2M7 2L3 6M7 2l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>`;
    chat.classList.remove('switching');
    if(!isEmpty){renderClusters();scrollBot();}

    if(id===1){
      setTimeout(()=>{
        const tr=document.getElementById('tr');
        if(tr){tr.style.display='flex';scrollBot();}
        setTimeout(()=>{if(tr)tr.style.display='none';},3000);
      },2200);
    }
  },120); /* wait for fade-out */
}
function goBack(){document.getElementById('sb').classList.remove('off');}

/* ════════════════ CLUSTERS ════════════ */
function renderClusters(){
  const msgs=MSGS[activeId]||[];
  const container=document.getElementById('clusters');
  if(!container)return;

  const groups=[];let cur=null;
  msgs.forEach(m=>{
    if(!cur||cur.s!==m.s){cur={s:m.s,items:[]};groups.push(cur);}
    cur.items.push(m);
  });

  const conv=CONVS.find(c=>c.id===activeId);

  container.innerHTML=groups.map(g=>{
    const rows=g.items.map((m,mi)=>{
      const isLast=mi===g.items.length-1;
      return buildRow(m,isLast,g.s);
    }).join('');
    /* FIX #1: use initials() for cl-av */
    const av=g.s==='in'
      ?`<div class="cl-av">${initials(conv.name)}</div>`:'';
    return `<div class="cluster ${g.s}">${av}${rows}</div>`;
  }).join('');

  msgs.forEach(m=>{
    if(m.type==='voice'){
      const wvel=document.getElementById('wv-'+m.id);
      if(wvel){buildWave(wvel,40,m.id);if(m.bps?.length)addPins(wvel,m.bps);}
    }
  });
}

function buildRow(m,isLast,side){
  let inner='';
  const rxnHTML = m.reaction
    ? `<span class="rxn-applied" onclick="event.stopPropagation();applyReaction(${m.id},null)">${RXN_GLYPH[m.reaction]||m.reaction}</span>`
    : '';

  if(m.type==='text'){
    const pill=m.body.replace(/\s/g,'').length<=8;
    inner=`<div class="bubble${pill?' pill':''}"
      onpointerdown="rxnPress(event,${m.id})"
      onpointerup="rxnRelease()" onpointercancel="rxnRelease()"
      onpointermove="rxnPressMove(event)"
      onpointerleave="rxnRelease()">${m.body}${rxnHTML}</div>`;

  }else if(m.type==='voice'){
    inner=`<div class="vbub" id="vb-${m.id}"
      onmousedown="lpStart(event,'vb-${m.id}',${m.dur})"
      onmouseup="lpEnd()" onmouseleave="lpEnd()"
      ontouchstart="lpStart(event,'vb-${m.id}',${m.dur})"
      ontouchmove="lpMove(event)"
      ontouchend="lpEnd()"
      ontouchcancel="lpEnd()">
      <button class="vplay" onclick="event.stopPropagation();togglePlay('vb-${m.id}',${m.dur})">
        <div class="ptri"></div>
      </button>
      <div class="wv" id="wv-${m.id}" onclick="scrub(event,'vb-${m.id}',${m.dur})"></div>
      <span class="vdur" id="vd-${m.id}">${fmt(m.dur)}</span>
    </div>`;

  }else if(m.type==='bpc'){
    /* mini waveform reference bars inside card */
    const refBars=Array.from({length:20},(_,i)=>{
      const h=4+Math.abs(Math.sin(i*.47+2)*10);
      const isHi=i>=6&&i<=9;
      return `<div class="bpc-ref-bar${isHi?' hi':''}" style="height:${Math.round(h)}px"></div>`;
    }).join('');
    const jumpAttr=m.srcId?`onclick="jumpToBp(${m.srcId},${m.srcPct||0})"`:'';
    inner=`<div class="bpc${m.srcId?' bpc-clickable':''}" ${jumpAttr}
      onpointerdown="rxnPress(event,${m.id})"
      onpointerup="rxnRelease()" onpointercancel="rxnRelease()"
      onpointermove="rxnPressMove(event)"
      onpointerleave="rxnRelease()">
      <div class="bpc-lbl">
        <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
          <circle cx="4.5" cy="4.5" r="3.5" stroke="currentColor" stroke-width="1"/>
          <path d="M4.5 2.5v2l1 1" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
        </svg>
        نقطه توقف · ${m.bpTs}
      </div>
      <div class="bpc-txt">${m.note}</div>
      <div class="bpc-ref">
        <span class="bpc-ref-ts">${m.bpTs}</span>
        <div class="bpc-ref-bars">${refBars}</div>
      </div>
      ${rxnHTML}
    </div>`;
  }

  const tickHtml=side==='out'?tickSVG(m.tickState||'seen'):'';
  const editedTag=m.edited?`<span class="bubble-edited">ویرایش شده</span>`:'';
  let meta='';
  if(side==='out' && isLast){
    /* Outgoing last bubble: full meta row (edited tag + time + tick) */
    meta=`<div class="bmeta">${editedTag}<span class="btime">${m.t}</span>${tickHtml}</div>`;
  } else if(side==='out' && m.edited){
    /* Outgoing non-last but edited: show only the edited tag */
    meta=`<div class="bmeta" style="display:flex;">${editedTag}</div>`;
  } else if(side==='in' && m.edited){
    /* Incoming edited (any position): just the edited tag, force-shown
       because .cluster.in .bmeta is display:none by default */
    meta=`<div class="bmeta" style="display:flex;justify-content:flex-start;">${editedTag}</div>`;
  }
  return `<div data-msgid="${m.id}">${inner}${meta}</div>`;
}

/* ════════════════ WAVEFORM ════════════ */
function buildWave(el,n,seed){
  el.innerHTML='';
  for(let i=0;i<n;i++){
    const h=4+Math.abs(Math.sin(i*.47+seed)*20)+Math.abs(Math.sin(i*.13+seed*2)*7);
    const b=document.createElement('div');
    b.className='wbar';b.style.height=Math.round(h)+'px';el.appendChild(b);
  }
}
function buildSheetWave(pct){
  const el=document.getElementById('sh-wv');el.innerHTML='';
  for(let i=0;i<30;i++){
    const h=4+Math.abs(Math.sin(i*.47+1.2)*14);
    const b=document.createElement('div');
    b.className='sbar'+(i/30<pct?' hi':'');b.style.height=Math.round(h)+'px';
    el.appendChild(b);
  }
}

/* ════════════════ PINS ════════════════ */
function addPins(wvel,bps){
  bps.forEach(bp=>{
    const pin=document.createElement('div');
    pin.className='bpin';pin.style.left=(bp.pct*100)+'%';
    const tip=document.createElement('div');
    tip.className='btip';
    tip.innerHTML=`<div class="btip-lbl">
      <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><circle cx="4.5" cy="4.5" r="3.5" stroke="currentColor" stroke-width="1"/><path d="M4.5 2.5v2l1 1" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
      نقطه توقف · ${bp.ts}
    </div>${bp.note}`;
    pin.appendChild(tip);
    pin.addEventListener('click',e=>{
      e.stopPropagation();
      document.querySelectorAll('.btip').forEach(t=>t!==tip&&t.classList.remove('on'));
      tip.classList.toggle('on');
    });
    wvel.appendChild(pin);
  });
}

/* ════════════════ PLAY ════════════════ */
let playId=null,playIv=null,playPos={};
function togglePlay(vbId,dur){
  if(playId===vbId){stopPlay();return;}
  stopPlay();playId=vbId;
  const bars=document.querySelectorAll(`#${vbId} .wbar`);
  const durEl=document.getElementById(vbId.replace('vb-','vd-'));
  let i=playPos[vbId]||0;
  bars.forEach((b,bi)=>bi<i?b.classList.add('p'):b.classList.remove('p'));
  playIv=setInterval(()=>{
    if(i>=bars.length){stopPlay();playPos[vbId]=0;if(durEl)durEl.textContent=fmt(dur);return;}
    bars[i].classList.add('p');
    if(durEl)durEl.textContent=fmt(Math.round((i/bars.length)*dur));
    i++;playPos[vbId]=i;
  },58);
}
function stopPlay(){clearInterval(playIv);playId=null;}
function scrub(e,vbId,dur){
  e.stopPropagation();
  const wv=document.querySelector(`#${vbId} .wv`);
  const r=wv.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  const bars=wv.querySelectorAll('.wbar');
  const tgt=Math.round(pct*bars.length);
  bars.forEach((b,i)=>i<tgt?b.classList.add('p'):b.classList.remove('p'));
  playPos[vbId]=tgt;
}

/* ════════════════ JUMP TO BREAKPOINT ═
   Tap a bpc card → scrolls to the source voice message, highlights briefly,
   plays from the breakpoint moment. */
function jumpToBp(srcId,pct){
  const vbEl=document.getElementById('vb-'+srcId);
  if(!vbEl)return;

  vbEl.scrollIntoView({behavior:'smooth',block:'center'});

  vbEl.classList.add('vbub-flash');
  setTimeout(()=>vbEl.classList.remove('vbub-flash'),1200);

  const vbId='vb-'+srcId;
  stopPlay();
  const bars=document.querySelectorAll(`#${vbId} .wbar`);
  const startIndex=Math.floor(pct*bars.length);
  playPos[vbId]=startIndex;
  bars.forEach((b,bi)=>bi<startIndex?b.classList.add('p'):b.classList.remove('p'));

  setTimeout(()=>{
    const m=(MSGS[activeId]||[]).find(x=>x.id===srcId);
    const dur=m?m.dur:24;
    togglePlay(vbId,dur);
  },420);
}

/* ════════════════ REACTIONS ═══════════
   Long-press a text bubble or breakpoint card → reaction picker appears
   above. Tap a reaction → it attaches to the bubble's corner.
*/
const RXN_GLYPH = {
  heart:    '❤️',
  thumbsup: '👍',
  haha:     '😂',
  emphasize:'‼️',
  question: '❓',
};
const RXN_ORDER = ['heart','thumbsup','haha','emphasize','question'];

let rxnTimer = null, rxnTargetEl = null, rxnTargetMsgId = null,
    rxnStartXY = null, rxnPickerEl = null, rxnMenuEl = null;

function rxnPress(e,msgId){
  // ignore if right-click on desktop
  if(e.button === 2) return;
  // ignore if a reaction is already open — let the click on a button work
  if(rxnPickerEl && rxnPickerEl.classList.contains('on')) return;

  rxnStartXY = {x:e.clientX, y:e.clientY};
  rxnTargetEl = e.currentTarget;
  rxnTargetMsgId = msgId;

  // 380ms = slightly faster than the breakpoint long-press (500ms) so it
  // feels responsive. Bubbles are smaller targets so users hold less time.
  rxnTimer = setTimeout(() => {
    showRxnPicker(rxnTargetEl, msgId);
    rxnTimer = null;
  }, 380);
}

function rxnPressMove(e){
  if(!rxnStartXY || !rxnTimer) return;
  const dx = e.clientX - rxnStartXY.x;
  const dy = e.clientY - rxnStartXY.y;
  if(dx*dx + dy*dy > 100){    // 10px radius cancels
    rxnRelease();
  }
}

function rxnRelease(){
  if(rxnTimer){clearTimeout(rxnTimer); rxnTimer = null;}
  rxnStartXY = null;
}

function showRxnPicker(targetEl, msgId){
  // remove any existing picker/menu
  dismissRxnPicker(true);

  const msg = (MSGS[activeId]||[]).find(x => x.id === msgId);
  if(!msg) return;

  // What action items apply for this message?
  const actionItems = buildActionItems(msg);

  // Build single unified popover container
  const pop = document.createElement('div');
  pop.className = 'rxn-popover';

  // Reactions row
  const current = msg.reaction;
  const reactionsRowHTML = `
    <div class="rxn-row${actionItems.length ? ' has-actions' : ''}">
      ${RXN_ORDER.map(type => `
        <button class="rxn-btn ${type===current?'selected':''}" data-rxn="${type}">
          ${RXN_GLYPH[type]}
        </button>
      `).join('')}
    </div>
  `;

  // Actions section (may be empty)
  const actionsHTML = actionItems.length ? `
    <div class="rxn-actions">
      ${actionItems.map((item,i) => `
        <button class="rxn-menu-item ${item.destructive?'destructive':''}" data-idx="${i}">
          <span>${item.label}</span>
          <span class="rxn-menu-item-icon">${item.icon}</span>
        </button>
      `).join('')}
    </div>
  ` : '';

  pop.innerHTML = reactionsRowHTML + actionsHTML;

  // Wire reaction buttons
  pop.querySelectorAll('.rxn-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const type = btn.getAttribute('data-rxn');
      applyReaction(msgId, type === current ? null : type);
      dismissRxnPicker();
    });
  });

  // Wire action items
  pop.querySelectorAll('.rxn-menu-item').forEach((btn, i) => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      dismissRxnPicker();
      // small delay so dismiss animation can start before the action fires
      setTimeout(() => actionItems[i].action(), 80);
    });
  });

  document.body.appendChild(pop);
  rxnPickerEl = pop;
  rxnMenuEl = null;        // unified now — keep null for backwards compat in dismiss

  // mark target so dimming applies
  targetEl.classList.add('rxn-target');
  document.getElementById('msgs')?.classList.add('rxn-active');

  // Position the unified popover
  positionRxnPopover(targetEl, pop);

  // Choose transform-origin based on which side of the bubble we ended up on,
  // so the spring animation comes from the bubble.
  // (positionRxnPopover sets data-flip on the element)
  const flipped = pop.dataset.flipped === 'true';
  pop.style.transformOrigin = flipped ? 'top center' : 'bottom center';

  // animate in (next frame so the transform transition runs)
  requestAnimationFrame(() => pop.classList.add('on'));

  // dismiss on tap outside
  setTimeout(() => {
    document.addEventListener('pointerdown', dismissRxnHandler, {capture:true});
    document.addEventListener('keydown', escDismiss);
  }, 0);
}

/* Action items for a given message — returns array of {label, icon, action, destructive?} */
function buildActionItems(msg){
  const items = [];
  const isOut = msg.s === 'out';
  const isText = msg.type === 'text';
  const isBpc = msg.type === 'bpc';

  if(isText || isBpc){
    items.push({
      label: 'کپی',
      icon: `<svg viewBox="0 0 18 18" fill="none"><rect x="3" y="3" width="10" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 3V2a1 1 0 011-1h7a1 1 0 011 1v10a1 1 0 01-1 1h-1" stroke="currentColor" stroke-width="1.5"/></svg>`,
      action: () => copyMessage(msg.id),
    });
  }

  if(isOut && (isText || isBpc)){
    if(isText){
      items.push({
        label: 'ویرایش',
        icon: `<svg viewBox="0 0 18 18" fill="none"><path d="M3 13L11 5l3 3-8 8H3v-3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M11 5l2-2 3 3-2 2" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>`,
        action: () => startEditMessage(msg.id),
      });
    } else if(isBpc){
      items.push({
        label: 'ویرایش یادداشت',
        icon: `<svg viewBox="0 0 18 18" fill="none"><path d="M3 13L11 5l3 3-8 8H3v-3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M11 5l2-2 3 3-2 2" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>`,
        action: () => startEditBreakpoint(msg.id),
      });
    }
    items.push({
      label: 'حذف',
      destructive: true,
      icon: `<svg viewBox="0 0 18 18" fill="none"><path d="M3 5h12M6 5V3h6v2M4 5l1 11h8l1-11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      action: () => deleteMessage(msg.id),
    });
  }

  return items;
}

function positionRxnPopover(targetEl, pop){
  const r = targetEl.getBoundingClientRect();
  const pw = pop.offsetWidth;
  const ph = pop.offsetHeight;
  const margin = 12;
  const winW = window.innerWidth;
  const winH = window.innerHeight;
  const gapBubble = 10;

  // Try fitting popover above the bubble first
  let top = r.top - ph - gapBubble;
  let flipped = false;
  if(top < 80){
    // not enough room above → place below
    top = r.bottom + gapBubble;
    flipped = true;
    // if it would overflow the bottom, clamp
    if(top + ph > winH - margin){
      top = winH - margin - ph;
    }
  }

  // Horizontally: center on the bubble, clamped to viewport
  const center = r.left + r.width/2;
  let left = center - pw/2;
  if(left < margin) left = margin;
  if(left + pw > winW - margin) left = winW - margin - pw;

  pop.style.top = top + 'px';
  pop.style.left = left + 'px';
  pop.dataset.flipped = flipped ? 'true' : 'false';
}

function dismissRxnHandler(e){
  // if click is inside the picker or the menu, ignore
  if(rxnPickerEl && rxnPickerEl.contains(e.target)) return;
  if(rxnMenuEl && rxnMenuEl.contains(e.target)) return;
  dismissRxnPicker();
}
function escDismiss(e){
  if(e.key === 'Escape') dismissRxnPicker();
}

function dismissRxnPicker(immediate){
  document.removeEventListener('pointerdown', dismissRxnHandler, {capture:true});
  document.removeEventListener('keydown', escDismiss);
  document.querySelectorAll('.rxn-target').forEach(el => el.classList.remove('rxn-target'));
  document.getElementById('msgs')?.classList.remove('rxn-active');
  if(!rxnPickerEl && !rxnMenuEl) return;
  const picker = rxnPickerEl;
  const menu = rxnMenuEl;
  rxnPickerEl = null;
  rxnMenuEl = null;
  if(immediate){
    picker?.remove();
    menu?.remove();
    return;
  }
  picker?.classList.remove('on');
  menu?.classList.remove('on');
  setTimeout(() => {
    picker?.remove();
    menu?.remove();
  }, 220);
}

function applyReaction(msgId, type){
  const msgs = MSGS[activeId];
  if(!msgs) return;
  const msg = msgs.find(x => x.id === msgId);
  if(!msg) return;
  msg.reaction = type;          // null removes
  renderClusters();
}

/* ════════════════ MESSAGE ACTIONS (copy, edit, delete) ═══════ */

function copyMessage(msgId){
  const msg = (MSGS[activeId]||[]).find(x => x.id === msgId);
  if(!msg) return;
  let text = '';
  if(msg.type === 'text') text = msg.body;
  else if(msg.type === 'bpc') text = `${msg.note} (${msg.bpTs})`;
  if(!text) return;
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(text).catch(()=>{});
  } else {
    // fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
  }
  showToast('کپی شد');
}

/* Editing — when user starts editing, we put the message into the input and
   show a banner above the input identifying which message is being edited.
   Send button changes behavior to "save". If the user saves without
   actually changing anything, we silently exit edit mode (no "edited" mark). */
let editingMsgId = null;
let editingOriginal = '';     /* the original trimmed body, for diff check */

function startEditMessage(msgId){
  const msg = (MSGS[activeId]||[]).find(x => x.id === msgId);
  if(!msg || msg.type !== 'text') return;
  editingMsgId = msgId;
  editingOriginal = (msg.body || '').trim();

  const ibar = document.getElementById('ibar');
  const ishell = document.getElementById('ishell');
  const ibox = document.getElementById('ibox');
  if(!ibox) return;

  ibox.value = msg.body;
  ibox.dispatchEvent(new Event('input'));     // triggers updateSendBtn

  ibar.classList.add('editing-mode');
  ishell.classList.add('editing');

  // Wrap [+ button + ishell] in an edit-row so the banner can sit above as a peer.
  // The wrapping happens once per session; cancel re-flattens via classes only.
  if(!ibar.querySelector('.edit-row')){
    const row = document.createElement('div');
    row.className = 'edit-row';
    // move the existing ibar children (except .ibar-bg) into the row,
    // preserving their order and event handlers
    const movable = Array.from(ibar.children).filter(el =>
      !el.classList.contains('ibar-bg') && !el.classList.contains('edit-banner')
    );
    movable.forEach(el => row.appendChild(el));
    ibar.appendChild(row);
  }

  // Inject the new banner structure (icon + label + preview + close)
  // ABOVE the edit-row, as a sibling — that's how it visually fuses with the pill.
  if(!ibar.querySelector('.edit-banner')){
    const banner = document.createElement('div');
    banner.className = 'edit-banner';
    banner.innerHTML = `
      <div class="edit-banner-ico">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
          <path d="M9.5 2L12 4.5L4.5 12H2V9.5L9.5 2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="edit-banner-meta">
        <div class="edit-banner-lbl">ویرایش پیام</div>
        <div class="edit-banner-prev"></div>
      </div>
      <button class="edit-banner-cancel" onclick="cancelEditMessage()" aria-label="لغو ویرایش">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
          <path d="M2.2 2.2l6.6 6.6M8.8 2.2l-6.6 6.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    `;
    // banner goes ABOVE the .edit-row inside the ibar
    ibar.insertBefore(banner, ibar.querySelector('.edit-row'));
    banner.querySelector('.edit-banner-prev').textContent = msg.body;
  } else {
    ibar.querySelector('.edit-banner-prev').textContent = msg.body;
  }

  ibox.focus();
  // move cursor to end
  const len = ibox.value.length;
  ibox.setSelectionRange(len, len);
}

function cancelEditMessage(){
  editingMsgId = null;
  editingOriginal = '';
  const ibar = document.getElementById('ibar');
  const ishell = document.getElementById('ishell');
  const ibox = document.getElementById('ibox');
  ibar?.classList.remove('editing-mode');
  ishell?.classList.remove('editing');
  if(ibox){
    ibox.value = '';
    ibox.dispatchEvent(new Event('input'));
  }
  ibar?.querySelector('.edit-banner')?.remove();
}

function saveEditMessage(){
  if(editingMsgId === null) return false;
  const msgs = MSGS[activeId];
  if(!msgs) return false;
  const msg = msgs.find(x => x.id === editingMsgId);
  if(!msg) return false;
  const ibox = document.getElementById('ibox');
  const newBody = ibox.value.trim();

  /* NO-CHANGE GUARD: if the trimmed text is unchanged from the original,
     just silently exit edit mode. Don't mark edited, don't re-render. */
  if(newBody === editingOriginal){
    cancelEditMessage();
    return true;
  }

  if(!newBody){
    // empty save = silently exit (don't blank the message via edit)
    cancelEditMessage();
    return true;
  }
  msg.body = newBody;
  msg.edited = true;
  cancelEditMessage();
  renderClusters();
  return true;
}

/* Editing a breakpoint card's note — uses the same bottom sheet as creation
   but pre-filled with the existing note. */
function startEditBreakpoint(msgId){
  const msg = (MSGS[activeId]||[]).find(x => x.id === msgId);
  if(!msg || msg.type !== 'bpc') return;
  pendingBp = {vbId: 'vb-'+(msg.srcId||0), pct: msg.srcPct || 0, ts: msg.bpTs, editingMsgId: msgId};
  document.getElementById('sh-sub').textContent = 'در لحظه ' + msg.bpTs;
  buildSheetWave(msg.srcPct || 0);
  document.getElementById('sh-note').value = msg.note;
  document.getElementById('scrim').classList.add('on');
  setTimeout(() => document.getElementById('sh-note').focus(), 350);
}

/* Deletion with undo toast — message is removed from view immediately,
   but we hold it in pendingDelete for ~5s. Tapping undo restores it. */
let pendingDelete = null;
let pendingDeleteTimer = null;

function deleteMessage(msgId){
  const msgs = MSGS[activeId];
  if(!msgs) return;
  const idx = msgs.findIndex(x => x.id === msgId);
  if(idx < 0) return;
  pendingDelete = {msg: msgs[idx], idx, convId: activeId};
  msgs.splice(idx, 1);
  renderClusters();
  showUndoToast();
}

function showUndoToast(){
  // remove any existing toast
  document.querySelector('.undo-toast')?.remove();
  if(pendingDeleteTimer){clearTimeout(pendingDeleteTimer); pendingDeleteTimer = null;}

  const toast = document.createElement('div');
  toast.className = 'undo-toast';
  toast.innerHTML = `
    <span>پیام حذف شد</span>
    <button class="undo-toast-action">بازگردانی</button>
  `;
  toast.querySelector('button').addEventListener('click', () => {
    if(!pendingDelete) return;
    const conv = MSGS[pendingDelete.convId];
    if(conv){
      conv.splice(pendingDelete.idx, 0, pendingDelete.msg);
      if(pendingDelete.convId === activeId) renderClusters();
    }
    pendingDelete = null;
    hideUndoToast();
  });
  document.body.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('on'));

  pendingDeleteTimer = setTimeout(() => {
    pendingDelete = null;
    hideUndoToast();
  }, 5000);
}

function hideUndoToast(){
  const t = document.querySelector('.undo-toast');
  if(!t) return;
  t.classList.remove('on');
  setTimeout(() => t.remove(), 300);
  if(pendingDeleteTimer){clearTimeout(pendingDeleteTimer); pendingDeleteTimer = null;}
}

/* Tiny "copied!" toast — generic, reusable */
function showToast(text){
  const existing = document.querySelector('.simple-toast');
  if(existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'simple-toast undo-toast';
  t.innerHTML = `<span style="padding:0 8px;">${text}</span>`;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('on'));
  setTimeout(() => {
    t.classList.remove('on');
    setTimeout(() => t.remove(), 300);
  }, 1500);
}

/* ════════════════ LONG PRESS → SHEET ═ */
let lpTimer=null,pendingBp=null,lpMarkerEl=null,lpStartXY=null;

function lpStart(e,vbId,dur){
  // create a ghost marker at the press location IMMEDIATELY for tactile feedback
  const wv=document.querySelector(`#${vbId} .wv`);
  if(!wv)return;
  const r=wv.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  const pct=Math.max(0,Math.min(1,(cx-r.left)/r.width));
  const ts=fmt(Math.round(pct*dur));

  lpStartXY={x:cx,y:cy};

  // ghost marker — pulses up to full size over 500ms
  cancelLpMarker();
  const ghost=document.createElement('div');
  ghost.className='bpin lp-ghost';
  ghost.style.left=(pct*100)+'%';
  wv.appendChild(ghost);
  lpMarkerEl=ghost;

  lpTimer=setTimeout(()=>{
    // commit — open the sheet
    pendingBp={vbId,pct,ts};
    document.getElementById('sh-sub').textContent='در لحظه '+ts;
    buildSheetWave(pct);
    document.getElementById('sh-note').value='';
    document.getElementById('scrim').classList.add('on');
    setTimeout(()=>document.getElementById('sh-note').focus(),350);
    if(lpMarkerEl)lpMarkerEl.classList.add('lp-committed');
  },500);
}

function lpMove(e){
  // cancel long-press if finger moves enough to look like a scroll/swipe
  if(!lpStartXY||!lpTimer)return;
  const t=e.touches&&e.touches[0];
  if(!t)return;
  const dx=t.clientX-lpStartXY.x;
  const dy=t.clientY-lpStartXY.y;
  if(dx*dx+dy*dy>100){    // 10px radius
    lpEnd();
  }
}

function lpEnd(){
  if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}
  lpStartXY=null;
  if(!document.getElementById('scrim').classList.contains('on')){
    cancelLpMarker();
  }
}

function cancelLpMarker(){
  if(lpMarkerEl&&lpMarkerEl.parentNode){
    lpMarkerEl.parentNode.removeChild(lpMarkerEl);
  }
  lpMarkerEl=null;
}

function closeSheet(e){
  if(e&&e.target!==document.getElementById('scrim'))return;
  document.getElementById('scrim').classList.remove('on');
  cancelLpMarker();
  pendingBp=null;
}
function saveBp(){
  const note=document.getElementById('sh-note').value.trim();
  if(!note||!pendingBp){document.getElementById('sh-note').focus();return;}
  const{vbId,pct,ts,editingMsgId}=pendingBp;

  const msgs=MSGS[activeId]=MSGS[activeId]||[];

  if(editingMsgId){
    // EDIT MODE — update the existing bpc and the corresponding source-voice bps entry
    const bpcMsg = msgs.find(m=>m.id===editingMsgId);
    if(bpcMsg){
      bpcMsg.note = note;
      bpcMsg.edited = true;
    }
    // also update the source voice's bps entry that matches this pct
    const srcId = Number(vbId.replace(/^vb-/,''));
    const srcMsg = msgs.find(m=>m.id===srcId);
    if(srcMsg && srcMsg.bps){
      // find the bps entry whose pct is closest to ours (we stored pct exactly,
      // but allow tiny float drift)
      const entry = srcMsg.bps.find(b => Math.abs(b.pct - pct) < 0.001);
      if(entry) entry.note = note;
    }
  } else {
    // CREATE MODE — original behavior
    const srcId=Number(vbId.replace(/^vb-/,''));
    const srcMsg=msgs.find(m=>m.id===srcId);
    if(srcMsg){
      srcMsg.bps=srcMsg.bps||[];
      srcMsg.bps.push({pct,ts,note});
    }
    msgs.push({
      id:Date.now(),
      s:'out',type:'bpc',
      bpTs:ts,note,
      srcId,
      srcPct:pct,
      t:'الان',tickState:'seen'
    });
  }

  document.getElementById('scrim').classList.remove('on');
  cancelLpMarker();
  pendingBp=null;
  renderClusters();scrollBot();
}

/* ════════════════ TICK SVG ════════════ */
function tickSVG(state){
  const cls=state==='delivered'?' delivered':state==='seen'?' seen':'';
  return `<span class="tick-wrap${cls}">
    <svg class="tick1" width="11" height="11" viewBox="0 0 11 11" fill="none">
      <path class="tick-path" d="M1.5 5.5L4 8.5L9.5 2.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg class="tick2" width="11" height="11" viewBox="0 0 11 11" fill="none">
      <path class="tick-path" d="M1.5 5.5L4 8.5L9.5 2.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>`;
}

/* ════════════════ SEND ════════════════ */
function sendText(){
  // if we're in editing mode, save the edit instead
  if(editingMsgId !== null){
    saveEditMessage();
    return;
  }
  const box=document.getElementById('ibox');
  if(!box||!activeId)return;
  const txt=box.value.trim();if(!txt)return;

  /* if conversation was empty, rebuild with messages area */
  const msgs=MSGS[activeId]=MSGS[activeId]||[];
  const wasEmpty=msgs.length===0;

  const id=Date.now();
  msgs.push({id,s:'out',type:'text',body:txt,t:'الان',tickState:'sending'});
  const conv=CONVS.find(c=>c.id===activeId);
  if(conv){conv.prev=txt;conv.time='الان';}
  box.value='';box.style.height='';updateSendBtn();

  if(wasEmpty){
    /* re-open conversation to build the messages area */
    openConv(activeId);
  }else{
    renderClusters();renderSidebar();scrollBot();
  }

  setTimeout(()=>advanceTick(id,'delivered'),900);
  setTimeout(()=>advanceTick(id,'seen'),2200);
}

function advanceTick(msgId,newState){
  const msgs=MSGS[activeId]||[];
  const m=msgs.find(x=>x.id===msgId);
  if(m) m.tickState=newState;
  const row=document.querySelector(`[data-msgid="${msgId}"]`);
  if(!row)return;
  const tw=row.querySelector('.tick-wrap');
  if(!tw)return;
  tw.classList.remove('delivered','seen');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    if(newState==='delivered'||newState==='seen') tw.classList.add('delivered');
    if(newState==='seen') tw.classList.add('seen');
  }));
}

/* ════════════════ VOICE RECORDING ════════
   State machine:
     idle → recording → (locked | finished | cancelled)
   On mobile: press-and-hold the mic. Slide-left to cancel, slide-up to lock.
   On desktop: tap to enter locked state immediately (no awkward mouse-hold).
*/
const REC = {
  state: 'idle',          // 'idle' | 'recording' | 'locked'
  startTime: 0,
  pausedAt: 0,            // accumulated paused duration
  pauseStart: null,       // when current pause started, null if not paused
  startX: 0, startY: 0,
  barTimer: null,
  timeTimer: null,
  bars: [],               // generated bar heights for replay
  cancelThresholdX: 80,   // px finger has to drag toward LTR-end to cancel
  lockThresholdY: 50,     // px finger has to drag up to lock
};

function isMobile(){
  return window.matchMedia('(max-width:760px)').matches || ('ontouchstart' in window);
}

function recPress(e){
  // Block if there's text in the input — send button takes over instead
  if(document.getElementById('ishell').classList.contains('has-text'))return;
  e.preventDefault();

  if(!isMobile()){
    // Desktop: tap = enter locked state directly
    recStart();
    recEnterLocked();
    return;
  }

  // Mobile: press-and-hold flow
  REC.startX = e.clientX;
  REC.startY = e.clientY;
  recStart();

  // pointerup/move tracked on the document so user can slide outside the mic
  document.addEventListener('pointermove', recMove);
  document.addEventListener('pointerup', recRelease, {once:true});
  document.addEventListener('pointercancel', recRelease, {once:true});

  // capture pointer on mic button so we keep getting events
  e.target.setPointerCapture?.(e.pointerId);
}

function recStart(){
  REC.state = 'recording';
  REC.startTime = Date.now();
  REC.pausedAt = 0;
  REC.pauseStart = null;
  REC.bars = [];

  document.getElementById('ishell').classList.add('recording');
  document.getElementById('ibar').classList.add('recording-active');

  // make the mic button into the floating recording-mic for mobile feedback
  const micBtn = document.getElementById('mic-btn');
  if(isMobile()){
    micBtn.classList.add('recording-mic');
    micBtn.style.setProperty('--rec-slide','0px');
    micBtn.style.setProperty('--rec-lift','0px');
  }

  // start ticking the duration counter
  REC.timeTimer = setInterval(updateRecTime, 100);

  // start generating bars (~ every 90ms, so 30 bars in 2.7s; matches a natural feel)
  REC.barTimer = setInterval(addRecBar, 90);
}

function updateRecTime(){
  if(REC.pauseStart!==null)return;
  const total = Date.now() - REC.startTime - REC.pausedAt;
  const sec = Math.floor(total/1000);
  const m = Math.floor(sec/60), s = sec%60;
  const el = document.getElementById('rec-time');
  if(el) el.textContent = `${m}:${String(s).padStart(2,'0')}`;
}

function addRecBar(){
  if(REC.pauseStart!==null)return;
  // pseudo-random amplitude — actual MediaRecorder data goes here later
  const h = 4 + Math.random()*16 + Math.random()*Math.random()*8;
  REC.bars.push(h);

  const wave = document.getElementById('rec-wave');
  if(!wave)return;
  const bar = document.createElement('div');
  bar.className = 'rec-bar';
  bar.style.height = Math.round(h)+'px';
  wave.appendChild(bar);

  // keep only the bars that fit visually (avoid runaway DOM)
  while(wave.children.length > 60) wave.firstChild.remove();
}

function recMove(e){
  if(REC.state !== 'recording')return;
  const dx = e.clientX - REC.startX;   // negative = moved toward LTR-end
  const dy = e.clientY - REC.startY;   // negative = moved up

  // For RTL: cancel direction is LTR-end which is visually LEFT, so dx negative.
  // We want to read "drag amount toward cancel" as positive number for clarity.
  const dragCancel = Math.max(0, -dx);
  const dragLock = Math.max(0, -dy);

  const micBtn = document.getElementById('mic-btn');
  const ishell = document.getElementById('ishell');
  const ibar = document.getElementById('ibar');

  // mic follows finger horizontally a little and lifts upward toward lock
  micBtn.style.setProperty('--rec-slide', `-${Math.min(dragCancel, REC.cancelThresholdX)}px`);
  micBtn.style.setProperty('--rec-lift',  `-${Math.min(dragLock, REC.lockThresholdY)}px`);

  // toggle .cancelling once we cross the cancel threshold
  ishell.classList.toggle('cancelling', dragCancel >= REC.cancelThresholdX);

  // toggle .locking when in lock zone
  ibar.classList.toggle('locking', dragLock >= REC.lockThresholdY*0.7);

  // commit lock if user fully drags up
  if(dragLock >= REC.lockThresholdY){
    document.removeEventListener('pointermove', recMove);
    recEnterLocked();
  }
}

function recRelease(){
  document.removeEventListener('pointermove', recMove);

  if(REC.state !== 'recording')return;
  // if cancelling state was active, discard
  const ishell = document.getElementById('ishell');
  if(ishell.classList.contains('cancelling')){
    recCancel();
    return;
  }
  // otherwise finish & send
  recFinish();
}

function recEnterLocked(){
  REC.state = 'locked';
  document.getElementById('ibar').classList.add('locked');
  document.getElementById('ibar').classList.remove('locking');
  // hide the floating mic since locked controls take over
  const micBtn = document.getElementById('mic-btn');
  micBtn.classList.remove('recording-mic');
  micBtn.style.removeProperty('--rec-slide');
  micBtn.style.removeProperty('--rec-lift');
}

function recPauseToggle(){
  if(REC.state !== 'locked')return;
  if(REC.pauseStart === null){
    REC.pauseStart = Date.now();
    // change stop button into resume (play triangle)
    const btn = document.querySelector('.rec-stop');
    if(btn){
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 2v10l9-5z" fill="currentColor"/></svg>';
      btn.setAttribute('aria-label','resume');
    }
  } else {
    REC.pausedAt += Date.now() - REC.pauseStart;
    REC.pauseStart = null;
    const btn = document.querySelector('.rec-stop');
    if(btn){
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="3" y="3" width="8" height="8" rx="1" fill="currentColor"/></svg>';
      btn.setAttribute('aria-label','pause');
    }
  }
}

function recFinish(){
  if(REC.state === 'idle')return;

  // total duration in seconds (excluding pauses)
  const totalMs = Date.now() - REC.startTime - REC.pausedAt
                  - (REC.pauseStart ? Date.now()-REC.pauseStart : 0);
  const dur = Math.max(1, Math.round(totalMs/1000));

  recCleanup();

  // Emit the voice message into the conversation
  if(!activeId)return;
  const msgs = MSGS[activeId] = MSGS[activeId] || [];
  msgs.push({
    id: Date.now(),
    s: 'out',
    type: 'voice',
    dur: dur,
    t: 'الان',
    bps: [],
    tickState: 'sending',     // optimistic — will switch to delivered
  });
  renderClusters();
  scrollBot();

  // simulate delivery progression
  const newId = msgs[msgs.length-1].id;
  setTimeout(() => {
    const m = msgs.find(x => x.id===newId);
    if(m){m.tickState = 'delivered'; renderClusters();}
  }, 600);
  setTimeout(() => {
    const m = msgs.find(x => x.id===newId);
    if(m){m.tickState = 'seen'; renderClusters();}
  }, 1800);
}

function recCancel(){
  recCleanup();
}

function recCleanup(){
  REC.state = 'idle';
  clearInterval(REC.barTimer);
  clearInterval(REC.timeTimer);
  REC.barTimer = null;
  REC.timeTimer = null;

  const ishell = document.getElementById('ishell');
  const ibar = document.getElementById('ibar');
  const micBtn = document.getElementById('mic-btn');

  ishell.classList.remove('recording','cancelling','locked');
  ibar.classList.remove('recording-active','locking','locked');
  micBtn.classList.remove('recording-mic');
  micBtn.style.removeProperty('--rec-slide');
  micBtn.style.removeProperty('--rec-lift');

  // clear the live wave
  const wave = document.getElementById('rec-wave');
  if(wave) wave.innerHTML = '';
  const time = document.getElementById('rec-time');
  if(time) time.textContent = '0:00';
}

/* Legacy hook for any code that still calls sendVoice() — wraps recFinish */
function sendVoice(){
  if(REC.state !== 'idle'){recFinish();return;}
  // not currently recording → simulate a quick 2-second voice message
  if(!activeId)return;
  const msgs = MSGS[activeId] = MSGS[activeId] || [];
  msgs.push({id:Date.now(),s:'out',type:'voice',dur:2,t:'الان',bps:[],tickState:'seen'});
  renderClusters();scrollBot();
}

function updateSendBtn(){
  const box=document.getElementById('ibox');
  const shell=document.getElementById('ishell');
  if(!box||!shell)return;
  shell.classList.toggle('has-text',box.value.trim().length>0);
}
function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    const box=document.getElementById('ibox');
    if(box&&box.value.trim()) sendText();
  }
}
function autoResize(el){el.style.height='';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function scrollBot(){const m=document.getElementById('msgs');if(m)m.scrollTop=m.scrollHeight;}
function fmt(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}

document.addEventListener('click',e=>{
  if(!e.target.closest('.bpin'))
    document.querySelectorAll('.btip').forEach(t=>t.classList.remove('on'));
});

/* ════════════════ PWA HARDENING ════════════════
   CSS handles most of it. These JS guards catch the iOS edge cases
   where Safari ignores user-scalable=no or touch-action:manipulation. */

// Block iOS pinch-zoom gesture events (Safari sometimes ignores the meta tag)
['gesturestart','gesturechange','gestureend'].forEach(evt=>{
  document.addEventListener(evt, e=>e.preventDefault(), {passive:false});
});

// Block double-tap-to-zoom: if a tap happens within 300ms of the last tap, prevent it.
// This catches what touch-action:manipulation misses on older iOS.
let lastTouchEnd = 0;
document.addEventListener('touchend', e=>{
  const now = Date.now();
  if(now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, {passive:false});

// Prevent the browser's default context menu on long-press of anything
// EXCEPT input fields where the user genuinely needs paste/select.
document.addEventListener('contextmenu', e=>{
  const t = e.target;
  if(t.matches && t.matches('input,textarea')) return;
  e.preventDefault();
});

// Block accidental browser swipe-to-go-back on Chrome Android / iOS Safari
// for horizontal swipes near the screen edge (interferes with chat scroll).
document.addEventListener('touchstart', e=>{
  if(e.touches.length > 1) e.preventDefault();
}, {passive:false});

renderSidebar();
openConv(1);
</script>
