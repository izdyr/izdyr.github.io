function buildReplyCtx(){
  const t = (messages[activeId]||[]).find(m => m.id === replyingTo);
  if(!t) return '';
  const ts = users[t.sender];
  const snip = t.body || (t.type==='voice'?'پیام صوتی':t.type==='image'?'تصویر':t.type==='video'?'ویدئو':t.type==='document'?t.file.name:t.type==='contact'?'اطلاعات تماس':'');
  return `<div class="reply-ctx">
    <div class="rc-bar"></div>
    <div class="rc-text">
      <div class="rc-author">پاسخ به ${esc(ts.name)}</div>
      <div class="rc-snippet">${esc(snip.slice(0,90))}</div>
    </div>
    <button class="rc-close" onclick="cancelReply()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
  </div>`;
}
function cancelReply(){ replyingTo = null; renderChat(); }

/* ════════════════════════════════════════════════════════════════
   CLUSTERS — closely tracks the original
════════════════════════════════════════════════════════════════ */
function renderClusters(){
  const msgs = messages[activeId] || [];
  const container = document.getElementById('clusters');
  if(!container) return;

  const conv = conversations[activeId];
  const blocks = [];
  let lastDay = '';
  let cur = null;
  msgs.forEach(m => {
    const day = new Date(m.t).toDateString();
    if(day !== lastDay){
      blocks.push({ kind:'day', t:m.t });
      lastDay = day;
      cur = null;
    }
    const s = m.sender === ME_ID ? 'out' : 'in';
    if(!cur || cur.s !== s || cur.senderId !== m.sender){
      cur = { kind:'cluster', s, senderId:m.sender, items:[] };
      blocks.push(cur);
    }
    cur.items.push(m);
  });

  container.innerHTML = blocks.map(b => {
    if(b.kind === 'day'){
      const d = new Date(b.t), now = new Date();
      let word;
      if(d.toDateString() === now.toDateString()) word = 'امروز';
      else {
        const y = new Date(now); y.setDate(now.getDate()-1);
        if(d.toDateString() === y.toDateString()) word = 'دیروز';
        else word = d.toLocaleDateString('fa-IR',{weekday:'long', day:'numeric', month:'long'});
      }
      return `<div class="day-sep"><span class="day-sep-cap"><span class="when">${esc(word)}</span></span></div>`;
    }
    const sender = users[b.senderId];
    const showSenderLbl = b.s === 'in' && conv.type !== 'dm';
    const av = b.s === 'in' ? `<div class="cl-av">${esc(initials(sender.name))}</div>` : '';
    const senderLine = showSenderLbl ? `<div class="sender-lbl">${esc(sender.name)}</div>` : '';
    const rows = b.items.map(m => buildRow(m, b.s)).join('');
    return `<div class="cluster ${b.s}">${senderLine}${av}${rows}</div>`;
  }).join('');

  // Waveforms (post-pass like the original)
  msgs.forEach(m => {
    if(m.type === 'voice'){
      const wvel = document.getElementById('wv-' + m.id);
      if(wvel){
        wvel.innerHTML = '';
        const n = 40;
        for(let i=0;i<n;i++){
          const idx = Math.floor((i/n) * m.waveform.length);
          const h = Math.max(4, m.waveform[idx] * 24 + 4);
          const b = document.createElement('div');
          b.className = 'wbar';
          b.style.height = Math.round(h) + 'px';
          wvel.appendChild(b);
        }
        (m.bps||[]).forEach(bp => {
          const pin = document.createElement('div');
          pin.className = 'bpin';
          pin.style.left = (bp.pct*100) + '%';
          pin.title = bp.note;
          wvel.appendChild(pin);
        });
      }
    }
  });
}

function buildRow(m, side){
  let inner = '';
  const rxn = buildRxnApplied(m);

  // reply preview HTML (lives inside text bubble; for media/file/voice we
  // tack it on top of the row, just like the original's bpc treatment)
  let reply = '';
  if(m.replyTo){
    const t = (messages[activeId]||[]).find(x => x.id === m.replyTo);
    if(t){
      const ts = users[t.sender];
      const snip = t.body || (t.type==='voice'?'پیام صوتی':t.type==='image'?'تصویر':t.type==='video'?'ویدئو':t.type==='document'?t.file.name:t.type==='contact'?'اطلاعات تماس':'');
      reply = `<div class="reply-prev" onclick="event.stopPropagation();jumpTo(${t.id})">
        <div class="reply-author">${esc(ts.name)}</div>
        <div class="reply-snippet">${esc(snip.slice(0,80))}</div>
      </div>`;
    }
  }

  if(m.type === 'text'){
    const pill = m.body.replace(/\s/g,'').length <= 8;
    inner = `<div class="bubble${pill?' pill':''}" data-mid="${m.id}"
      onmousedown="rxnPress(event,${m.id})" onmouseup="rxnRelease()" onmouseleave="rxnRelease()"
      ontouchstart="rxnPress(event,${m.id})" ontouchend="rxnRelease()" ontouchcancel="rxnRelease()"
      oncontextmenu="rxnCtx(event,${m.id})">${reply}${esc(m.body)}${rxn}</div>`;
  }
  else if(m.type === 'voice'){
    inner = `<div class="vbub" id="vb-${m.id}" data-mid="${m.id}"
      onmousedown="rxnPress(event,${m.id})" onmouseup="rxnRelease()" onmouseleave="rxnRelease()"
      ontouchstart="rxnPress(event,${m.id})" ontouchend="rxnRelease()" ontouchcancel="rxnRelease()"
      oncontextmenu="rxnCtx(event,${m.id})">
      <button class="vplay" onclick="event.stopPropagation();toast('▶ پخش (دمو)')"><div class="ptri"></div></button>
      <div class="wv" id="wv-${m.id}"></div>
      <span class="vdur">${esc(fmt(m.dur))}</span>
      ${rxn}
    </div>`;
  }
  else if(m.type === 'image' || m.type === 'video'){
    const ph = m.file.ph || (m.type === 'image' ? 'ph-photo' : 'ph-video');
    const overlay = m.type === 'video' ? `
      <div class="vid-play"><svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg></div>
      ${m.file.dur ? `<div class="vid-dur">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        ${esc(fmt(m.file.dur))}
      </div>` : ''}` : '';
    inner = `<div class="media-bub" data-mid="${m.id}"
      onclick="openViewer(${m.id})"
      onmousedown="rxnPress(event,${m.id})" onmouseup="rxnRelease()" onmouseleave="rxnRelease()"
      ontouchstart="rxnPress(event,${m.id})" ontouchend="rxnRelease()" ontouchcancel="rxnRelease()"
      oncontextmenu="rxnCtx(event,${m.id})">
      <div class="ph ${ph}"></div>
      ${overlay}${rxn}
    </div>`;
  }
  else if(m.type === 'document'){
    const docIco = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
      <path d="M14 2v6h6" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
    </svg>`;
    inner = `<div class="filebub" data-mid="${m.id}"
      onclick="toast('📄 ' + ${JSON.stringify(esc(m.file.name))})"
      onmousedown="rxnPress(event,${m.id})" onmouseup="rxnRelease()" onmouseleave="rxnRelease()"
      ontouchstart="rxnPress(event,${m.id})" ontouchend="rxnRelease()" ontouchcancel="rxnRelease()"
      oncontextmenu="rxnCtx(event,${m.id})">
      <div class="file-ico">${docIco}</div>
      <div class="file-meta">
        <div class="file-name">${esc(m.file.name)}</div>
        <div class="file-size">${esc(fmtBytes(m.file.size))}</div>
      </div>
      ${rxn}
    </div>`;
  }
  else if(m.type === 'contact'){
    const s = users[m.contact.studentId];
    inner = `<div class="cc-bub" data-mid="${m.id}"
      onclick="openContactCard(${m.contact.studentId})"
      onmousedown="rxnPress(event,${m.id})" onmouseup="rxnRelease()" onmouseleave="rxnRelease()"
      ontouchstart="rxnPress(event,${m.id})" ontouchend="rxnRelease()" ontouchcancel="rxnRelease()"
      oncontextmenu="rxnCtx(event,${m.id})">
      <div class="cc-row">
        <div class="av">${esc(initials(s.name))}</div>
        <div>
          <div class="cc-name">${esc(s.name)}</div>
          <div class="cc-sub">${esc(ROLE_FA[s.role])}</div>
        </div>
      </div>
      <div class="cc-sep"></div>
      <div class="cc-cta">شروع گفتگو</div>
      ${rxn}
    </div>`;
  }

  return `<div data-msgid="${m.id}">${inner}</div>`;
}

function buildRxnApplied(m){
  if(!m.reactions || m.reactions.length === 0) return '';
  const counts = {};
  let total = 0, mine = false;
  m.reactions.forEach(r => {
    counts[r.r] = (counts[r.r] || 0) + 1;
    total++;
    if(r.u === ME_ID) mine = true;
  });
  // Show up to two distinct emoji, plus count when total > 1
  const emojis = Object.keys(counts).slice(0,2).map(k => RXN[k] || '').join('');
  const countHtml = total > 1 ? `<span class="rc">${toFa(total)}</span>` : '';
  return `<span class="rxn-applied${mine?' mine':''}" onclick="event.stopPropagation();rxnCtx(event,${m.id})">${emojis}${countHtml}</span>`;
}

function jumpTo(mid){
  const el = document.querySelector(`[data-msgid="${mid}"] [data-mid]`);
  if(!el) return;
  el.scrollIntoView({behavior:'smooth', block:'center'});
  const orig = el.style.boxShadow;
  el.style.boxShadow = '0 0 0 4px rgba(0,136,255,0.35)';
  el.style.transition = 'box-shadow 800ms';
  setTimeout(()=>{ el.style.boxShadow = orig; }, 1000);
}

/* ════════════════════════════════════════════════════════════════
   INPUT
════════════════════════════════════════════════════════════════ */
function handleInput(ta){
  ta.style.height = 'auto';
  ta.style.height = Math.min(120, ta.scrollHeight) + 'px';
  $('#ishell').classList.toggle('has-text', ta.value.trim().length > 0);
}
function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendText(); }
}
function sendText(){
  const ta = $('#ibox');
  const body = ta.value.trim();
  if(!body) return;
  const m = { id:Date.now(), conv:activeId, sender:ME_ID, type:'text', body, t:new Date().toISOString(), reactions:[] };
  if(replyingTo) m.replyTo = replyingTo;
  messages[activeId] = messages[activeId] || [];
  messages[activeId].push(m);
  replyingTo = null;
  ta.value = '';
  ta.style.height = 'auto';
  $('#ishell').classList.remove('has-text');
  renderSidebar();
  renderClusters();
  requestAnimationFrame(()=>{
    const m = document.getElementById('msgs');
    m.scrollTop = m.scrollHeight;
  });
}

/* ════════════════════════════════════════════════════════════════
   REACTION POPOVER — combined emoji + actions, frosted glass
════════════════════════════════════════════════════════════════ */
let lpTimer = null, lpFired = false;
function rxnPress(e, mid){
  lpFired = false;
  lpTimer = setTimeout(()=>{ lpFired = true; openRxnPopover(e, mid); }, 480);
}
function rxnRelease(){ if(lpTimer) clearTimeout(lpTimer); }
function rxnCtx(e, mid){ e.preventDefault(); openRxnPopover(e, mid); }

function openRxnPopover(evt, mid){
  const conv = conversations[activeId];
  const m = (messages[activeId]||[]).find(x => x.id === mid);
  if(!m) return;
  const isOut = m.sender === ME_ID;
  const canReply = canPostHere(conv);
  const canDelete = isOut;
  const bubble = document.querySelector(`[data-mid="${mid}"]`);
  if(!bubble) return;

  const items = [];
  if(canReply) items.push({ icon:'reply', label:'پاسخ', action:()=>{ replyingTo = mid; closeRxn(); renderChat(); } });
  if(m.body)   items.push({ icon:'copy',  label:'کپی متن', action:()=>{ navigator.clipboard?.writeText(m.body); toast('کپی شد'); closeRxn(); } });
  if(m.type === 'image' || m.type === 'video') items.push({ icon:'eye', label:'مشاهده', action:()=>{ closeRxn(); openViewer(mid); } });
  if(m.type === 'document' || m.type === 'image' || m.type === 'video') items.push({ icon:'download', label:'دانلود', action:()=>{ toast('دانلود (دمو)'); closeRxn(); } });
  if(canDelete) items.push({ icon:'trash', destructive:true, label:'حذف', action:()=>{
    messages[activeId] = messages[activeId].filter(x => x.id !== mid);
    closeRxn(); renderClusters(); renderSidebar();
  }});

  const myReact = m.reactions?.find(r => r.u === ME_ID);
  const ic = {
    reply: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 17 4 12l5-5M20 18v-2a4 4 0 0 0-4-4H4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    copy:  `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="8" y="8" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>`,
    eye:   `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg>`,
    download:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    trash: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  };

  const pop = $('#rxnPopover');
  pop.innerHTML = `
    <div class="rxn-row${items.length?' has-actions':''}">
      ${Object.keys(RXN).map(k => `
        <button class="rxn-btn${myReact && myReact.r === k ? ' selected' : ''}" data-r="${k}">${RXN[k]}</button>
      `).join('')}
    </div>
    ${items.length ? `<div class="rxn-actions">
      ${items.map((it,i)=>`<button class="rxn-menu-item${it.destructive?' destructive':''}" data-i="${i}">
        <span>${esc(it.label)}</span>
        <span class="rxn-menu-item-icon">${ic[it.icon]}</span>
      </button>`).join('')}
    </div>` : ''}
  `;

  document.getElementById('msgs').classList.add('rxn-active');
  document.querySelectorAll('.rxn-target').forEach(t => t.classList.remove('rxn-target'));
  bubble.classList.add('rxn-target');

  pop.classList.add('on');
  const rect = bubble.getBoundingClientRect();
  const pr = pop.getBoundingClientRect();
  let top = rect.top - pr.height - 10;
  if(top < 70) top = rect.bottom + 10;
  if(top + pr.height > window.innerHeight - 20) top = window.innerHeight - pr.height - 20;
  let left = isOut ? rect.right - pr.width : rect.left;
  left = Math.max(10, Math.min(window.innerWidth - pr.width - 10, left));
  pop.style.top = top + 'px';
  pop.style.left = left + 'px';

  pop.querySelectorAll('.rxn-btn').forEach(b => {
    b.onclick = () => { toggleReaction(mid, b.dataset.r); closeRxn(); };
  });
  pop.querySelectorAll('.rxn-menu-item').forEach(b => {
    b.onclick = () => items[parseInt(b.dataset.i)].action();
  });
}

function closeRxn(){
  $('#rxnPopover').classList.remove('on');
  const msgsEl = document.getElementById('msgs');
  if(msgsEl) msgsEl.classList.remove('rxn-active');
  document.querySelectorAll('.rxn-target').forEach(t => t.classList.remove('rxn-target'));
}

function toggleReaction(mid, r){
  const list = messages[activeId] || [];
  const m = list.find(x => x.id === mid);
  if(!m) return;
  m.reactions = m.reactions || [];
  const mine = m.reactions.find(x => x.u === ME_ID);
  if(mine && mine.r === r){
    m.reactions = m.reactions.filter(x => x.u !== ME_ID);
  } else if(mine){
    mine.r = r;
  } else {
    m.reactions.push({ u:ME_ID, r });
  }
  renderClusters();
}

function openViewer(mid){
  const m = (messages[activeId]||[]).find(x => x.id === mid);

  const sender = users[m.sender];

/* ════════════════════════════════════════════════════════════════
   SHEET FRAMEWORK
════════════════════════════════════════════════════════════════ */
function openSheet({ttl, sub, body, acts=[], onMount}){
  const sh = $('#sheet');
  sh.innerHTML = `
    <div class="sh-handle"></div>
    ${ttl ? `<div class="sh-ttl">${esc(ttl)}</div>` : ''}
    ${sub ? `<div class="sh-sub">${esc(sub)}</div>` : ''}
    <div class="sh-body">${body}</div>
    ${acts.length ? `<div class="sh-acts">${acts.map((a,i)=>`<button class="sact ${a.cls||''}" data-a="${i}" ${a.disabled?'disabled':''}>${esc(a.label)}</button>`).join('')}</div>` : ''}
  `;
  $('#scrim').classList.add('on');
  sh.querySelectorAll('[data-a]').forEach(b => {
    b.onclick = () => acts[parseInt(b.dataset.a)].action();
  });
  if(onMount) onMount(sh);
}
function closeSheet(e){
  if(e && e.target !== e.currentTarget) return;
  $('#scrim').classList.remove('on');
}

/* The original .sh-body needs scroll inside the sheet — we have a fixed sheet
   layout, this adds the scroll behaviour. */
(function ensureSheetScroll(){
  const css = `.sh-body{flex:1;overflow-y:auto;}.sh-body::-webkit-scrollbar{width:0;}`;
  const s = document.createElement('style'); s.textContent = css; document.head.appendChild(s);
})();

/* ════════════════════════════════════════════════════════════════
   CONVERSATION DETAIL (DM profile / group/channel members)
════════════════════════════════════════════════════════════════ */
function openConvDetail(){
  const conv = conversations[activeId];
  if(!conv) return;
  if(conv.type === 'dm'){
    const o = users[conv.members.find(id => id !== ME_ID)];
    const showDnd = o.dnd && canSeeDND(ME_ID, o.id);
    openSheet({
      ttl: '',
      body: `
        <div class="detail-head">
          <div class="av${o.online && !o.dnd?' on':''}${showDnd?' dnd':''}">${esc(initials(o.name))}</div>
          <div class="d-name">${esc(o.name)}</div>
          <div class="d-sub">${esc(ROLE_FA[o.role])}${showDnd ? ` · <span style="color:#C97500">${esc(o.dndMsg || 'مزاحم نشوید')}</span>` : ''}</div>
        </div>
      `,
      acts:[{label:'بستن', cls:'cancel', action:()=>closeSheet()}]
    });
    return;
  }
  const isOwner = conv.createdBy === ME_ID || ME.role === 'admin';
  const memberRows = conv.members.map(mid => {
    const u = users[mid];
    if(!u) return '';
    const onCls = u.online && !u.dnd ? ' on' : '';
    const dndCls = u.dnd ? ' dnd' : '';
    let tag = '';
    if(mid === ME_ID) tag = '<span class="member-tag you">شما</span>';
    else if(mid === conv.createdBy) tag = '<span class="member-tag">سازنده</span>';
    return `<div class="crow" onclick="memberClick(${mid})">
      <div class="av${onCls}${dndCls}" style="width:42px;height:42px;font-size:15px;">${esc(initials(u.name))}</div>
      <div class="cmeta">
        <div class="cr1"><span class="cn">${esc(u.name)}</span></div>
        <div class="cp">${esc(ROLE_FA[u.role])}</div>
      </div>
      ${tag}
    </div>`;
  }).join('');

  const actions = [{label:'بستن', cls:'cancel', action:()=>closeSheet()}];
  if(isOwner){
    actions.push({label: conv.type==='channel'?'حذف کانال':'حذف گروه', cls:'danger', action:()=>{
      delete conversations[activeId];
      delete messages[activeId];
      activeId = visibleConvs()[0]?.id || null;
      closeSheet();
      renderSidebar();
      if(activeId) renderChat(); else $('#chat').innerHTML = '<div class="empty"><div class="e-ttl">—</div></div>';
      toast(conv.type==='channel'?'کانال حذف شد':'گروه حذف شد');
    }});
  }

  openSheet({
    ttl: conv.name,
    sub: conv.type === 'channel' ? `کانال · ${toFa(conv.members.length)} عضو` : `گروه · ${toFa(conv.members.length)} عضو`,
    body: `
      ${conv.description ? `<div style="font-size:14px;color:var(--ink-2);text-align:center;margin:0 8px 18px;line-height:1.5;direction:rtl;">${esc(conv.description)}</div>` : ''}
      <div class="sec-lbl">اعضا</div>
      <div class="member-list">${memberRows}</div>
    `,
    acts: actions
  });
}

function memberClick(uid){
  if(uid === ME_ID){ closeSheet(); openSettings(); return; }
  if(!canDM(ME_ID, uid)){ toast('گفتگو با این کاربر مجاز نیست'); return; }
  let dm = Object.values(conversations).find(c => c.type==='dm' && c.members.includes(ME_ID) && c.members.includes(uid));
  if(!dm){
    const id = Math.max(...Object.keys(conversations).map(Number)) + 1;
    conversations[id] = { id, type:'dm', members:[ME_ID, uid], createdBy:ME_ID };
    messages[id] = [];
    dm = conversations[id];
  }
  closeSheet();
  openConv(dm.id);
}

/* ════════════════════════════════════════════════════════════════
   CONTACT CARD TAP — opens or creates a DM with the student
════════════════════════════════════════════════════════════════ */
function openContactCard(sid){
  const s = users[sid];
  if(!s) return;
  const linked = (teacherStudents[ME_ID]||[]).includes(sid);
  let dm = Object.values(conversations).find(c => c.type==='dm' && c.members.includes(ME_ID) && c.members.includes(sid));
  openSheet({
    ttl: '',
    body: `
      <div class="detail-head">
        <div class="av${s.online?' on':''}">${esc(initials(s.name))}</div>
        <div class="d-name">${esc(s.name)}</div>
        <div class="d-sub">${esc(ROLE_FA[s.role])}</div>
      </div>
      ${!linked && !dm && ME.role === 'teacher' ? `
        <div style="font-size:13px;color:var(--ink-2);text-align:center;margin:0 8px 6px;line-height:1.5;direction:rtl;">
          با ارسال اولین پیام، این هنرجو به لیست شما اضافه می‌شود
        </div>` : ''}
    `,
    acts:[
      {label:'بستن', cls:'cancel', action:()=>closeSheet()},
      {label:'شروع گفتگو', cls:'confirm', action:()=>{
        if(!dm){
          if(ME.role === 'teacher' && !linked){
            teacherStudents[ME_ID] = teacherStudents[ME_ID] || [];
            teacherStudents[ME_ID].push(sid);
            toast(`${s.name} به لیست شما اضافه شد`);
          }
          const id = Math.max(...Object.keys(conversations).map(Number)) + 1;
          conversations[id] = { id, type:'dm', members:[ME_ID, sid], createdBy:ME_ID };
          messages[id] = [];
          dm = conversations[id];
        }
        closeSheet();
        openConv(dm.id);
      }}
    ]
  });
}

  if(allStudents.length === 0){ toast('هنرجویی برای اشتراک نیست'); return; }
  openSheet({
    ttl:'اشتراک اطلاعات هنرجو',
    sub:'گام ۱ · انتخاب هنرجو',
    body: `<div class="member-list">${allStudents.map(u => `
      <div class="crow" data-sid="${u.id}">
        <div class="av${u.online?' on':''}" style="width:42px;height:42px;font-size:15px;">${esc(initials(u.name))}</div>
        <div class="cmeta">
          <div class="cr1"><span class="cn">${esc(u.name)}</span></div>
          <div class="cp">هنرجو</div>
        </div>
      </div>`).join('')}</div>`,
    acts:[{label:'انصراف', cls:'cancel', action:()=>closeSheet()}],
    onMount: s => {
      s.querySelectorAll('[data-sid]').forEach(r => {
        r.onclick = () => { closeSheet(); setTimeout(()=>pickShareRecipient(parseInt(r.dataset.sid)), 220); };
      });
    }
  });
}

function pickShareRecipient(sid){
  const s = users[sid];
  const recipients = Object.values(users).filter(u => u.role === 'teacher' && u.id !== ME_ID && u.id !== sid);
  openSheet({
    ttl:'اشتراک با کدام معلم؟',
    sub:`گام ۲ · ${s.name}`,
    body: `<div class="member-list">${recipients.map(u => `
      <div class="crow" data-rid="${u.id}">
        <div class="av${u.online?' on':''}${u.dnd?' dnd':''}" style="width:42px;height:42px;font-size:15px;">${esc(initials(u.name))}</div>
        <div class="cmeta">
          <div class="cr1"><span class="cn">${esc(u.name)}</span></div>
          <div class="cp">معلم</div>
        </div>
      </div>`).join('')}</div>`,
    acts:[{label:'بازگشت', cls:'cancel', action:()=>{ closeSheet(); setTimeout(shareContact, 220); }}],
    onMount: shObj => {
      shObj.querySelectorAll('[data-rid]').forEach(r => {
        r.onclick = () => sendContactCard(sid, parseInt(r.dataset.rid));
      });
    }
  });
}

function sendContactCard(sid, rid){
  let dm = Object.values(conversations).find(c => c.type==='dm' && c.members.includes(ME_ID) && c.members.includes(rid));
  if(!dm){
    const id = Math.max(...Object.keys(conversations).map(Number)) + 1;
    conversations[id] = { id, type:'dm', members:[ME_ID, rid], createdBy:ME_ID };
    messages[id] = [];
    dm = conversations[id];
  }
  messages[dm.id].push({ id:Date.now(), conv:dm.id, sender:ME_ID, type:'contact', contact:{studentId:sid}, t:new Date().toISOString(), reactions:[] });
  closeSheet();
  openConv(dm.id);
  toast(`اطلاعات ${users[sid].name} ارسال شد`);
}

/* ════════════════════════════════════════════════════════════════
   SETTINGS
════════════════════════════════════════════════════════════════ */
function openSettings(){
  const dark = isDark();
  const bgList = dark ? BACKGROUNDS.dark : BACKGROUNDS.light;
  const activeBgId = dark ? activeBgDark : activeBgLight;

  const body = `
    <div class="detail-head">
      <div class="av">${esc(initials(ME.name))}</div>
      <div class="d-name">${esc(ME.name)}</div>
      <div class="d-sub">${esc(ROLE_FA[ME.role])}</div>
    </div>

    <div class="sec-lbl">حالت نمایش</div>
    <div class="set-group">
      <div class="set-row">
        <div class="label">حالت رنگ</div>
        <div class="theme-pick" id="themePick">
          <button data-theme="light" class="${!dark?'active':''}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" stroke-linecap="round"/></svg>
            روشن
          </button>
          <button data-theme="dark" class="${dark?'active':''}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke-linecap="round" stroke-linejoin="round"/></svg>
            تاریک
          </button>
        </div>
      </div>
    </div>

    <div class="sec-lbl">پس‌زمینه</div>
    <div class="bg-grid" id="bgGrid">${bgList.map(b => `
      <div class="bg-tile${b.id===activeBgId?' selected':''}" data-bg="${b.id}" style="${b.tile}"></div>
    `).join('')}</div>

    ${ME.role === 'teacher' ? `
      <div class="sec-lbl">حالت مزاحم نشوید</div>
      <div class="set-group">
        <div class="set-row">
          <div>
            <div class="label">فعال</div>
            <div class="desc">به دیگران نشان می‌دهد در دسترس نیستید</div>
          </div>
          <div class="sw${ME.dnd?' on':''}" id="dndSw"></div>
        </div>
        <div class="set-row" id="dndRow" style="${ME.dnd?'':'display:none;'}">
          <input id="dndMsg" type="text" placeholder="پیام نمایشی" value="${esc(ME.dndMsg || 'در کلاس هستم')}" style="width:100%;padding:11px 14px;background:var(--grey);border:none;border-radius:10px;font-size:16px;color:var(--ink);outline:none;direction:rtl;font-family:var(--fa);">
        </div>
      </div>` : ''}

    <div class="sec-lbl">حساب کاربری (دمو)</div>
    <div class="set-group">
      ${[1,2,3,5].map(id => `
        <div class="set-row" data-uid="${id}" style="cursor:pointer;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="av" style="width:32px;height:32px;font-size:12px;">${esc(initials(users[id].name))}</div>
            <div>
              <div class="label">${esc(users[id].name)}</div>
              <div class="desc">${esc(ROLE_FA[users[id].role])}</div>
            </div>
          </div>
          ${id === ME_ID ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="var(--blue)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ''}
        </div>
      `).join('')}
    </div>
  `;

  openSheet({
    ttl:'تنظیمات',
    body,
    acts:[{label:'بستن', cls:'cancel', action:()=>closeSheet()}],
    onMount: sh => {
      sh.querySelectorAll('#themePick button').forEach(b => {
        b.onclick = () => {
          applyTheme(b.dataset.theme);
          closeSheet();
          setTimeout(openSettings, 280);
        };
      });
      sh.querySelectorAll('[data-bg]').forEach(t => {
        t.onclick = () => {
          const id = t.dataset.bg;
          if(isDark()) activeBgDark = id; else activeBgLight = id;
          try {
            localStorage.setItem('pars.bgLight', activeBgLight);
            localStorage.setItem('pars.bgDark', activeBgDark);
          } catch(e){}
          applyBg();
          sh.querySelectorAll('[data-bg]').forEach(x => x.classList.toggle('selected', x === t));
        };
      });
      const sw = sh.querySelector('#dndSw');
      if(sw){
        sw.onclick = () => {
          ME.dnd = !ME.dnd;
          sw.classList.toggle('on', ME.dnd);
          sh.querySelector('#dndRow').style.display = ME.dnd ? '' : 'none';
          toast(ME.dnd ? 'مزاحم نشوید فعال شد' : 'غیرفعال شد');
          renderSidebar();
          if(activeId) renderChat();
        };
        const di = sh.querySelector('#dndMsg');
        if(di) di.oninput = () => { ME.dndMsg = di.value || 'مزاحم نشوید'; };
      }
      sh.querySelectorAll('[data-uid]').forEach(r => {
        r.onclick = () => {
          ME_ID = parseInt(r.dataset.uid);
          ME = users[ME_ID];
          renderMeStrip();
          activeId = visibleConvs()[0]?.id || null;
          renderSidebar();
          if(activeId) renderChat();
          else $('#chat').innerHTML = '<div class="empty"><div class="e-ttl">—</div></div>';
          closeSheet();
        };
      });
    }
  });
}

/* ════════════════════════════════════════════════════════════════
   FILE INPUT
════════════════════════════════════════════════════════════════ */
$('#fileInput').onchange = e => {
  const f = e.target.files[0];
  if(!f) return;
  e.target.value = '';
  const type = f.type.startsWith('image/') ? 'image'
             : f.type.startsWith('video/') ? 'video' : 'document';
  openSheet({
    ttl:'ارسال فایل',
    body: `
      <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--grey);border-radius:12px;margin-bottom:14px;direction:rtl;">
        <div style="width:40px;height:40px;border-radius:10px;background:rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;color:var(--ink-2);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.5"/><path d="M14 2v6h6" stroke="currentColor" stroke-width="1.5"/></svg>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:14.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(f.name)}</div>
          <div style="font-size:12px;color:var(--ink-3);margin-top:1px;direction:ltr;text-align:end;unicode-bidi:isolate;">${fmtBytes(f.size)}</div>
        </div>
      </div>
      <textarea id="capInput" placeholder="افزودن توضیح (اختیاری)" rows="2" style="width:100%;background:var(--grey);border:none;border-radius:12px;padding:12px 14px;font-size:16px;color:var(--ink);resize:none;outline:none;direction:rtl;line-height:1.55;min-height:60px;font-family:var(--fa);"></textarea>
      ${f.size > 32*1024*1024 ? `<div style="margin-top:10px;color:#FF3B30;font-size:12.5px;">⚠ فایل بزرگ‌تر از ۳۲ مگابایت</div>` : ''}
    `,
    acts:[
      {label:'انصراف', cls:'cancel', action:()=>closeSheet()},
      {label:'ارسال', cls:'confirm', action:()=>{
        if(f.size > 32*1024*1024){ toast('فایل بزرگ‌تر از ۳۲ مگابایت'); return; }
        const cap = $('#capInput').value.trim();
        const fileObj = { name:f.name, size:f.size };
        if(type === 'image') fileObj.ph = 'ph-photo';
        if(type === 'video'){ fileObj.ph = 'ph-video'; fileObj.dur = 0; }
        const mid = Date.now();
        messages[activeId].push({ id:mid, conv:activeId, sender:ME_ID, type, file:fileObj, t:new Date().toISOString(), reactions:[] });
        if(cap){
          messages[activeId].push({ id:mid+1, conv:activeId, sender:ME_ID, type:'text', body:cap, t:new Date(Date.now()+10).toISOString(), reactions:[] });
        }
        closeSheet();
        renderClusters(); renderSidebar();
        requestAnimationFrame(()=>{ const m=document.getElementById('msgs'); m.scrollTop = m.scrollHeight; });
      }}
    ]
  });
};

/* ════════════════════════════════════════════════════════════════
   GLOBAL HANDLERS
════════════════════════════════════════════════════════════════ */
document.addEventListener('click', e => {
  if(!e.target.closest('#rxnPopover') && !e.target.closest('[data-mid]')){
    closeRxn();
  }
});
document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){ closeRxn(); $('#scrim').classList.remove('on'); closeViewer(); }
});
$('#scrim').onclick = e => { if(e.target === $('#scrim')) $('#scrim').classList.remove('on'); };
$('#newConvBtn').onclick = openNewConv;
$('#meStrip').onclick = openSettings;
$('#meSettings').onclick = e => { e.stopPropagation(); openSettings(); };
$('#searchInput').addEventListener('input', e => renderSidebar(e.target.value));

// Wire attach button when chat is rendered (it's inside the chat innerHTML, so
// we have to rebind every render — handle via event delegation instead)
document.addEventListener('click', e => {
  if(e.target.closest('#attachBtn')) $('#fileInput').click();
});

/* ════════════════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════════════════ */
(function init(){
  try {
    const t = localStorage.getItem('pars.theme');
    if(t === 'dark') document.documentElement.setAttribute('data-dark','');
    activeBgLight = localStorage.getItem('pars.bgLight') || 'def';
    activeBgDark  = localStorage.getItem('pars.bgDark')  || 'def';
  } catch(e){}
  applyBg();
  renderMeStrip();
  renderSidebar();
  if(window.innerWidth > 760){
    renderChat();
  }

  // Test/dev harness
  window.parsApp = {
    users, conversations, messages, teacherStudents,
    get meId(){ return ME_ID; },
    setMe(id){
      ME_ID = id; ME = users[id]; renderMeStrip();
      activeId = visibleConvs()[0]?.id || null;
      renderSidebar();
      if(activeId) renderChat();
      else $('#chat').innerHTML = '<div class="empty"></div>';
    },
    setTheme: applyTheme,
    setBgLight: id => { activeBgLight = id; applyBg(); },
    setBgDark:  id => { activeBgDark  = id; applyBg(); },
    openConv, renderSidebar, renderChat, openSettings, openConvDetail, openNewConv,
    forceMobileChat(){ document.getElementById('sb').classList.add('off'); }
  };
})();
</script>
